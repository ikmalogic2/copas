<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MULTI TERMINAL APP</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts: Space Grotesk -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Definisi Tema menggunakan RGB untuk mendukung Opacity di Tailwind */
        :root {
            /* Default ke Cyan (Laporan Kinerja) */
            --neon-color-rgb: 0, 255, 255;
            --dim-color-rgb: 0, 77, 77;
        }

        .theme-orange {
            --neon-color-rgb: 255, 140, 0; /* Oranye Neon */
            --dim-color-rgb: 77, 42, 0;
        }

        .theme-cyan {
            --neon-color-rgb: 0, 255, 255; /* Biru/Cyan Neon */
            --dim-color-rgb: 0, 77, 77;
        }

        .theme-green {
            --neon-color-rgb: 57, 255, 20; /* Hijau Neon */
            --dim-color-rgb: 26, 74, 26;
        }

        body {
            background-color: #000000;
            color: rgb(var(--neon-color-rgb));
            font-family: 'Space Grotesk', monospace, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Efek Glow Terminal Dinamis */
        .neon-text {
            text-shadow: 0 0 5px rgba(var(--neon-color-rgb), 0.5);
        }
        
        .neon-border {
            box-shadow: 0 0 8px rgba(var(--neon-color-rgb), 0.2);
        }
        
        .neon-border-focus:focus {
            box-shadow: 0 0 12px rgba(var(--neon-color-rgb), 0.6);
            border-color: rgb(var(--neon-color-rgb));
        }

        .neon-bg-glow {
            box-shadow: inset 5px 0px 15px -5px rgba(var(--neon-color-rgb), 0.4);
        }

        /* Animasi Cursor Berkedip */
        .blinking-cursor {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Trik modern CSS Grid untuk animasi Akordion */
        .accordion-content, .accordion-toolbar {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .accordion-content.open, .accordion-toolbar.open {
            grid-template-rows: 1fr;
        }
        .accordion-inner, .toolbar-inner {
            overflow: hidden;
        }

        .chevron-icon {
            transition: transform 0.3s ease;
        }
        .chevron-icon.open {
            transform: rotate(180deg);
        }

        /* Kustomisasi scrollbar tema terminal dinamis */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
            border-left: 1px solid rgb(var(--dim-color-rgb));
        }
        ::-webkit-scrollbar-thumb {
            background: rgb(var(--neon-color-rgb));
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: thin;
        }
    </style>

    <script>
        // Konfigurasi Tailwind untuk membaca CSS Variables
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        terminal: {
                            bg: '#000000',
                            card: '#0a0a0a',
                            neon: 'rgb(var(--neon-color-rgb) / <alpha-value>)',
                            dim: 'rgb(var(--dim-color-rgb) / <alpha-value>)',
                            red: '#ff003c'
                        }
                    },
                    fontFamily: {
                        sans: ['"Space Grotesk"', 'monospace', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-terminal-bg flex min-h-screen font-sans transition-colors duration-500 selection:bg-terminal-neon selection:text-black theme-cyan overflow-hidden" id="app-body">

    <!-- Sidebar Layout -->
    <aside class="w-[70px] md:w-64 border-r border-terminal-dim flex flex-col transition-all duration-300 z-20 bg-terminal-bg flex-shrink-0">
        <!-- Logo / Menu Header -->
        <div class="p-4 border-b border-terminal-dim flex items-center justify-center md:justify-start h-[60px] md:h-[70px]">
            <i class="fa-solid fa-terminal text-terminal-neon text-2xl md:mr-3 neon-text transition-colors duration-500"></i>
            <span class="hidden md:inline font-bold text-[17px] text-terminal-neon neon-text tracking-widest transition-colors duration-500">SYS_MENU</span>
        </div>
        
        <!-- Navigasi Sidebar -->
        <nav class="flex-1 flex flex-col pt-6 space-y-3 px-2">
            
            <button id="nav-copasional" onclick="switchApp('copasional')" class="nav-btn flex items-center py-3.5 px-3 md:px-4 rounded-none text-terminal-neon/50 hover:bg-terminal-neon/10 hover:text-terminal-neon transition-all border-l-[3px] border-transparent relative group">
                <i class="fa-solid fa-clipboard text-xl w-6 text-center"></i>
                <span class="hidden md:inline ml-3 font-bold tracking-wide text-[14px]">COPASIONAL</span>
                <!-- Tooltip untuk Mobile -->
                <div class="absolute left-16 bg-terminal-card border border-terminal-neon text-terminal-neon px-2 py-1 text-xs opacity-0 group-hover:opacity-100 md:hidden pointer-events-none transition-opacity whitespace-nowrap z-50">COPASIONAL</div>
            </button>

            <button id="nav-kinerja" onclick="switchApp('kinerja')" class="nav-btn flex items-center py-3.5 px-3 md:px-4 rounded-none text-terminal-neon/50 hover:bg-terminal-neon/10 hover:text-terminal-neon transition-all border-l-[3px] border-transparent relative group">
                <i class="fa-solid fa-chart-line text-xl w-6 text-center"></i>
                <span class="hidden md:inline ml-3 font-bold tracking-wide text-[14px]">KINERJA HARIAN</span>
                <!-- Tooltip untuk Mobile -->
                <div class="absolute left-16 bg-terminal-card border border-terminal-neon text-terminal-neon px-2 py-1 text-xs opacity-0 group-hover:opacity-100 md:hidden pointer-events-none transition-opacity whitespace-nowrap z-50">KINERJA HARIAN</div>
            </button>

            <button id="nav-error" onclick="switchApp('error')" class="nav-btn flex items-center py-3.5 px-3 md:px-4 rounded-none text-terminal-neon/50 hover:bg-terminal-neon/10 hover:text-terminal-neon transition-all border-l-[3px] border-transparent relative group">
                <i class="fa-solid fa-bug text-xl w-6 text-center"></i>
                <span class="hidden md:inline ml-3 font-bold tracking-wide text-[14px]">ERROR BOOK</span>
                <!-- Tooltip untuk Mobile -->
                <div class="absolute left-16 bg-terminal-card border border-terminal-neon text-terminal-neon px-2 py-1 text-xs opacity-0 group-hover:opacity-100 md:hidden pointer-events-none transition-opacity whitespace-nowrap z-50">ERROR BOOK</div>
            </button>

        </nav>
        
        <!-- Status Indikator Bawah -->
        <div class="p-4 border-t border-terminal-dim flex items-center justify-center md:justify-start">
            <div class="w-3 h-3 rounded-full bg-terminal-neon animate-pulse mr-2 shadow-[0_0_8px_rgba(var(--neon-color-rgb),0.8)]"></div>
            <span class="hidden md:inline text-[11px] text-terminal-neon/70 font-mono">SYSTEM_ONLINE</span>
        </div>
    </aside>

    <!-- Wrapper Utama Aplikasi -->
    <div class="flex-1 bg-terminal-bg relative flex flex-col overflow-hidden min-w-0 transition-colors duration-500">
        
        <!-- Header (Navbar Area Utama) -->
        <header class="bg-terminal-bg sticky top-0 z-10 border-b border-terminal-neon px-4 h-[60px] md:h-[70px] flex items-center justify-between transition-colors duration-500 shadow-[0_4px_20px_-10px_rgba(var(--neon-color-rgb),0.3)]">
            <div class="w-10"></div> <!-- Spacer -->
            <h1 id="app-title" class="text-[13px] md:text-[18px] font-bold text-terminal-neon tracking-widest absolute left-1/2 transform -translate-x-1/2 w-max neon-text uppercase">
                &gt; MENGINISIALISASI...<span class="blinking-cursor">_</span>
            </h1>
            <button onclick="openModal()" class="bg-transparent border border-terminal-neon text-terminal-neon w-8 h-8 md:w-10 md:h-10 shadow-[0_0_5px_rgba(var(--neon-color-rgb),0.3)] flex items-center justify-center text-lg active:scale-95 transition-all hover:bg-terminal-neon hover:text-black z-20">
                <i class="fa-solid fa-plus"></i>
            </button>
        </header>

        <!-- Toast Notification -->
        <div id="toast" class="fixed top-20 left-1/2 transform -translate-x-1/2 bg-terminal-neon text-black px-5 py-2.5 rounded-none text-[14px] md:text-[15px] font-bold border-2 border-black z-50 transition-all duration-300 -translate-y-10 opacity-0 pointer-events-none shadow-[0_0_15px_rgba(var(--neon-color-rgb),0.8)]">
            [ OK ] Pesan
        </div>

        <!-- Area Utama (Daftar Catatan) -->
        <main class="flex-1 p-4 md:p-6 overflow-y-auto hide-scrollbar pb-24 md:pb-10" id="notes-container">
            <!-- Kartu catatan akan dimasukkan ke sini melalui JavaScript -->
        </main>

        <!-- Modal Tambah/Edit Catatan -->
        <div id="modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-30 hidden opacity-0 transition-opacity duration-300" onclick="closeModal()"></div>
        
        <div id="modal" class="fixed inset-x-0 bottom-0 z-40 bg-terminal-bg border-t-2 border-terminal-neon transform translate-y-full transition-transform duration-300 h-[85vh] flex flex-col w-full md:max-w-3xl lg:max-w-4xl mx-auto neon-border">
            <!-- Modal Header -->
            <div class="bg-terminal-card flex justify-between items-center p-4 border-b border-terminal-neon">
                <button onclick="closeModal()" class="text-terminal-neon/70 text-[14px] md:text-[16px] hover:text-terminal-neon hover:underline transition-all font-mono">[ ESC ]</button>
                <h2 class="font-bold text-[15px] md:text-[17px] text-terminal-neon tracking-wide neon-text" id="modal-title">NEW_ENTRY</h2>
                <button onclick="saveNote()" class="text-black bg-terminal-neon px-3 py-1.5 font-bold text-[14px] md:text-[15px] hover:bg-white transition-colors flex items-center">
                    SAVE <i class="fa-solid fa-play ml-2 text-xs"></i>
                </button>
            </div>
            
            <!-- Modal Body -->
            <div class="p-4 md:p-6 flex-1 flex flex-col overflow-y-auto hide-scrollbar">
                <input type="hidden" id="note-id">
                <input 
                    type="text" 
                    id="note-title" 
                    placeholder="Judul_File..." 
                    class="w-full bg-terminal-card border border-terminal-dim p-3.5 md:p-4 mb-4 text-[16px] md:text-[18px] font-medium focus:outline-none text-terminal-neon placeholder-terminal-dim neon-border-focus transition-all rounded-none"
                >
                <textarea 
                    id="note-content" 
                    placeholder="> Masukkan input data di sini..." 
                    class="w-full flex-1 min-h-[200px] bg-terminal-card border border-terminal-dim p-3.5 md:p-4 text-[14px] md:text-[16px] focus:outline-none text-terminal-neon placeholder-terminal-dim resize-none leading-relaxed neon-border-focus transition-all rounded-none font-mono"
                ></textarea>
            </div>
        </div>

        <!-- Alert Konfirmasi Hapus -->
        <div id="alert-overlay" class="fixed inset-0 bg-black/80 z-50 hidden items-center justify-center opacity-0 transition-opacity duration-300 pl-[70px] md:pl-64">
            <div id="alert-box" class="bg-terminal-bg border border-terminal-red w-[280px] md:w-[320px] text-center overflow-hidden transform scale-95 transition-transform duration-300 shadow-[0_0_20px_rgba(255,0,60,0.4)] rounded-none">
                <div class="p-5 md:p-6 border-b border-terminal-red/30">
                    <i class="fa-solid fa-triangle-exclamation text-terminal-red text-4xl mb-4 animate-pulse"></i>
                    <h3 class="font-bold text-[16px] md:text-[18px] text-terminal-red tracking-wider">SYSTEM_WARNING</h3>
                    <p class="text-[12px] md:text-[13px] text-terminal-red/70 mt-2 font-mono leading-relaxed">Data akan dihancurkan secara permanen. Eksekusi?</p>
                </div>
                <div class="flex">
                    <button onclick="closeDeleteAlert()" class="flex-1 p-3.5 md:p-4 text-terminal-neon/70 text-[14px] font-bold hover:bg-terminal-card transition-colors border-r border-terminal-red/30">CANCEL</button>
                    <button onclick="confirmDelete()" id="btn-confirm-delete" class="flex-1 p-3.5 md:p-4 bg-terminal-red text-black font-bold text-[14px] hover:bg-red-500 transition-colors">EXECUTE</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- KONFIGURASI MULTI-APP ---
        const appsConfig = {
            copasional: {
                id: 'copasional',
                title: "COPASIONAL",
                themeClass: "theme-orange",
                storageKey: "terminal_notes_copasional",
                inputPlaceholder: "> Paste teks untuk disalin di sini...",
                titlePlaceholder: "Judul_Copas..."
            },
            kinerja: {
                id: 'kinerja',
                title: "LAPORAN_KINERJA_HARIAN",
                themeClass: "theme-cyan",
                storageKey: "copasional_notes_html", // Mempertahankan key lama agar data sebelumnya tidak hilang
                inputPlaceholder: "> Masukkan detail laporan kinerja harian di sini...",
                titlePlaceholder: "Judul_Laporan..."
            },
            error: {
                id: 'error',
                title: "ERROR_BOOK",
                themeClass: "theme-green",
                storageKey: "terminal_notes_error",
                inputPlaceholder: "> Masukkan log error sistem di sini...",
                titlePlaceholder: "Judul_Error..."
            }
        };

        // State Global
        let currentApp = 'kinerja'; // Default aktif
        let notes = [];
        let noteToDelete = null;

        // --- SISTEM INISIALISASI & TEMA ---
        function switchApp(appId) {
            currentApp = appId;
            const config = appsConfig[appId];

            // 1. Ubah Tema CSS (Warna)
            const body = document.getElementById('app-body');
            body.classList.remove('theme-orange', 'theme-cyan', 'theme-green');
            body.classList.add(config.themeClass);

            // 2. Ubah Judul Header dengan animasi kursor
            document.getElementById('app-title').innerHTML = `&gt; ${config.title}<span class="blinking-cursor">_</span>`;
            document.title = config.title;

            // 3. Update Input Placeholders di Modal
            document.getElementById('note-title').placeholder = config.titlePlaceholder;
            document.getElementById('note-content').placeholder = config.inputPlaceholder;

            // 4. Update UI Active State di Sidebar
            updateSidebarUI();

            // 5. Muat Data sesuai App yang dipilih
            loadNotes();
        }

        function updateSidebarUI() {
            // Reset semua tombol
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-terminal-neon/10', 'text-terminal-neon', 'border-terminal-neon', 'neon-bg-glow');
                btn.classList.add('text-terminal-neon/50', 'border-transparent');
            });
            
            // Aktifkan tombol yang dipilih
            const activeBtn = document.getElementById(`nav-${currentApp}`);
            if (activeBtn) {
                activeBtn.classList.remove('text-terminal-neon/50', 'border-transparent');
                activeBtn.classList.add('bg-terminal-neon/10', 'text-terminal-neon', 'border-terminal-neon', 'neon-bg-glow');
            }
        }

        // --- MANAJEMEN DATA STORAGE ---
        function loadNotes() {
            const config = appsConfig[currentApp];
            const savedNotes = localStorage.getItem(config.storageKey);
            if (savedNotes) {
                try {
                    notes = JSON.parse(savedNotes);
                } catch (e) {
                    notes = [];
                }
            } else {
                notes = [];
            }
            renderNotes();
        }

        function saveToLocal() {
            const config = appsConfig[currentApp];
            localStorage.setItem(config.storageKey, JSON.stringify(notes));
            renderNotes();
        }

        // --- HELPERS FORMATTING ---
        function formatDateTime(timestamp) {
            const date = new Date(timestamp);
            const options = { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            return date.toLocaleDateString('id-ID', options).replace(/\./g, ':');
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[tag] || tag));
        }

        // --- RENDER LOGIC UTAMA ---
        function renderNotes() {
            const container = document.getElementById('notes-container');
            container.innerHTML = '';

            if (notes.length === 0) {
                container.className = 'flex-1 p-4 md:p-6 overflow-y-auto hide-scrollbar pb-24 md:pb-10 flex flex-col items-center justify-center';
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-terminal-dim transition-colors duration-500">
                        <i class="fa-solid fa-server text-5xl md:text-6xl mb-4 opacity-50 neon-text"></i>
                        <p class="font-bold text-[16px] md:text-[18px] text-terminal-neon/60 tracking-widest">[ DB_EMPTY ]</p>
                        <p class="text-[13px] md:text-[15px] mt-2 text-center px-4 font-mono">No records found. Click [+] to initialize data.</p>
                    </div>
                `;
                return;
            }

            container.className = 'flex-1 p-4 md:p-6 overflow-y-auto hide-scrollbar pb-24 md:pb-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3 gap-4 md:gap-5 items-start content-start';

            notes.sort((a, b) => b.timestamp - a.timestamp).forEach(note => {
                const card = document.createElement('div');
                card.className = 'bg-terminal-card border border-terminal-dim overflow-hidden transition-colors duration-300 hover:border-terminal-neon rounded-none group';
                
                let displayTitle = 'UNNAMED_RECORD';
                if (note.title) {
                    displayTitle = escapeHTML(note.title);
                } else if (note.content) {
                    const words = note.content.trim().split(/\s+/);
                    displayTitle = escapeHTML(words.slice(0, 2).join('_'));
                    if (words.length > 2) displayTitle += '...';
                }

                card.innerHTML = `
                    <div class="accordion-toolbar" id="toolbar-${note.id}">
                        <div class="toolbar-inner">
                            <div class="bg-black px-4 py-2 border-b border-terminal-dim flex justify-between items-center transition-colors">
                                <button onclick="copyNote(${note.id})" class="text-terminal-neon/80 text-[12px] md:text-[13px] flex items-center font-bold hover:text-white transition-colors">
                                    <i class="fa-regular fa-copy mr-1.5"></i> COPY
                                </button>
                                <div class="flex space-x-4">
                                    <button onclick="openModal(${note.id})" class="text-terminal-neon/80 text-[12px] md:text-[13px] flex items-center font-bold hover:text-white transition-colors">
                                        <i class="fa-solid fa-pen-nib mr-1.5"></i> EDIT
                                    </button>
                                    <button onclick="openDeleteAlert(${note.id})" class="text-terminal-red/80 text-[12px] md:text-[13px] flex items-center font-bold hover:text-terminal-red transition-colors">
                                        <i class="fa-solid fa-xmark mr-1.5"></i> DEL
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="px-4 py-3.5 md:px-5 md:py-4 flex justify-between items-center cursor-pointer hover:bg-terminal-neon/10 transition-colors border-l-2 border-transparent group-hover:border-terminal-neon" onclick="toggleAccordion(${note.id})">
                        <div class="flex-1 pr-3 overflow-hidden">
                            <h3 class="font-bold text-[15px] md:text-[16px] text-terminal-neon truncate neon-text">${displayTitle}</h3>
                            <p class="text-[11px] md:text-[12px] text-terminal-neon/60 mt-1 font-mono">SYS.TIME: ${formatDateTime(note.timestamp)}</p>
                        </div>
                        <i class="fa-solid fa-chevron-down text-terminal-neon/60 text-sm chevron-icon" id="icon-${note.id}"></i>
                    </div>
                    
                    <div class="accordion-content" id="content-${note.id}">
                        <div class="accordion-inner">
                            <div class="px-4 pt-2 pb-4 md:px-5 md:pt-3 md:pb-5 border-t border-terminal-dim border-dashed bg-[#050505]">
                                <p class="text-[13px] md:text-[14px] text-terminal-neon/90 whitespace-pre-wrap break-words font-mono leading-relaxed">${escapeHTML(note.content)}</p>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- INTERAKSI UI ---
        function toggleAccordion(id) {
            const toolbar = document.getElementById(`toolbar-${id}`);
            const content = document.getElementById(`content-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            
            toolbar.classList.toggle('open');
            content.classList.toggle('open');
            icon.classList.toggle('open');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = `[ OK ] ${message}`;
            
            toast.classList.remove('-translate-y-10', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            setTimeout(() => {
                toast.classList.add('-translate-y-10', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 2500);
        }

        function copyNote(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;

            const textToCopy = note.title ? `${note.title}\n\n${note.content}` : note.content;
            
            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            textArea.style.position = "fixed";
            textArea.style.top = "0";
            textArea.style.left = "0";
            
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                document.execCommand('copy');
                showToast("DATA_COPIED_TO_CLIPBOARD");
            } catch (err) {
                showToast("COPY_FAILED");
            }
            
            document.body.removeChild(textArea);
        }

        // --- MANAJEMEN MODAL ---
        function openModal(id = null) {
            const overlay = document.getElementById('modal-overlay');
            const modal = document.getElementById('modal');
            const titleInput = document.getElementById('note-title');
            const contentInput = document.getElementById('note-content');
            const idInput = document.getElementById('note-id');
            const modalTitle = document.getElementById('modal-title');

            if (id) {
                const note = notes.find(n => n.id === id);
                if(note) {
                    idInput.value = note.id;
                    titleInput.value = note.title;
                    contentInput.value = note.content;
                    modalTitle.innerText = "EDIT_MODE";
                }
            } else {
                idInput.value = "";
                titleInput.value = "";
                contentInput.value = "";
                modalTitle.innerText = "NEW_ENTRY";
            }

            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                modal.classList.remove('translate-y-full');
            }, 10);
            
            setTimeout(() => {
                contentInput.focus();
            }, 300);
        }

        function closeModal() {
            const overlay = document.getElementById('modal-overlay');
            const modal = document.getElementById('modal');

            overlay.classList.add('opacity-0');
            modal.classList.add('translate-y-full');
            
            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 300);
        }

        function saveNote() {
            const idInput = document.getElementById('note-id').value;
            const title = document.getElementById('note-title').value.trim();
            const content = document.getElementById('note-content').value.trim();

            if (!title && !content) {
                showToast("EMPTY_INPUT_DENIED");
                return;
            }

            if (idInput) {
                const index = notes.findIndex(n => n.id === parseInt(idInput));
                if (index !== -1) {
                    notes[index].title = title;
                    notes[index].content = content;
                    notes[index].timestamp = Date.now();
                }
                showToast("RECORD_UPDATED");
            } else {
                const newNote = {
                    id: Date.now(),
                    title: title,
                    content: content,
                    timestamp: Date.now()
                };
                notes.push(newNote);
                showToast("RECORD_SAVED");
            }

            saveToLocal();
            closeModal();
        }

        // --- MANAJEMEN ALERT HAPUS ---
        function openDeleteAlert(id) {
            noteToDelete = id;
            const overlay = document.getElementById('alert-overlay');
            const box = document.getElementById('alert-box');

            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                box.classList.remove('scale-95');
            }, 10);
        }

        function closeDeleteAlert() {
            noteToDelete = null;
            const overlay = document.getElementById('alert-overlay');
            const box = document.getElementById('alert-box');

            overlay.classList.add('opacity-0');
            box.classList.add('scale-95');
            
            setTimeout(() => {
                overlay.classList.add('hidden');
                overlay.classList.remove('flex');
            }, 300);
        }

        function confirmDelete() {
            if (noteToDelete) {
                notes = notes.filter(n => n.id !== noteToDelete);
                saveToLocal();
                showToast("RECORD_DELETED");
                closeDeleteAlert();
            }
        }

        // EKSEKUSI AWAL
        window.onload = () => {
            // Inisialisasi Aplikasi ke Laporan Kinerja (Sidebar 2)
            switchApp('kinerja');
        };
    </script>
</body>
</html>
