<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Simple Categorized Notes</title>
    
    <!-- Google Fonts: Space Grotesk -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar { width: 0px; height: 0px; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .modal-enter { transform: translateY(100%); opacity: 0; transition: all 0.3s ease-out; }
        .modal-active { transform: translateY(0); opacity: 1; }
        
        .glass-header {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .dark .glass-header {
            background-color: rgba(17, 24, 39, 0.85);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .accordion-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .accordion-content.open { grid-template-rows: 1fr; }
        .accordion-inner { overflow: hidden; }

        .chevron-icon { transition: transform 0.3s ease; }
        .chevron-icon.open { transform: rotate(180deg); }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden bg-[#F2F2F7] dark:bg-gray-900 transition-colors duration-300">

    <!-- Header dengan Tombol Aksi -->
    <header class="glass-header fixed top-0 w-full z-20 h-14 flex items-center justify-between px-4 md:px-5">
        <h1 class="text-[17px] font-bold text-gray-800 dark:text-white tracking-tight">My Notes</h1>
        
        <div class="flex items-center space-x-3">
            <input type="file" id="import-file" accept=".json" class="hidden" onchange="importData(event)">
            
            <button onclick="document.getElementById('import-file').click()" class="w-8 h-8 flex items-center justify-center text-gray-500 dark:text-gray-400 active:opacity-50 text-[18px]" title="Import Data">
                <i class="fa-solid fa-cloud-arrow-up"></i>
            </button>
            <button onclick="exportData()" class="w-8 h-8 flex items-center justify-center text-gray-500 dark:text-gray-400 active:opacity-50 text-[18px]" title="Export Data">
                <i class="fa-solid fa-cloud-arrow-down"></i>
            </button>
            
            <div class="w-px h-5 bg-gray-300 dark:bg-gray-700 mx-1"></div>
            
            <button onclick="toggleTheme()" id="btn-theme" class="w-8 h-8 flex items-center justify-center text-yellow-500 active:opacity-50 text-[18px]" title="Ubah Tema">
                <i class="fa-solid fa-sun" id="theme-icon"></i>
            </button>

            <button onclick="toggleGroupView()" id="btn-group" class="w-8 h-8 flex items-center justify-center text-indigo-500 active:opacity-50 text-[18px]" title="Kategorikan">
                <i class="fa-solid fa-layer-group"></i>
            </button>
            <button onclick="openModal()" class="w-8 h-8 flex items-center justify-center text-blue-600 dark:text-blue-400 active:opacity-50 text-[24px]" title="Tambah Catatan">
                <i class="fa-solid fa-circle-plus"></i>
            </button>
        </div>
    </header>

    <!-- Area Utama -->
    <main class="flex-1 overflow-y-auto hide-scrollbar pt-16 pb-10 px-4" id="main-area">
        <div id="notes-container" class="w-full max-w-3xl mx-auto space-y-4">
            <!-- Catatan akan di-render di sini via JavaScript -->
        </div>
    </main>

    <!-- MODAL TAMBAH/EDIT CATATAN -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/50 dark:bg-black/70 z-30 hidden opacity-0 transition-opacity duration-300" onclick="closeModal()"></div>
    
    <div id="modal" class="fixed inset-x-0 bottom-0 z-40 bg-white dark:bg-gray-800 rounded-t-3xl h-[85vh] md:max-w-2xl md:mx-auto shadow-2xl modal-enter flex flex-col transition-colors">
        <div class="flex justify-between items-center px-5 py-4 border-b border-gray-100 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 rounded-t-3xl shrink-0">
            <button onclick="closeModal()" class="text-gray-500 dark:text-gray-400 font-medium">Batal</button>
            <h2 class="font-semibold text-[17px] text-gray-800 dark:text-white" id="modal-title">Buat Catatan</h2>
            <button onclick="saveNote()" class="text-blue-600 dark:text-blue-400 font-bold">Simpan</button>
        </div>
        
        <div class="p-5 flex-1 overflow-y-auto hide-scrollbar bg-white dark:bg-gray-800">
            <input type="hidden" id="note-id">
            
            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-1">Pilih Kategori</label>
                <div class="relative">
                    <select id="note-category" onchange="toggleInputFields()" class="w-full appearance-none bg-gray-100 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-200 py-3 px-4 rounded-xl font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white dark:focus:bg-gray-600 transition-colors">
                        <option value="copas">📋 Copas</option>
                        <option value="carousel">🗂️ Carousel Notes</option>
                        <option value="mypassword">🔑 My Password</option>
                        <option value="revisi">🔄 Revisi</option>
                        <option value="ideation">💡 Ideation</option>
                        <option value="oneshot">🎯 One Shot</option>
                        <option value="error">🐛 Error Book</option>
                        <option value="myprompt">⌨️ My Prompt</option>
                        <option value="myinstruction">💻 Instruction</option>
                        <option value="mylink">🔗 My Link</option>
                        <option value="memo">📝 Memo Tasks</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500 dark:text-gray-400">
                        <i class="fa-solid fa-chevron-down text-sm"></i>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <input type="text" id="note-title" placeholder="Judul Catatan..." class="w-full text-[20px] font-bold focus:outline-none text-black dark:text-white bg-transparent placeholder-gray-300 dark:placeholder-gray-500 py-2 border-b border-gray-100 dark:border-gray-700">
            </div>

            <!-- Bagian Lampiran -->
            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-2">Lampiran (Maks 2MB/File)</label>
                <div class="flex space-x-2 mb-2">
                    <button onclick="document.getElementById('attach-image').click()" class="bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 px-3 py-2 rounded-lg text-sm font-medium transition"><i class="fa-solid fa-image text-blue-500 dark:text-blue-400 mr-1"></i> Gambar</button>
                    <button onclick="document.getElementById('attach-file').click()" class="bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 px-3 py-2 rounded-lg text-sm font-medium transition"><i class="fa-solid fa-paperclip text-purple-500 dark:text-purple-400 mr-1"></i> File</button>
                    <input type="file" id="attach-image" accept="image/*" class="hidden" onchange="handleFileUpload(event, 'image')" multiple>
                    <input type="file" id="attach-file" accept=".txt,.pdf,.html,.json,.doc,.docx,.xls,.xlsx,.csv" class="hidden" onchange="handleFileUpload(event, 'file')" multiple>
                </div>
                <div id="attachment-preview" class="flex flex-wrap gap-2"></div>
            </div>
            
            <!-- Mode Teks Biasa -->
            <div id="normal-input-container" class="w-full flex-col flex h-48">
                <textarea id="note-content" placeholder="Ketik isi catatan di sini..." class="w-full h-full text-[16px] focus:outline-none text-gray-700 dark:text-gray-200 placeholder-gray-300 dark:placeholder-gray-500 resize-none leading-relaxed bg-gray-50 dark:bg-gray-700 p-3 rounded-xl border border-gray-100 dark:border-gray-600"></textarea>
            </div>

            <!-- Mode Carousel -->
            <div id="carousel-input-container" class="w-full flex-col hidden pb-5">
                <div class="flex justify-between items-center mb-3">
                    <label class="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider">Isi Kartu Carousel</label>
                    <div class="flex items-center space-x-2 bg-gray-100 dark:bg-gray-700 rounded-lg p-1 border border-gray-200 dark:border-gray-600">
                        <button onclick="changeCarouselCount(-1)" class="w-7 h-7 flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 rounded active:scale-95 transition-all"><i class="fa-solid fa-minus text-xs"></i></button>
                        <span id="carousel-count-display" class="text-sm font-bold text-gray-800 dark:text-gray-200 w-6 text-center">3</span>
                        <button onclick="changeCarouselCount(1)" class="w-7 h-7 flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 rounded active:scale-95 transition-all"><i class="fa-solid fa-plus text-xs"></i></button>
                    </div>
                </div>
                <div id="carousel-cards-wrapper" class="space-y-3">
                    <!-- Carousel inputs di-inject via JS -->
                </div>
            </div>
            
            <!-- Mode My Password -->
            <div id="mypassword-input-container" class="w-full flex-col hidden space-y-4 pb-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase mb-1">Username / Email</label>
                    <input type="text" id="pw-username" placeholder="Masukkan Username..." class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-100 dark:border-gray-600 p-3 rounded-xl text-[15px] text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase mb-1">Password</label>
                    <input type="text" id="pw-password" placeholder="Masukkan Password..." class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-100 dark:border-gray-600 p-3 rounded-xl text-[15px] text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase mb-1">Link / URL</label>
                    <input type="url" id="pw-link" placeholder="https://..." class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-100 dark:border-gray-600 p-3 rounded-xl text-[15px] text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <!-- Mode Revisi -->
            <div id="revisi-input-container" class="w-full flex-col hidden space-y-4 pb-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase mb-1">Tujuan Revisi</label>
                    <input type="text" id="rev-tujuan" placeholder="Misal: Perbaiki grammar, kurangi pengulangan..." class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-100 dark:border-gray-600 p-3 rounded-xl text-[15px] text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase mb-1">Teks Utama</label>
                    <textarea id="rev-content" placeholder="Ketik teks yang akan atau telah direvisi..." class="w-full h-40 bg-gray-50 dark:bg-gray-700 border border-gray-100 dark:border-gray-600 p-3 rounded-xl text-[15px] text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none leading-relaxed"></textarea>
                </div>
            </div>

            <!-- Mode One Shot -->
            <div id="oneshot-input-container" class="w-full flex-col hidden pb-5 items-center justify-center py-6">
                <div class="w-20 h-20 bg-rose-100 dark:bg-rose-900/30 text-rose-500 rounded-full flex items-center justify-center text-4xl mb-4">🎯</div>
                <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2">Mode Anti-Distraksi</h3>
                <p class="text-center text-sm text-gray-500 dark:text-gray-400 mb-6 px-4">Teks akan otomatis hilang per kata saat Anda menekan spasi untuk melatih aliran ide tanpa henti.</p>
                <button onclick="openOneShotFullscreen()" class="bg-rose-500 hover:bg-rose-600 text-white px-8 py-3.5 rounded-2xl font-bold transition-colors shadow-lg active:scale-95 w-full md:w-auto flex items-center justify-center">
                    <i class="fa-solid fa-expand mr-2"></i> Buka Kanvas One Shot
                </button>
            </div>
        </div>
    </div>

    <!-- CUSTOM DELETE ALERT OVERLAY -->
    <div id="delete-alert-overlay" class="fixed inset-0 bg-black/50 dark:bg-black/70 z-50 hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <div id="delete-alert-box" class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300">
            <div class="p-6 text-center">
                <div class="w-16 h-16 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center mx-auto mb-4 text-red-500">
                    <i class="fa-solid fa-triangle-exclamation text-3xl"></i>
                </div>
                <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2">Hapus Catatan?</h3>
                <p class="text-sm text-gray-500 dark:text-gray-400">Tindakan ini tidak dapat dibatalkan. Catatan akan dihapus permanen.</p>
            </div>
            <div class="flex border-t border-gray-100 dark:border-gray-700">
                <button onclick="closeDeleteAlert()" class="flex-1 py-3.5 text-gray-600 dark:text-gray-400 font-medium hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors border-r border-gray-100 dark:border-gray-700">Batal</button>
                <button onclick="confirmDelete()" class="flex-1 py-3.5 text-red-600 dark:text-red-500 font-bold hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">Hapus</button>
            </div>
        </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 dark:bg-white text-white dark:text-gray-900 px-5 py-3 rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] transition-all duration-300 translate-y-20 opacity-0 z-50 flex items-center pointer-events-none">
        <i class="fa-solid fa-check-circle text-green-400 dark:text-green-500 text-lg mr-3"></i>
        <span id="toast-message" class="text-[14px] font-medium">Teks berhasil disalin!</span>
    </div>

    <!-- CUSTOM ONE SHOT FULLSCREEN KANVAS -->
    <div id="oneshot-fullscreen-overlay" class="fixed inset-0 bg-[#F2F2F7] dark:bg-gray-900 z-[100] hidden flex-col transition-opacity duration-300 opacity-0">
        <!-- Floating Header/Controls -->
        <div class="absolute top-6 left-6 right-6 flex justify-between items-center z-30 pointer-events-none">
            <div id="oneshot-fs-stats" class="text-sm font-bold text-rose-500 bg-rose-100 dark:bg-rose-900/30 px-4 py-2 rounded-full shadow-sm pointer-events-auto">0 Kata</div>
            <button onclick="closeOneShotFullscreen()" class="w-12 h-12 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full shadow-lg flex items-center justify-center text-gray-800 dark:text-white hover:scale-105 active:scale-95 transition pointer-events-auto" title="Selesai / Keluar Kanvas">
                <i class="fa-solid fa-check text-xl"></i>
            </button>
        </div>

        <!-- Hidden content store -->
        <textarea id="oneshot-fs-hidden" class="hidden"></textarea>

        <!-- Big Input Centered -->
        <div class="flex-1 flex items-center justify-center p-8 relative overflow-hidden z-10">
            <div id="oneshot-fs-visible" contenteditable="true" oninput="handleOneShotInput(event)" class="w-full max-w-5xl mx-auto text-center text-5xl md:text-[6vw] font-black text-gray-800 dark:text-gray-200 focus:outline-none empty:before:content-[attr(data-placeholder)] empty:before:text-gray-300 dark:empty:before:text-gray-700 leading-tight break-words" data-placeholder="Ketik di sini..."></div>
        </div>

        <!-- Preview Box (Absolute Centered) -->
        <div id="oneshot-fs-preview-box" class="absolute inset-x-6 top-24 bottom-28 md:inset-x-24 md:top-32 md:bottom-32 bg-white/90 dark:bg-gray-800/90 backdrop-blur-md rounded-3xl shadow-2xl p-8 hidden overflow-y-auto text-lg md:text-2xl leading-relaxed text-gray-800 dark:text-gray-200 z-20 border border-gray-200 dark:border-gray-700"></div>

        <!-- Floating Bottom Control -->
        <div class="absolute bottom-8 left-1/2 transform -translate-x-1/2 z-30 pointer-events-auto">
            <button onclick="toggleOneShotPreview()" id="btn-oneshot-preview" class="bg-gray-800 dark:bg-white text-white dark:text-gray-900 px-6 py-3 rounded-full font-bold shadow-xl hover:scale-105 active:scale-95 transition flex items-center text-sm md:text-base">
                <i class="fa-solid fa-eye mr-2"></i> <span id="oneshot-preview-btn-text">Intip Teks</span>
            </button>
        </div>
    </div>

    <input type="file" id="carousel-image-input" accept="image/*" class="hidden" onchange="handleCarouselImageUpload(event)">

    <!-- CUSTOM EDIT CAROUSEL CARD MODAL -->
    <div id="edit-card-overlay" class="fixed inset-0 bg-black/50 dark:bg-black/70 z-50 hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <div id="edit-card-box" class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300 flex flex-col">
            <div class="px-5 py-4 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-gray-900">
                <h3 class="font-bold text-gray-900 dark:text-white">Edit Kartu Carousel</h3>
                <button onclick="closeEditCarouselCardModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="p-5 flex-1 bg-white dark:bg-gray-800">
                <textarea id="edit-card-textarea" placeholder="Isi kartu..." class="w-full h-32 bg-gray-50 dark:bg-gray-700 border border-gray-100 dark:border-gray-600 p-3 rounded-xl text-[15px] text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
            </div>
            <div class="flex border-t border-gray-100 dark:border-gray-700">
                <button onclick="closeEditCarouselCardModal()" class="flex-1 py-3.5 text-gray-600 dark:text-gray-400 font-medium hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors border-r border-gray-100 dark:border-gray-700">Batal</button>
                <button onclick="saveEditCarouselCard()" class="flex-1 py-3.5 text-blue-600 dark:text-blue-500 font-bold hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-colors">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        const categories = {
            copas: { title: "Copas", icon: "📋", color: "text-green-500 dark:text-green-400", bg: "bg-green-100 dark:bg-green-900/30" },
            carousel: { title: "Carousel Notes", icon: "🗂️", color: "text-pink-500 dark:text-pink-400", bg: "bg-pink-100 dark:bg-pink-900/30" },
            mypassword: { title: "My Password", icon: "🔑", color: "text-teal-500 dark:text-teal-400", bg: "bg-teal-100 dark:bg-teal-900/30" },
            revisi: { title: "Revisi", icon: "🔄", color: "text-cyan-500 dark:text-cyan-400", bg: "bg-cyan-100 dark:bg-cyan-900/30" },
            ideation: { title: "Ideation", icon: "💡", color: "text-amber-500 dark:text-amber-400", bg: "bg-amber-100 dark:bg-amber-900/30" },
            oneshot: { title: "One Shot", icon: "🎯", color: "text-rose-500 dark:text-rose-400", bg: "bg-rose-100 dark:bg-rose-900/30" },
            error: { title: "Error Book", icon: "🐛", color: "text-red-500 dark:text-red-400", bg: "bg-red-100 dark:bg-red-900/30" },
            myprompt: { title: "My Prompt", icon: "⌨️", color: "text-orange-500 dark:text-orange-400", bg: "bg-orange-100 dark:bg-orange-900/30" },
            myinstruction: { title: "Instruction", icon: "💻", color: "text-indigo-500 dark:text-indigo-400", bg: "bg-indigo-100 dark:bg-indigo-900/30" },
            mylink: { title: "My Link", icon: "🔗", color: "text-purple-500 dark:text-purple-400", bg: "bg-purple-100 dark:bg-purple-900/30" },
            memo: { title: "Memo Tasks", icon: "📝", color: "text-yellow-500 dark:text-yellow-400", bg: "bg-yellow-100 dark:bg-yellow-900/30" }
        };

        let notes = [];
        const STORAGE_KEY = "simple_app_notes";
        
        let isGrouped = false; 
        let openNotes = new Set();
        let openCategories = new Set();
        
        let currentAttachments = [];
        let currentCarouselImages = {}; 
        let currentCarouselCount = 3; 
        let toastTimeout;
        let noteIdToDelete = null;
        let activeCarouselEdit = { noteId: null, cardId: null };

        window.onload = () => {
            initTheme();
            loadNotes();
        };

        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            
            if (savedTheme === 'light') {
                html.classList.remove('dark');
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
                document.getElementById('btn-theme').classList.replace('text-yellow-500', 'text-gray-500');
            } else {
                html.classList.add('dark');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
                document.getElementById('btn-theme').classList.replace('text-gray-500', 'text-yellow-500');
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            const btn = document.getElementById('btn-theme');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
                btn.classList.replace('text-yellow-500', 'text-gray-500');
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
                btn.classList.replace('text-gray-500', 'text-yellow-500');
                localStorage.setItem('theme', 'dark');
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').innerText = message;
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-20', 'opacity-0');

        function handleOneShotInput(e) {
            const visibleEl = document.getElementById('oneshot-fs-visible');
            const hiddenEl = document.getElementById('oneshot-fs-hidden');
            // Ganti spasi non-breaking bawaan contenteditable agar deteksi regex presisi
            let val = visibleEl.innerText.replace(/\u00A0/g, " "); 

            if (val.includes(' ') || val.includes('\n')) {
                // Regex memisahkan teks menjadi dua grup: 
                // Grup 1: teks sebelumnya beserta spasinya, Grup 2: kata terakhir yang sedang diketik
                const match = val.match(/^(.*[\s\n]+)([^\s\n]*)$/);
                if (match) {
                    hiddenEl.value += match[1];
                    visibleEl.innerText = match[2];
                    placeCaretAtEnd(visibleEl);
                }
            }
            updateOneShotStats();
            
            const box = document.getElementById('oneshot-fs-preview-box');
            if (!box.classList.contains('hidden')) {
                box.innerText = hiddenEl.value + visibleEl.innerText;
            }
        }

        function placeCaretAtEnd(el) {
            el.focus();
            if (typeof window.getSelection !== "undefined" && typeof document.createRange !== "undefined") {
                const range = document.createRange();
                range.selectNodeContents(el);
                range.collapse(false);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            }
        }

        function updateOneShotStats() {
            const hiddenVal = document.getElementById('oneshot-fs-hidden')?.value || "";
            const visibleVal = document.getElementById('oneshot-fs-visible')?.innerText || "";
            const text = (hiddenVal + visibleVal).trim();
            const wordCount = text ? text.split(/\s+/).length : 0;
            const statEl = document.getElementById('oneshot-fs-stats');
            if(statEl) statEl.innerText = `${wordCount} Kata`;
        }

        function toggleOneShotPreview() {
            const box = document.getElementById('oneshot-fs-preview-box');
            const hidden = document.getElementById('oneshot-fs-hidden');
            const visible = document.getElementById('oneshot-fs-visible');
            const btnText = document.getElementById('oneshot-preview-btn-text');
            const btnIcon = document.querySelector('#btn-oneshot-preview i');

            if (box.classList.contains('hidden')) {
                box.innerText = hidden.value + visible.innerText;
                box.classList.remove('hidden');
                btnText.innerText = "Tutup Intip";
                btnIcon.className = "fa-solid fa-eye-slash mr-2";
            } else {
                box.classList.add('hidden');
                btnText.innerText = "Intip Teks";
                btnIcon.className = "fa-solid fa-eye mr-2";
                placeCaretAtEnd(visible);
            }
        }

        function toggleInputFields() {

        function changeCarouselCount(delta) {
            const newCount = currentCarouselCount + delta;
            if (newCount < 1 || newCount > 20) {
                if (newCount > 20) showToast("Maksimal 20 kartu.");
                return;
            }
            
            const wrapper = document.getElementById('carousel-cards-wrapper');
            const captionEl = document.getElementById('car-input-group-caption');
            
            if (delta > 0) {
                currentCarouselCount++;
                wrapper.insertBefore(createCarouselInputGroup(currentCarouselCount, currentCarouselCount), captionEl);
            } else {
                const lastChild = document.getElementById(`car-input-group-${currentCarouselCount}`);
                if (lastChild) wrapper.removeChild(lastChild);
                delete currentCarouselImages[currentCarouselCount]; 
                currentCarouselCount--;
            }
            document.getElementById('carousel-count-display').innerText = currentCarouselCount;
        }

        function handleModalCarouselImage(event, index) {
            const file = event.target.files[0];
            if (!file) return;
            if (file.size > 1024 * 1024 * 2) {
                showToast('Gambar terlalu besar (Maks 2MB).');
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                currentCarouselImages[index] = e.target.result;
                renderModalCarouselImagePreview(index);
            };
            reader.readAsDataURL(file);
            event.target.value = '';
        }

        function removeModalCarouselImage(index) {
            delete currentCarouselImages[index];
            renderModalCarouselImagePreview(index);
        }

        function renderModalCarouselImagePreview(index) {
            const box = document.getElementById(`car-img-preview-box-${index}`);
            const img = document.getElementById(`car-img-preview-src-${index}`);
            if (!box || !img) return; 

            if (currentCarouselImages[index]) {
                img.src = currentCarouselImages[index];
                box.classList.remove('hidden');
            } else {
                img.src = '';
                box.classList.add('hidden');
            }
        }

        function handleFileUpload(event, type) {
            const files = event.target.files;
            if (!files) return;

            Array.from(files).forEach(file => {
                if (file.size > 1024 * 1024 * 2) { 
                    showToast(`File ${file.name} terlalu besar (Maks 2MB).`);
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentAttachments.push({
                        id: Date.now() + Math.random(),
                        type: type,
                        name: file.name,
                        data: e.target.result,
                        mimeType: file.type
                    });
                    renderAttachmentPreview();
                };
                reader.readAsDataURL(file);
            });
            event.target.value = ''; 
        }

        // --- STREAMING_CHUNK:Handling Note Creation Modal lifecycle... ---
        function openModal(editId = null) {
            const overlay = document.getElementById('modal-overlay');
            const modal = document.getElementById('modal');
            
            document.getElementById('note-id').value = "";
            document.getElementById('note-title').value = "";
            document.getElementById('note-content').value = "";
            
            if (document.getElementById('pw-username')) {
                document.getElementById('pw-username').value = "";
                document.getElementById('pw-password').value = "";
                document.getElementById('pw-link').value = "";
            }
            if (document.getElementById('rev-tujuan')) {
                document.getElementById('rev-tujuan').value = "";
                document.getElementById('rev-content').value = "";
            }
            if (document.getElementById('oneshot-fs-hidden')) {
                document.getElementById('oneshot-fs-hidden').value = "";
                document.getElementById('oneshot-fs-visible').innerText = "";
                updateOneShotStats();
                document.getElementById('oneshot-fs-preview-box').classList.add('hidden');
            }
            
            currentAttachments = []; 
            currentCarouselImages = {}; 
            
            document.getElementById('modal-title').innerText = "Buat Catatan";
            let targetCarouselCount = 3; 

            if (editId) {
                const note = notes.find(n => n.id === editId);
                if (note) {
                    document.getElementById('note-id').value = note.id;
                    document.getElementById('note-title').value = note.title;
                    document.getElementById('note-category').value = note.category;
                    document.getElementById('modal-title').innerText = "Edit Catatan";
                    
                    if (note.attachments) currentAttachments = [...note.attachments];

                    if (note.category === 'carousel') {
                        let parsed = [];
                        try { parsed = JSON.parse(note.content); } catch(e) {}
                        
                        const regularCards = parsed.filter(c => !c.isCaption);
                        const captionCard = parsed.find(c => c.isCaption);
                        
                        if (regularCards.length > 0) targetCarouselCount = regularCards.length;
                        initCarouselInputs(targetCarouselCount); 

                        for(let i=1; i<=targetCarouselCount; i++) {
                            if (regularCards[i-1]) {
                                document.getElementById(`car-content-${i}`).value = regularCards[i-1].content || '';
                                if (regularCards[i-1].image) {
                                    currentCarouselImages[i] = regularCards[i-1].image;
                                    renderModalCarouselImagePreview(i);
                                }
                            }
                        }
                        
                        if (captionCard) {
                            const capEl = document.getElementById('car-content-caption');
                            if (capEl) capEl.value = captionCard.content || '';
                            if (captionCard.image) {
                                currentCarouselImages['caption'] = captionCard.image;
                                renderModalCarouselImagePreview('caption');
                            }
                        }
                    } else if (note.category === 'mypassword') {
                        let pwData = { username: '', password: '', link: '' };
                        try { pwData = JSON.parse(note.content); } catch(e) {}
                        if (document.getElementById('pw-username')) {
                            document.getElementById('pw-username').value = pwData.username || '';
                            document.getElementById('pw-password').value = pwData.password || '';
                            document.getElementById('pw-link').value = pwData.link || '';
                        }
                        initCarouselInputs(targetCarouselCount);
                    } else if (note.category === 'revisi') {
                        let revData = { tujuan: '', content: '' };
                        try { revData = JSON.parse(note.content); } catch(e) {}
                        if (document.getElementById('rev-tujuan')) {
                            document.getElementById('rev-tujuan').value = revData.tujuan || '';
                            document.getElementById('rev-content').value = revData.content || '';
                        }
                        initCarouselInputs(targetCarouselCount);
                    } else if (note.category === 'oneshot') {
                        if (document.getElementById('oneshot-fs-hidden')) {
                            document.getElementById('oneshot-fs-hidden').value = note.content || '';
                            document.getElementById('oneshot-fs-visible').innerText = '';
                            updateOneShotStats();
                            document.getElementById('oneshot-fs-preview-box').classList.add('hidden');
                        }
                        initCarouselInputs(targetCarouselCount);
                    } else {
                        document.getElementById('note-content').value = note.content;
                        initCarouselInputs(targetCarouselCount);
                    }
                }
            } else {
                initCarouselInputs(targetCarouselCount);
            }

            renderAttachmentPreview();
            toggleInputFields();

            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                modal.classList.add('modal-active');
            }, 10);
        }

        function closeModal() {
            const overlay = document.getElementById('modal-overlay');
            const modal = document.getElementById('modal');
            overlay.classList.add('opacity-0');
            modal.classList.remove('modal-active');
            setTimeout(() => overlay.classList.add('hidden'), 300);

        // --- STREAMING_CHUNK:Handling Note Serialization and Saving... ---
        function saveNote() {
            const id = document.getElementById('note-id').value;
            const category = document.getElementById('note-category').value;
            const titleInput = document.getElementById('note-title').value.trim();
            
            let content = "";
            let rawTextForTitle = "";

            if (category === 'carousel') {
                const carouselData = [];
                let parsedOld = [];
                
                if (id) {
                    const existingNote = notes.find(n => n.id == id);
                    if (existingNote) {
                        try { parsedOld = JSON.parse(existingNote.content); } catch(e){}
                    }
                }

                const oldRegulars = parsedOld.filter(c => !c.isCaption);
                const oldCaption = parsedOld.find(c => c.isCaption);

                let oldIdx = 0;
                for(let i=1; i<=currentCarouselCount; i++) {
                    const elTxt = document.getElementById(`car-content-${i}`);
                    const txt = elTxt ? elTxt.value.trim() : "";
                    const img = currentCarouselImages[i] || null;
                    
                    carouselData.push({ 
                        id: oldRegulars[oldIdx]?.id || (Date.now() + i + Math.random()),
                        content: txt,
                        image: img,
                        isCaption: false
                    });
                    if (!rawTextForTitle && txt) rawTextForTitle = txt; 
                    oldIdx++;
                }
                
                const capTxtEl = document.getElementById('car-content-caption');
                const capTxt = capTxtEl ? capTxtEl.value.trim() : "";
                const capImg = currentCarouselImages['caption'] || null;
                
                carouselData.push({
                    id: oldCaption?.id || (Date.now() + 999 + Math.random()),
                    content: capTxt,
                    image: capImg,
                    isCaption: true
                });
                if (!rawTextForTitle && capTxt) rawTextForTitle = capTxt;
                
                content = JSON.stringify(carouselData);

            } else if (category === 'mypassword') {
                const pwData = {
                    username: document.getElementById('pw-username').value.trim(),
                    password: document.getElementById('pw-password').value.trim(),
                    link: document.getElementById('pw-link').value.trim()
                };
                content = JSON.stringify(pwData);
                rawTextForTitle = pwData.username || pwData.link || "My Password";

            } else if (category === 'revisi') {
                const revData = {
                    tujuan: document.getElementById('rev-tujuan').value.trim(),
                    content: document.getElementById('rev-content').value.trim()
                };
                content = JSON.stringify(revData);
                rawTextForTitle = revData.tujuan || revData.content || "Revisi";

            } else if (category === 'oneshot') {
                const hiddenVal = document.getElementById('oneshot-fs-hidden').value;
                const visibleVal = document.getElementById('oneshot-fs-visible').innerText;
                content = hiddenVal + visibleVal;
                rawTextForTitle = content;

            } else {
                content = document.getElementById('note-content').value.trim();
                rawTextForTitle = content;
            }

            // AUTO-TITLE LOGIC
            let title = titleInput;
            if (!title) {
                if (rawTextForTitle) {
                    let cleanText = rawTextForTitle.replace(/^- \[[xX ]\]\s*/i, '');
                    const words = cleanText.trim().split(/\s+/);
                    title = words.slice(0, 4).join(' '); 
                    if (words.length > 4) title += '...';
                } else {
                    title = "Tanpa Judul";
                }
            }

            const attachmentsToSave = [...currentAttachments];

            if (id) {
                const index = notes.findIndex(n => n.id == id);
                if(index > -1) {
                    notes[index] = { ...notes[index], category, title, content, attachments: attachmentsToSave, updatedAt: Date.now() };
                }
            } else {
                notes.push({ id: Date.now(), category, title, content, attachments: attachmentsToSave, timestamp: Date.now() });
            }

            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
                showToast("Catatan berhasil disimpan!");
                closeModal();
                renderNotes();
            } catch (error) {
                if (error.name === 'QuotaExceededError' || error.name === 'DOMException') {
                    showToast("Gagal! Penyimpanan penuh, hapus lampiran lama.");
                } else {
                    showToast("Terjadi kesalahan saat menyimpan.");
                }
            }
        }

        function copyCarouselCard(noteId, cardId) {
            const note = notes.find(n => n.id === noteId);
            if (!note) return;
            try {
                const items = JSON.parse(note.content);
                const card = items.find(i => i.id === cardId);
                if (card) {
                    const textarea = document.createElement('textarea');
                    textarea.value = card.content;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    showToast("Teks kartu disalin!");
                }
            } catch(e) {}
        }

        function deleteCarouselCard(noteId, cardId) {
            if (!confirm("Hapus kartu ini dari Carousel?")) return;
            const note = notes.find(n => n.id === noteId);
            if (!note) return;
            try {
                let items = JSON.parse(note.content);
                items = items.filter(i => i.id !== cardId);
                note.content = JSON.stringify(items);
                note.updatedAt = Date.now();
                localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
                renderNotes();
                showToast("Kartu carousel dihapus.");
            } catch(e) {}
        }

                    } catch(err) {

                    localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
                    renderNotes();
                    closeEditCarouselCardModal();
                    showToast("Kartu berhasil diperbarui!");
                }
            } catch(e) {}
        }

        // --- COPY NOTE ---
        function copyNoteText(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;
            
            let textToCopy = `${note.title}\n\n`;
            
            if (note.category === 'carousel') {
                try {
                    let items = JSON.parse(note.content);
                    let numIdx = 1;
                    textToCopy += items.map((it) => {
                        const title = it.isCaption ? 'Caption' : `Kartu ${numIdx++}`;
                        return `[${title}]\n${it.content}`;
                    }).join('\n\n---\n\n');
                } catch(e) {}
            } else if (note.category === 'mypassword') {
                try {
                    let pw = JSON.parse(note.content);
                    textToCopy += `Username: ${pw.username}\nPassword: ${pw.password}\nLink: ${pw.link}`;
                } catch(e) {}
            } else if (note.category === 'revisi') {
                try {
                    let rev = JSON.parse(note.content);
                    textToCopy += `Tujuan Revisi: ${rev.tujuan}\n\nTeks:\n${rev.content}`;
                } catch(e) {}
            } else {
                textToCopy += note.content;
            }
            
            const textarea = document.createElement('textarea');
            textarea.value = textToCopy;
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                showToast("Teks berhasil disalin!");
            } catch (err) {
                showToast("Gagal menyalin teks.");
            }
            document.body.removeChild(textarea);
        }

        function visitLink(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;
            
            if (note.category === 'mypassword') {
                try {
                    const pw = JSON.parse(note.content);
                    if (pw.link) {
                        let url = pw.link;
                        if (!url.match(/^https?:\/\//i)) { url = 'https://' + url; }
                        window.open(url, '_blank');
                        showToast("Membuka tautan...");
                        return;
                    }
                } catch(e) {}
                showToast("Tidak ditemukan link pada password ini.");
                return;
            }

            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const matches = note.content.match(urlRegex);
            
            if (matches && matches.length > 0) {
                window.open(matches[0], '_blank');
                showToast("Membuka tautan...");
            } else {
                showToast("Tidak ditemukan link (http/https) pada catatan ini.");
            }
        }

        // --- STREAMING_CHUNK:Accordion and View Controls... ---
        function toggleCategory(catKey) {
            const content = document.getElementById(`cat-body-${catKey}`);
            const icon = document.getElementById(`cat-icon-${catKey}`);
            const isOpen = content.classList.toggle('open');
            icon.classList.toggle('open');
            if (isOpen) openCategories.add(catKey);
            else openCategories.delete(catKey);
        }

        function toggleNote(noteId) {
            const content = document.getElementById(`note-body-${noteId}`);
            const icon = document.getElementById(`note-icon-${noteId}`);
            const isOpen = content.classList.toggle('open');
            icon.classList.toggle('open');
            if (isOpen) openNotes.add(noteId);
            else openNotes.delete(noteId);
        }

        function toggleGroupView() {
            isGrouped = !isGrouped;
            const btn = document.getElementById('btn-group');
            if (isGrouped) {
                btn.innerHTML = '<i class="fa-solid fa-list"></i>'; 
                btn.classList.add('bg-indigo-100', 'dark:bg-indigo-900/40', 'rounded-lg');
            } else {
                btn.innerHTML = '<i class="fa-solid fa-layer-group"></i>';
                btn.classList.remove('bg-indigo-100', 'dark:bg-indigo-900/40', 'rounded-lg');
            }
            renderNotes();
        }

        function exportData() {
            if (notes.length === 0) return showToast("Tidak ada data untuk diekspor!");
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(notes));
            const downloadNode = document.createElement('a');
            downloadNode.setAttribute("href", dataStr);
            downloadNode.setAttribute("download", `MyNotes_Backup_${new Date().toISOString().slice(0,10)}.json`);
            document.body.appendChild(downloadNode);
            downloadNode.click();
            downloadNode.remove();
            showToast("Berhasil diekspor!");
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedNotes = JSON.parse(e.target.result);
                    if (Array.isArray(importedNotes)) {
                        const notesMap = new Map();
                        notes.forEach(n => notesMap.set(n.id, n));
                        importedNotes.forEach(n => notesMap.set(n.id, n));
                        notes = Array.from(notesMap.values());
                        
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
                        renderNotes();
                        showToast("Data berhasil diimpor!");
                    } else { showToast("Format file tidak valid."); }
                } catch (err) { 
                    if (err.name === 'QuotaExceededError') {
                         showToast("Gagal! Penyimpanan browser penuh.");
                    } else {
                         showToast("Gagal membaca file JSON."); 
                    }
                }
                event.target.value = ''; 
            };
            reader.readAsText(file);
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag] || tag));
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.toLocaleDateString('id-ID', {
                day: 'numeric', month: 'short', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            }).replace(/\./g, ':');
        }

        // --- STREAMING_CHUNK:Building Note Cards based on Category... ---
        function buildNoteCard(note, showBadge = false) {
            const catConfig = categories[note.category] || categories['memo'];
            const isNoteOpen = openNotes.has(note.id);
            const openClass = isNoteOpen ? "open" : "";
            
            let previewContent = '';
            
            if (note.category === 'carousel') {
                let items = [];
                try { items = JSON.parse(note.content); } catch(e){}
                
                previewContent = `<div class="flex gap-3 overflow-x-auto hide-scrollbar py-3 pl-2 items-start">`;
                
                let numIdx = 1;
                items.forEach((it) => {
                    const imgHtml = it.image ? `<img src="${it.image}" class="w-full h-auto max-h-64 object-cover object-center rounded-lg mb-3 shadow-sm border border-gray-200 dark:border-gray-600">` : '';
                    
                    const isCaption = it.isCaption;
                    const badgeHtml = isCaption 
                        ? `<div class="absolute -top-2 -left-2 bg-purple-500 text-white px-2 h-5 flex items-center justify-center rounded-full text-[10px] font-bold shadow-md z-10">Caption</div>`
                        : `<div class="absolute -top-2 -left-2 bg-pink-500 text-white w-5 h-5 flex items-center justify-center rounded-full text-[10px] font-bold shadow-md z-10">${numIdx++}</div>`;
                        
                    previewContent += `
                        <div class="shrink-0 w-52 bg-gray-50 dark:bg-gray-700 p-3 rounded-xl border border-gray-200 dark:border-gray-600 flex flex-col justify-between transition-colors relative">
                            ${badgeHtml}
                            <div>
                                ${imgHtml}
                                <div class="text-[13px] text-gray-800 dark:text-gray-200 whitespace-pre-wrap">${escapeHTML(it.content)}</div>
                            </div>
                            <div class="mt-4 pt-3 border-t border-gray-200 dark:border-gray-600 flex justify-between items-center">
                                <button onclick="copyCarouselCard(${note.id}, ${it.id}); event.stopPropagation();" class="w-7 h-7 flex items-center justify-center rounded bg-white dark:bg-gray-600 text-green-500 hover:text-green-600 shadow-sm border border-gray-100 dark:border-gray-500 transition-colors" title="Salin"><i class="fa-regular fa-copy text-[11px]"></i></button>
                                <button onclick="openEditCarouselCardModal(${note.id}, ${it.id}); event.stopPropagation();" class="w-7 h-7 flex items-center justify-center rounded bg-white dark:bg-gray-600 text-blue-500 hover:text-blue-600 shadow-sm border border-gray-100 dark:border-gray-500 transition-colors" title="Edit Teks"><i class="fa-solid fa-pen text-[11px]"></i></button>
                                <button onclick="triggerCarouselImageUpload(${note.id}, ${it.id}); event.stopPropagation();" class="w-7 h-7 flex items-center justify-center rounded bg-white dark:bg-gray-600 text-purple-500 hover:text-purple-600 shadow-sm border border-gray-100 dark:border-gray-500 transition-colors" title="Unggah Gambar"><i class="fa-solid fa-image text-[11px]"></i></button>
                                <button onclick="deleteCarouselCard(${note.id}, ${it.id}); event.stopPropagation();" class="w-7 h-7 flex items-center justify-center rounded bg-white dark:bg-gray-600 text-red-500 hover:text-red-600 shadow-sm border border-gray-100 dark:border-gray-500 transition-colors" title="Hapus Kartu"><i class="fa-solid fa-trash text-[11px]"></i></button>
                            </div>
                        </div>
                    `;
                });
                previewContent += `</div>`;
                if(items.length === 0) previewContent = '<p class="text-[13px] text-gray-400 dark:text-gray-500 italic">Carousel kosong</p>';
                
            } else if (note.category === 'mypassword') {
                let pw = {username: '', password: '', link: ''};
                try { pw = JSON.parse(note.content); } catch(e){}
                
                let safeLink = escapeHTML(pw.link);
                let linkUrl = safeLink.match(/^https?:\/\//i) ? safeLink : 'https://' + safeLink;
                let linkHtml = safeLink ? `<a href="${linkUrl}" target="_blank" onclick="event.stopPropagation()" class="text-blue-500 dark:text-blue-400 hover:underline break-all">${safeLink}</a>` : '-';
                
                previewContent = `
                    <div class="space-y-3 text-[14px] text-gray-700 dark:text-gray-300">
                        <div class="flex flex-col"><span class="text-[11px] text-gray-400 dark:text-gray-500 uppercase font-bold tracking-wider mb-0.5">Username / Email</span><span class="font-medium select-all">${escapeHTML(pw.username) || '-'}</span></div>
                        <div class="flex flex-col"><span class="text-[11px] text-gray-400 dark:text-gray-500 uppercase font-bold tracking-wider mb-0.5">Password</span><span class="font-mono bg-gray-100 dark:bg-gray-700/50 px-2 py-1 rounded inline-block w-fit select-all">${escapeHTML(pw.password) || '-'}</span></div>
                        <div class="flex flex-col"><span class="text-[11px] text-gray-400 dark:text-gray-500 uppercase font-bold tracking-wider mb-0.5">Link / URL</span><span class="">${linkHtml}</span></div>
                    </div>
                `;
                
            } else if (note.category === 'mylink') {
                const safeContent = escapeHTML(note.content);
                const urlRegex = /(https?:\/\/[^\s]+)/g;
                const linkedContent = safeContent.replace(urlRegex, function(url) {
                    return `<a href="${url}" target="_blank" onclick="event.stopPropagation()" class="text-blue-500 dark:text-blue-400 hover:underline break-all">${url}</a>`;
                });
                previewContent = `<div class="text-[14px] text-gray-700 dark:text-gray-300 whitespace-pre-wrap leading-relaxed">${linkedContent}</div>`;
                
            } else if (note.category === 'revisi') {
                let rev = { tujuan: '', content: '' };
                try { rev = JSON.parse(note.content); } catch(e){}
                previewContent = `
                    <div class="space-y-3">
                        <div class="bg-cyan-50 dark:bg-cyan-900/20 p-3 rounded-xl border border-cyan-100 dark:border-cyan-800/50">
                            <span class="block text-[11px] text-cyan-600 dark:text-cyan-400 uppercase font-bold tracking-wider mb-1">Tujuan Revisi</span>
                            <span class="text-[13px] text-gray-800 dark:text-gray-200">${escapeHTML(rev.tujuan) || '-'}</span>
                        </div>
                        <div class="text-[14px] text-gray-700 dark:text-gray-300 whitespace-pre-wrap leading-relaxed px-1">
                            ${escapeHTML(rev.content)}
                        </div>
                    </div>
                `;
            } else {
                previewContent = `<div class="text-[14px] text-gray-700 dark:text-gray-300 whitespace-pre-wrap leading-relaxed">${escapeHTML(note.content)}</div>`;
            }

            let attachmentsHtml = '';
            if (note.attachments && note.attachments.length > 0) {
                attachmentsHtml = `<div class="mt-4 pt-3 border-t border-gray-100 dark:border-gray-700 flex flex-wrap gap-2">`;
                note.attachments.forEach(att => {
                    if (att.type === 'image') {
                        attachmentsHtml += `<a href="${att.data}" target="_blank" title="Klik untuk lihat penuh" onclick="event.stopPropagation()" class="block w-20 h-20 rounded-lg overflow-hidden border border-gray-200 dark:border-gray-600 shrink-0 shadow-sm"><img src="${att.data}" class="object-cover w-full h-full hover:scale-110 transition"></a>`;
                    } else {
                        attachmentsHtml += `<a href="${att.data}" download="${att.name}" title="Klik untuk unduh" onclick="event.stopPropagation()" class="bg-gray-50 dark:bg-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 px-3 py-2 rounded-lg text-[13px] text-blue-600 dark:text-blue-400 font-medium flex items-center transition border border-gray-200 dark:border-gray-600 shadow-sm"><i class="fa-solid fa-file-arrow-down mr-2 text-gray-400 dark:text-gray-500"></i> <span class="truncate max-w-[140px]">${att.name}</span></a>`;
                    }
                });
                attachmentsHtml += `</div>`;
            }

            const badgeHtml = showBadge ? `<span class="px-2 py-0.5 rounded-md ${catConfig.bg} ${catConfig.color} text-[11px] font-bold ml-2 shrink-0">${catConfig.icon} ${catConfig.title}</span>` : '';

            const timeCreated = formatTime(note.timestamp);
            const timeEdited = note.updatedAt && note.updatedAt !== note.timestamp ? formatTime(note.updatedAt) : '';
            const timeHtml = `<div class="text-[11px] text-gray-400 dark:text-gray-500 mt-1.5 truncate">
                Dibuat: ${timeCreated} ${timeEdited ? ` &bull; Diedit: ${timeEdited}` : ''}
            </div>`;

            return `
                <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden transition-colors">
                    <div class="px-4 py-3.5 flex justify-between items-center cursor-pointer active:bg-gray-50 dark:active:bg-gray-700 transition" onclick="toggleNote(${note.id})">
                        <div class="flex-1 pr-2 flex flex-col overflow-hidden justify-center">
                            <div class="flex items-center overflow-hidden">
                                <h3 class="font-bold text-gray-900 dark:text-white text-[15px] truncate">${escapeHTML(note.title)}</h3>
                                ${badgeHtml}
                                ${note.attachments && note.attachments.length > 0 ? '<i class="fa-solid fa-paperclip text-gray-400 dark:text-gray-500 text-[11px] ml-2 shrink-0"></i>' : ''}
                            </div>
                            ${timeHtml}
                        </div>
                        
                        <div class="flex items-center space-x-0.5 shrink-0">
                            ${['mylink', 'mypassword'].includes(note.category) ? `
                            <button onclick="visitLink(${note.id}); event.stopPropagation();" class="w-8 h-8 flex items-center justify-center text-indigo-600 dark:text-indigo-400 active:bg-indigo-50 dark:active:bg-indigo-900/30 rounded-full transition" title="Kunjungi Link">
                                <i class="fa-solid fa-arrow-up-right-from-square text-[13px]"></i>
                            </button>
                            ` : ''}
                            <button onclick="copyNoteText(${note.id}); event.stopPropagation();" class="w-8 h-8 flex items-center justify-center text-green-600 dark:text-green-400 active:bg-green-50 dark:active:bg-green-900/30 rounded-full transition" title="Salin Teks">
                                <i class="fa-regular fa-copy text-[13px]"></i>
                            </button>
                            <button onclick="openModal(${note.id}); event.stopPropagation();" class="w-8 h-8 flex items-center justify-center text-blue-500 dark:text-blue-400 active:bg-blue-50 dark:active:bg-blue-900/30 rounded-full transition" title="Edit Catatan">
                                <i class="fa-solid fa-pen text-[13px]"></i>
                            </button>
                            <button onclick="openDeleteAlert(${note.id}); event.stopPropagation();" class="w-8 h-8 flex items-center justify-center text-red-500 dark:text-red-400 active:bg-red-50 dark:active:bg-red-900/30 rounded-full transition" title="Hapus Catatan">
                                <i class="fa-solid fa-trash text-[13px]"></i>
                            </button>
                            <div class="w-px h-4 bg-gray-200 dark:bg-gray-600 mx-1"></div>
                            <i class="fa-solid fa-chevron-down text-gray-400 dark:text-gray-500 text-sm chevron-icon pl-1 ${openClass}" id="note-icon-${note.id}"></i>
                        </div>
                    </div>
                    
                    <div class="accordion-content border-t border-gray-100 dark:border-gray-700 ${openClass}" id="note-body-${note.id}">
                        <div class="accordion-inner bg-gray-50/50 dark:bg-gray-800/50">
                            <div class="p-4">
                                ${previewContent}
                                ${attachmentsHtml}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- STREAMING_CHUNK:Final render loop and DOM updates... ---
        function renderNotes() {
            const container = document.getElementById('notes-container');
            container.innerHTML = '';

            if (notes.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 pt-20">
                        <i class="fa-regular fa-folder-open text-6xl mb-4 text-gray-300 dark:text-gray-600"></i>
                        <p class="font-medium">Belum ada catatan.</p>
                        <p class="text-sm">Klik tombol + untuk menambah.</p>
                    </div>`;
                return;
            }

            let html = '';

            if (isGrouped) {
                Object.keys(categories).forEach(catKey => {
                    const catNotes = notes.filter(n => n.category === catKey).sort((a,b) => b.timestamp - a.timestamp);
                    if (catNotes.length > 0) {
                        const config = categories[catKey];
                        const isCatOpen = openCategories.has(catKey);
                        const openClass = isCatOpen ? "open" : "";
                        
                        html += `
                            <div class="mb-5 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl shadow-sm overflow-hidden transition-colors">
                                <div class="flex justify-between items-center px-4 py-3.5 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700/50 active:bg-gray-100 dark:active:bg-gray-700 transition-colors" onclick="toggleCategory('${catKey}')">
                                    <div class="flex items-center">
                                        <div class="w-8 h-8 rounded-lg ${config.bg} ${config.color} flex items-center justify-center mr-3">
                                            ${config.icon}
                                        </div>
                                        <h2 class="text-[16px] font-bold text-gray-800 dark:text-white">${config.title}</h2>
                                        <span class="ml-2 bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400 px-2 py-0.5 rounded-full text-xs font-bold">${catNotes.length}</span>
                                    </div>
                                    <i class="fa-solid fa-chevron-down text-gray-400 dark:text-gray-500 text-sm chevron-icon ${openClass}" id="cat-icon-${catKey}"></i>
                                </div>
                                
                                <div class="accordion-content ${openClass}" id="cat-body-${catKey}">
                                    <div class="accordion-inner bg-gray-50/50 dark:bg-gray-900/30 border-t border-gray-100 dark:border-gray-700">
                                        <div class="p-3.5 space-y-3">
                        `;

                        catNotes.forEach(note => { html += buildNoteCard(note, false); });

                        html += `               </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                });
            } else {
                const allNotes = [...notes].sort((a,b) => b.timestamp - a.timestamp);
                html += `<div class="pt-2 space-y-3">`;
                allNotes.forEach(note => { html += buildNoteCard(note, true); });
                html += `</div>`;
            }

            container.innerHTML = html;
        }
    </script>
</body>
</html>
