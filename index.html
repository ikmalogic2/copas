<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MULTI TERMINAL APP</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts: Space Grotesk -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

    <style>
        /* Definisi 6 Tema Warna Dinamis - Neo Brutalism Edition */
        :root {
            /* Default: Copasional - Hijau Cerah */
            --brutal-color: #39ff14;
            --brutal-border: #000000;
            --brutal-bg: #ffffff;
            --brutal-shadow: 6px 6px 0px 0px rgba(0,0,0,1);
            --brutal-shadow-hover: 2px 2px 0px 0px rgba(0,0,0,1);
        }

        .theme-copasional {
            --brutal-color: #ccff00; /* Kuning-Hijau Cerah */
            --brutal-bg: #f4f4f0;
        }

        .theme-kinerja {
            --brutal-color: #00ffff; /* Cyan Cerah */
            --brutal-bg: #f4f4f0;
        }

        .theme-error {
            --brutal-color: #ff3366; /* Merah Muda Terang */
            --brutal-bg: #f4f4f0;
        }

        .theme-myprompt {
            --brutal-color: #ff9900; /* Oranye Terang */
            --brutal-bg: #f4f4f0;
        }

        .theme-myinstruction {
            --brutal-color: #0066ff; /* Biru Terang */
            --brutal-bg: #f4f4f0;
        }

        .theme-mylink {
            --brutal-color: #cc66ff; /* Ungu Terang */
            --brutal-bg: #f4f4f0;
        }

        .theme-memo {
            --brutal-color: #ffff00; /* Kuning Terang */
            --brutal-bg: #f4f4f0;
        }

        body {
            background-color: var(--brutal-bg);
            color: #000000;
            font-family: 'Space Grotesk', monospace, sans-serif;
            -webkit-tap-highlight-color: transparent;
            /* Latar belakang kotak-kotak ala desain grid */
            background-image: linear-gradient(var(--brutal-border) 1px, transparent 1px),
                              linear-gradient(90deg, var(--brutal-border) 1px, transparent 1px);
            background-size: 40px 40px;
            background-color: #e5e5f7;
            opacity: 0.9;
        }

        /* Elemen Neo Brutalism */
        .brutal-box {
            background-color: #ffffff;
            border: 3px solid var(--brutal-border);
            box-shadow: var(--brutal-shadow);
            border-radius: 0;
            transition: all 0.15s ease-out;
        }

        .brutal-btn {
            background-color: #ffffff;
            border: 3px solid var(--brutal-border);
            box-shadow: var(--brutal-shadow);
            border-radius: 0;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.15s ease-out;
            cursor: pointer;
        }

        .brutal-btn:hover {
            background-color: var(--brutal-color);
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px 0px rgba(0,0,0,1);
        }

        .brutal-btn:active {
            transform: translate(6px, 6px);
            box-shadow: none;
        }
        
        .brutal-btn-icon {
            background-color: #ffffff;
            border: 3px solid var(--brutal-border);
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
            transition: all 0.15s ease-out;
        }

        .brutal-btn-icon:hover {
            background-color: var(--brutal-color);
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px rgba(0,0,0,1);
        }

        .brutal-btn-icon:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }

        .brutal-input {
            border: 3px solid var(--brutal-border);
            border-radius: 0;
            box-shadow: inset 4px 4px 0px 0px rgba(0,0,0,0.05);
            background-color: #fdfdfd;
        }
        
        .brutal-input:focus {
            background-color: #ffffff;
            box-shadow: inset 4px 4px 0px 0px rgba(0,0,0,0.1), 0 0 0 4px var(--brutal-color);
            outline: none;
        }

        /* Animasi Cursor Berkedip */
        .blinking-cursor { animation: blink 1s step-end infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Animasi Akordion */
        .accordion-content, .accordion-toolbar {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .accordion-content.open, .accordion-toolbar.open { grid-template-rows: 1fr; }
        .accordion-inner, .toolbar-inner { overflow: hidden; }

        .chevron-icon { transition: transform 0.3s ease; }
        .chevron-icon.open { transform: rotate(180deg); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: #ffffff; border-left: 3px solid #000; }
        ::-webkit-scrollbar-thumb { background: var(--brutal-color); border-left: 3px solid #000; border-bottom: 3px solid #000; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: thin; }
        
        /* Checkbox Khusus Tema */
        input[type="checkbox"].theme-checkbox {
            appearance: none;
            background-color: #fff;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.15em;
            height: 1.15em;
            border: 2px solid black;
            border-radius: 0;
            display: grid;
            place-content: center;
            cursor: pointer;
            box-shadow: 2px 2px 0px 0px rgba(0,0,0,1);
            transition: all 0.1s;
        }
        
        input[type="checkbox"].theme-checkbox::before {
            content: "";
            width: 0.65em;
            height: 0.65em;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em var(--brutal-border);
            background-color: transform;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        input[type="checkbox"].theme-checkbox:checked {
            background-color: var(--brutal-color);
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,1);
            transform: translate(2px, 2px);
        }

        input[type="checkbox"].theme-checkbox:checked::before {
            transform: scale(1);
        }
    </style>

    <script>
        // Konfigurasi Tailwind 
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brutal: {
                            color: 'var(--brutal-color)',
                            border: 'var(--brutal-border)',
                            bg: 'var(--brutal-bg)',
                        }
                    },
                    fontFamily: { sans: ['"Space Grotesk"', 'monospace', 'sans-serif'] }
                }
            }
        }
    </script>
</head>

<body class="flex h-screen w-full font-sans transition-colors duration-500 selection:bg-brutal-color selection:text-black theme-copasional overflow-hidden" id="app-body">

    <!-- Overlay Sidebar -->
    <div id="sidebar-backdrop" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-30 hidden backdrop-blur-sm transition-opacity duration-300 opacity-0"></div>

    <!-- Sidebar Layout -->
    <aside id="sidebar" class="fixed top-0 right-0 h-full w-[280px] border-l-4 border-black bg-white flex flex-col transition-transform duration-300 z-40 translate-x-full flex-shrink-0 shadow-[-10px_0px_0px_0px_rgba(0,0,0,1)]">
        <div class="p-5 border-b-4 border-black flex items-center justify-between bg-brutal-color transition-colors duration-500">
            <div class="flex items-center cursor-pointer" onclick="toggleSidebar()">
                <i class="fa-solid fa-layer-group text-black text-2xl mr-3"></i>
                <span class="font-black text-[18px] text-black tracking-widest uppercase">Modules</span>
            </div>
            <button onclick="toggleSidebar()" class="brutal-btn-icon text-black w-8 h-8 flex items-center justify-center">
                <i class="fa-solid fa-xmark font-bold"></i>
            </button>
        </div>
        
        <nav class="flex-1 flex flex-col pt-4 space-y-3 px-4 overflow-y-auto pb-4 bg-white">
            <button id="nav-copasional" onclick="switchApp('copasional')" class="nav-btn brutal-btn flex items-center py-3 px-4 text-black w-full text-left">
                <i class="fa-solid fa-clipboard text-xl w-6 text-center"></i>
                <span class="ml-3 font-bold tracking-wide text-[14px]">COPASIONAL</span>
            </button>
            <button id="nav-kinerja" onclick="switchApp('kinerja')" class="nav-btn brutal-btn flex items-center py-3 px-4 text-black w-full text-left">
                <i class="fa-solid fa-chart-line text-xl w-6 text-center"></i>
                <span class="ml-3 font-bold tracking-wide text-[14px]">KINERJA HARIAN</span>
            </button>
            <button id="nav-error" onclick="switchApp('error')" class="nav-btn brutal-btn flex items-center py-3 px-4 text-black w-full text-left">
                <i class="fa-solid fa-bug text-xl w-6 text-center"></i>
                <span class="ml-3 font-bold tracking-wide text-[14px]">ERROR BOOK</span>
            </button>
            <button id="nav-myprompt" onclick="switchApp('myprompt')" class="nav-btn brutal-btn flex items-center py-3 px-4 text-black w-full text-left">
                <i class="fa-solid fa-keyboard text-xl w-6 text-center"></i>
                <span class="ml-3 font-bold tracking-wide text-[14px]">MY PROMPT</span>
            </button>
            <button id="nav-myinstruction" onclick="switchApp('myinstruction')" class="nav-btn brutal-btn flex items-center py-3 px-4 text-black w-full text-left">
                <i class="fa-solid fa-code text-xl w-6 text-center"></i>
                <span class="ml-3 font-bold tracking-wide text-[14px]">INSTRUCTION</span>
            </button>
            <button id="nav-mylink" onclick="switchApp('mylink')" class="nav-btn brutal-btn flex items-center py-3 px-4 text-black w-full text-left">
                <i class="fa-solid fa-link text-xl w-6 text-center"></i>
                <span class="ml-3 font-bold tracking-wide text-[14px]">MY LINK</span>
            </button>
            <button id="nav-memo" onclick="switchApp('memo')" class="nav-btn brutal-btn flex items-center py-3 px-4 text-black w-full text-left">
                <i class="fa-solid fa-list-check text-xl w-6 text-center"></i>
                <span class="ml-3 font-bold tracking-wide text-[14px]">MEMO TASKS</span>
            </button>
        </nav>
        
        <div class="p-4 border-t-4 border-black flex items-center justify-start bg-white">
            <div class="w-4 h-4 rounded-none bg-brutal-color border-2 border-black animate-pulse mr-3 transition-colors duration-500"></div>
            <span class="text-[13px] text-black font-bold uppercase tracking-widest">SYSTEM_ONLINE</span>
        </div>
    </aside>

    <!-- Wrapper Utama -->
    <div class="flex-1 relative flex flex-col min-w-0 h-full">
        
        <header class="bg-white shrink-0 z-10 border-b-4 border-black px-4 h-[70px] md:h-[80px] flex items-center justify-between shadow-[0_8px_0px_0px_rgba(0,0,0,1)] relative">
            <button onclick="openModal()" class="brutal-btn-icon text-black w-10 h-10 md:w-12 md:h-12 flex items-center justify-center text-xl z-20">
                <i class="fa-solid fa-plus"></i>
            </button>
            
            <!-- Judul Aplikasi Brutal -->
            <div class="absolute left-1/2 transform -translate-x-1/2 bg-brutal-color border-4 border-black px-4 py-2 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transition-colors duration-500 transform -rotate-1 hover:rotate-1">
                <h1 id="app-title" class="text-[15px] md:text-[20px] font-black text-black tracking-widest uppercase m-0">
                    INITIALIZING...<span class="blinking-cursor">_</span>
                </h1>
            </div>

            <button onclick="toggleSidebar()" class="brutal-btn-icon text-black w-10 h-10 md:w-12 md:h-12 flex items-center justify-center text-xl z-20">
                <i class="fa-solid fa-bars"></i>
            </button>
        </header>

        <!-- Pop Up / Floating Notification -->
        <div id="toast" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white border-4 border-black text-black px-8 py-6 rounded-none z-[70] transition-all duration-300 scale-75 opacity-0 pointer-events-none shadow-[10px_10px_0px_0px_rgba(0,0,0,1)] flex flex-col items-center justify-center text-center">
            <div class="bg-brutal-color w-16 h-16 border-4 border-black flex items-center justify-center mb-4 transform rotate-3 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                <i class="fa-solid fa-check text-black text-3xl"></i>
            </div>
            <span id="toast-msg" class="font-black text-[18px] md:text-[22px] tracking-widest uppercase">PESAN</span>
        </div>

        <!-- Area Utama -->
        <main class="flex-1 p-4 md:p-8 overflow-y-auto hide-scrollbar pb-24 md:pb-10" id="main-scroll-area">
            <div id="notes-container" class="w-full">
                <!-- Kartu catatan via JS -->
            </div>
        </main>

        <!-- Modal Tambah/Edit -->
        <div id="modal-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-30 hidden opacity-0 transition-opacity duration-300" onclick="closeModal()"></div>
        
        <div id="modal" class="fixed inset-x-4 md:inset-x-auto md:left-1/2 md:-translate-x-1/2 bottom-4 md:bottom-10 z-40 bg-white border-4 border-black transform translate-y-[150%] transition-transform duration-300 h-[80vh] md:h-[75vh] flex flex-col w-auto md:w-full md:max-w-4xl mx-auto brutal-box">
            <div class="bg-brutal-color flex justify-between items-center p-4 border-b-4 border-black shrink-0 transition-colors duration-500">
                <button onclick="closeModal()" class="brutal-btn-icon w-8 h-8 flex items-center justify-center">
                    <i class="fa-solid fa-arrow-down"></i>
                </button>
                <div class="flex items-center space-x-3">
                    <button id="btn-insert-checkbox" onclick="insertCheckbox()" class="hidden brutal-btn px-3 py-1 text-xs">
                        + CHECKBOX
                    </button>
                    <h2 class="font-black text-[18px] md:text-[20px] text-black tracking-wider uppercase bg-white border-2 border-black px-2 py-1 transform -rotate-1" id="modal-title">NEW ENTRY</h2>
                </div>
                <button onclick="saveNote()" class="brutal-btn px-4 py-2 font-black text-[14px] md:text-[16px] flex items-center bg-white hover:bg-black hover:text-white">
                    SAVE <i class="fa-solid fa-bolt ml-2"></i>
                </button>
            </div>
            
            <div class="p-4 md:p-6 flex-1 flex flex-col overflow-y-auto hide-scrollbar bg-[#fdfdfd]">
                <input type="hidden" id="note-id">
                <input type="text" id="note-title" placeholder="JUDUL FILE..." class="w-full brutal-input p-4 mb-5 text-[18px] md:text-[22px] font-black focus:outline-none text-black placeholder-gray-500 transition-all uppercase">
                <textarea id="note-content" placeholder="> Ketik data di sini..." class="w-full flex-1 min-h-[200px] brutal-input p-4 text-[15px] md:text-[17px] focus:outline-none text-black placeholder-gray-500 resize-none leading-relaxed transition-all font-mono"></textarea>
            </div>
        </div>

        <!-- Alert Konfirmasi Hapus -->
        <div id="alert-overlay" class="fixed inset-0 bg-black/60 z-50 hidden items-center justify-center opacity-0 transition-opacity duration-300 backdrop-blur-sm">
            <div id="alert-box" class="bg-white border-4 border-black w-[300px] md:w-[350px] text-center overflow-hidden transform scale-95 transition-transform duration-300 shadow-[12px_12px_0px_0px_rgba(0,0,0,1)] rounded-none">
                <div class="p-6 md:p-8 border-b-4 border-black bg-[#ff3366]">
                    <div class="w-16 h-16 bg-white border-4 border-black mx-auto flex items-center justify-center mb-4 transform rotate-12 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                        <i class="fa-solid fa-triangle-exclamation text-black text-3xl"></i>
                    </div>
                    <h3 class="font-black text-[20px] md:text-[22px] text-white tracking-wider uppercase" style="text-shadow: 2px 2px 0 #000;">WARNING!</h3>
                    <p class="text-[14px] text-white mt-2 font-bold bg-black inline-block px-2 py-1">DATA AKAN DIHAPUS PERMANEN</p>
                </div>
                <div class="flex p-4 gap-4 bg-gray-100">
                    <button onclick="closeDeleteAlert()" class="flex-1 brutal-btn p-3 text-black text-[14px]">BATAL</button>
                    <button onclick="confirmDelete()" id="btn-confirm-delete" class="flex-1 brutal-btn p-3 bg-[#ff3366] text-white hover:bg-black hover:text-white">HAPUS</button>
                </div>
            </div>
        </div>

        <!-- Modal Transfer / Pindah Jendela -->
        <div id="transfer-overlay" class="fixed inset-0 bg-black/60 z-50 hidden items-center justify-center opacity-0 transition-opacity duration-300 backdrop-blur-sm">
            <div id="transfer-box" class="bg-white border-4 border-black w-[300px] md:w-[380px] overflow-hidden transform scale-95 transition-transform duration-300 shadow-[12px_12px_0px_0px_rgba(0,0,0,1)] rounded-none">
                <div class="p-5 border-b-4 border-black bg-brutal-color flex justify-between items-center transition-colors duration-500">
                    <h3 class="font-black text-[16px] md:text-[18px] text-black tracking-wider uppercase"><i class="fa-solid fa-arrow-right-arrow-left mr-2"></i> TRANSFER DATA</h3>
                    <button onclick="closeTransferModal()" class="brutal-btn-icon w-8 h-8 flex items-center justify-center bg-white text-black"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div id="transfer-options" class="flex flex-col p-4 gap-3 max-h-[50vh] overflow-y-auto hide-scrollbar bg-gray-50">
                    <!-- Opsi Jendela Sidebar diinject via JS -->
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- KONFIGURASI MULTI-APP ---
        const appsConfig = {
            copasional: {
                id: 'copasional', title: "COPASIONAL", themeClass: "theme-copasional",
                storageKey: "terminal_notes_copasional",
                inputPlaceholder: "> Paste teks untuk disalin di sini...", titlePlaceholder: "Judul_Copas..."
            },
            kinerja: {
                id: 'kinerja', title: "LAPORAN_KINERJA_HARIAN", themeClass: "theme-kinerja",
                storageKey: "copasional_notes_html", 
                inputPlaceholder: "> Masukkan detail laporan kinerja harian di sini...", titlePlaceholder: "Judul_Laporan..."
            },
            error: {
                id: 'error', title: "ERROR_BOOK", themeClass: "theme-error",
                storageKey: "terminal_notes_error",
                inputPlaceholder: "> Masukkan log error sistem di sini...", titlePlaceholder: "Judul_Error..."
            },
            myprompt: {
                id: 'myprompt', title: "MY_PROMPT", themeClass: "theme-myprompt",
                storageKey: "terminal_notes_myprompt",
                inputPlaceholder: "> Masukkan prompt atau instruksi AI di sini...", titlePlaceholder: "Judul_Prompt..."
            },
            myinstruction: {
                id: 'myinstruction', title: "MY_INSTRUCTION", themeClass: "theme-myinstruction",
                storageKey: "terminal_notes_myinstruction",
                inputPlaceholder: "> Masukkan instruksi sistem atau panduan di sini...", titlePlaceholder: "Judul_Instruction..."
            },
            mylink: { // APP BARU
                id: 'mylink', title: "MY_LINK", themeClass: "theme-mylink",
                storageKey: "terminal_notes_mylink",
                inputPlaceholder: "> Masukkan tautan URL dan deskripsinya di sini...", titlePlaceholder: "Judul_Link..."
            },
            memo: { // APP BARU
                id: 'memo', title: "MEMO_TASKS", themeClass: "theme-memo",
                storageKey: "terminal_notes_memo",
                inputPlaceholder: "> Ketik catatan atau tekan tombol [+ Checkbox] untuk To-Do...", titlePlaceholder: "Judul_Memo_Task..."
            }
        };

        // State Global
        let currentApp = 'copasional';
        let notes = [];
        let noteToDelete = null;
        let noteToTransfer = null;
        let openAccordions = new Set(); // Menyimpan state akordion yang terbuka

        // --- SISTEM SIDEBAR ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');
            
            if (sidebar.classList.contains('translate-x-full')) {
                sidebar.classList.remove('translate-x-full');
                backdrop.classList.remove('hidden');
                setTimeout(() => backdrop.classList.remove('opacity-0'), 10);
            } else {
                sidebar.classList.add('translate-x-full');
                backdrop.classList.add('opacity-0');
                setTimeout(() => backdrop.classList.add('hidden'), 300);
            }
        }

        // --- SISTEM INISIALISASI & TEMA ---
        function switchApp(appId) {
            currentApp = appId;
            const config = appsConfig[appId];

            const body = document.getElementById('app-body');
            body.className = `bg-terminal-bg flex h-screen w-full font-sans transition-colors duration-500 selection:bg-terminal-neon selection:text-black overflow-hidden ${config.themeClass}`;

            document.getElementById('app-title').innerHTML = `&gt; ${config.title}<span class="blinking-cursor">_</span>`;
            document.title = config.title;

            document.getElementById('note-title').placeholder = config.titlePlaceholder;
            document.getElementById('note-content').placeholder = config.inputPlaceholder;

            // Tampilkan tombol checkbox khusus di Memo
            const btnInsert = document.getElementById('btn-insert-checkbox');
            if (currentApp === 'memo') {
                btnInsert.classList.remove('hidden');
                btnInsert.classList.add('block');
            } else {
                btnInsert.classList.add('hidden');
                btnInsert.classList.remove('block');
            }

            updateSidebarUI();
            openAccordions.clear(); // Reset state terbuka
            loadNotes();
            
            const sidebar = document.getElementById('sidebar');
            if (!sidebar.classList.contains('translate-x-full')) toggleSidebar();
        }

        function updateSidebarUI() {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-brutal-color', 'shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]', 'translate-x-[-2px]', 'translate-y-[-2px]');
                btn.style.backgroundColor = '#ffffff';
            });
            
            const activeBtn = document.getElementById(`nav-${currentApp}`);
            if (activeBtn) {
                activeBtn.classList.add('shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]', 'translate-x-[-2px]', 'translate-y-[-2px]');
                activeBtn.style.backgroundColor = 'var(--brutal-color)';
            }
        }

        // --- MANAJEMEN DATA STORAGE ---
        function loadNotes() {
            const config = appsConfig[currentApp];
            const savedNotes = localStorage.getItem(config.storageKey);
            if (savedNotes) {
                try { notes = JSON.parse(savedNotes); } catch (e) { notes = []; }
            } else { notes = []; }
            renderNotes();
        }

        function saveToLocal() {
            const config = appsConfig[currentApp];
            localStorage.setItem(config.storageKey, JSON.stringify(notes));
            renderNotes();
        }

        // --- HELPERS ---
        function formatDateTime(timestamp) {
            const date = new Date(timestamp);
            const options = { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' };
            return date.toLocaleDateString('id-ID', options).replace(/\./g, ':');
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }

        // Fungsi khusus menyisipkan checkbox ke text area (MEMO)
        function insertCheckbox() {
            const textarea = document.getElementById('note-content');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            const before = text.substring(0, start);
            const after  = text.substring(end, text.length);
            
            const newline = (before.length === 0 || before.endsWith('\n')) ? '' : '\n';
            textarea.value = before + newline + '- [ ] ' + after;
            textarea.focus();
            textarea.selectionStart = textarea.selectionEnd = start + newline.length + 6;
        }

        // Fitur interaktif centang checkbox langsung dari kartu (MEMO)
        window.toggleTask = function(noteId, taskIndex, isCurrentlyChecked) {
            const note = notes.find(n => n.id === noteId);
            if (!note) return;

            let currentIdx = 0;
            const lines = note.content.split('\n');
            
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].trim().match(/^- \[[ xX]\]/)) {
                    if (currentIdx === taskIndex) {
                        if (isCurrentlyChecked) {
                            lines[i] = lines[i].replace(/^- \[[xX]\]/i, '- [ ]');
                        } else {
                            lines[i] = lines[i].replace(/^- \[ \]/, '- [x]');
                        }
                        break;
                    }
                    currentIdx++;
                }
            }
            note.content = lines.join('\n');
            saveToLocal(); // Auto render
        };

        // --- RENDER LOGIC UTAMA ---
        function renderNotes() {
            const container = document.getElementById('notes-container');
            container.innerHTML = '';

            if (notes.length === 0) {
                container.className = 'w-full h-full flex flex-col items-center justify-center pt-20';
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center text-black">
                        <div class="w-24 h-24 bg-white border-4 border-black flex items-center justify-center transform -rotate-6 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] mb-6">
                            <i class="fa-solid fa-database text-5xl text-black"></i>
                        </div>
                        <p class="font-black text-[20px] md:text-[24px] text-black tracking-widest bg-brutal-color px-4 py-1 border-2 border-black uppercase shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">[ KOSONG ]</p>
                        <p class="text-[14px] md:text-[16px] mt-4 font-bold text-black bg-white px-3 py-1 border-2 border-black">Klik tombol [+] untuk menambah data.</p>
                    </div>
                `;
                return;
            }

            // Menggunakan Columns (Masonry) untuk mencegah bentrok/overlap antar baris
            container.className = 'columns-1 md:columns-2 xl:columns-3 gap-6 md:gap-8 w-full';

            notes.sort((a, b) => b.timestamp - a.timestamp).forEach(note => {
                const card = document.createElement('div');
                // Neo Brutalism styling untuk kartu
                card.className = 'brutal-box overflow-hidden mb-6 md:mb-8 inline-block w-full';
                
                let displayTitle = 'UNNAMED_RECORD';
                if (note.title) {
                    displayTitle = escapeHTML(note.title);
                } else if (note.content) {
                    const words = note.content.trim().split(/\s+/);
                    displayTitle = escapeHTML(words.slice(0, 2).join('_'));
                    if (words.length > 2) displayTitle += '...';
                }

                // Parser Konten (Khusus untuk Memo agar bisa parse To-Do)
                let renderedContentHTML = '';
                if (currentApp === 'memo') {
                    const lines = note.content.split('\n');
                    let taskIdx = 0;
                    renderedContentHTML = lines.map(line => {
                        if (line.trim().match(/^- \[[ xX]\]/)) {
                            const isChecked = !!line.trim().match(/^- \[[xX]\]/i);
                            const text = escapeHTML(line.replace(/^- \[[ xX]\]\s*/i, ''));
                            const checkState = isChecked ? 'checked' : '';
                            const textClass = isChecked ? 'line-through text-gray-500' : 'text-black font-medium';
                            return `
                                <div class="flex items-start my-2 group/task" onclick="event.stopPropagation()">
                                    <input type="checkbox" ${checkState} class="theme-checkbox mt-[2px] mr-3 cursor-pointer" onchange="toggleTask(${note.id}, ${taskIdx++}, ${isChecked})">
                                    <span class="${textClass} transition-all leading-snug">${text || '&nbsp;'}</span>
                                </div>`;
                        } else {
                            return `<div class="min-h-[1.5em] text-black whitespace-pre-wrap font-bold">${escapeHTML(line)}</div>`;
                        }
                    }).join('');
                } else if (currentApp === 'mylink') {
                    const escapedContent = escapeHTML(note.content);
                    const linkedContent = escapedContent.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" onclick="event.stopPropagation()" class="underline font-black bg-brutal-color px-1 border-b-2 border-black hover:bg-black hover:text-white transition-colors text-black">$1</a>');
                    renderedContentHTML = `<div class="whitespace-pre-wrap text-black font-medium">${linkedContent}</div>`;
                } else {
                    renderedContentHTML = `<div class="whitespace-pre-wrap text-black font-medium">${escapeHTML(note.content)}</div>`;
                }

                const visitButton = currentApp === 'mylink' ? `
                    <button onclick="visitSite(${note.id}); event.stopPropagation();" class="brutal-btn-icon w-8 h-8 flex items-center justify-center text-black bg-white hover:bg-brutal-color" title="Visit">
                        <i class="fa-solid fa-arrow-up-right-from-square"></i>
                    </button>
                ` : '';

                card.innerHTML = `
                    <div class="accordion-toolbar border-b-4 border-black" id="toolbar-${note.id}">
                        <div class="toolbar-inner">
                            <div class="bg-gray-100 px-4 py-3 flex justify-between items-center transition-colors overflow-x-auto hide-scrollbar">
                                <div class="flex space-x-3 pr-4 min-w-max">
                                    <button onclick="copyNote(${note.id})" class="brutal-btn px-3 py-1 text-[12px] flex items-center bg-white hover:bg-brutal-color">
                                        <i class="fa-regular fa-copy mr-2"></i> COPY
                                    </button>
                                    <button onclick="downloadNote(${note.id})" class="brutal-btn px-3 py-1 text-[12px] flex items-center bg-white hover:bg-brutal-color">
                                        <i class="fa-solid fa-download mr-2"></i> DOWN
                                    </button>
                                    <button onclick="openTransferModal(${note.id})" class="brutal-btn px-3 py-1 text-[12px] flex items-center bg-white hover:bg-brutal-color">
                                        <i class="fa-solid fa-right-left mr-2"></i> MOVE
                                    </button>
                                    ${visitButton}
                                </div>
                                <div class="flex space-x-3 min-w-max">
                                    <button onclick="openModal(${note.id})" class="brutal-btn-icon w-8 h-8 flex items-center justify-center bg-white text-black hover:bg-brutal-color" title="Edit">
                                        <i class="fa-solid fa-pen"></i>
                                    </button>
                                    <button onclick="openDeleteAlert(${note.id})" class="brutal-btn-icon w-8 h-8 flex items-center justify-center bg-white text-black hover:bg-[#ff3366]" title="Delete">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="px-4 py-4 md:px-5 md:py-5 flex justify-between items-center cursor-pointer bg-white hover:bg-gray-50 transition-colors" onclick="toggleAccordion(${note.id})">
                        <div class="flex-1 pr-4 overflow-hidden">
                            <h3 class="font-black text-[16px] md:text-[20px] text-black truncate uppercase tracking-tight">${displayTitle}</h3>
                            <div class="inline-block bg-black text-white px-2 py-0.5 mt-2">
                                <p class="text-[10px] md:text-[11px] font-bold tracking-widest">${formatDateTime(note.timestamp)}</p>
                            </div>
                        </div>
                        <div class="w-8 h-8 border-2 border-black flex items-center justify-center bg-brutal-color shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] transition-colors duration-500">
                            <i class="fa-solid fa-chevron-down text-black text-sm chevron-icon font-black" id="icon-${note.id}"></i>
                        </div>
                    </div>
                    
                    <div class="accordion-content border-t-4 border-black" id="content-${note.id}">
                        <div class="accordion-inner">
                            <div class="p-4 md:p-6 bg-[#fdfdfd] relative">
                                <!-- Efek tape/selotip ala brutalism -->
                                <div class="absolute -top-3 left-1/2 transform -translate-x-1/2 w-16 h-6 bg-yellow-200 opacity-70 rotate-2 mix-blend-multiply border border-yellow-300"></div>
                                <div class="text-[14px] md:text-[16px] text-black break-words font-mono leading-relaxed">
                                    ${renderedContentHTML}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);

                // Kembalikan state akordion jika sebelumnya terbuka (agar saat dicentang tidak auto-tutup)
                if (openAccordions.has(note.id)) {
                    document.getElementById(`toolbar-${note.id}`).classList.add('open');
                    document.getElementById(`content-${note.id}`).classList.add('open');
                    document.getElementById(`icon-${note.id}`).classList.add('open');
                }
            });
        }

        // --- INTERAKSI UI ---
        function toggleAccordion(id) {
            const toolbar = document.getElementById(`toolbar-${id}`);
            const content = document.getElementById(`content-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            
            const isOpen = toolbar.classList.toggle('open');
            content.classList.toggle('open');
            icon.classList.toggle('open');

            if (isOpen) openAccordions.add(id);
            else openAccordions.delete(id);
        }

        let toastTimeout;
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            
            toast.classList.remove('scale-75', 'opacity-0');
            toast.classList.add('scale-100', 'opacity-100');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('scale-75', 'opacity-0');
                toast.classList.remove('scale-100', 'opacity-100');
            }, 2000);
        }

        function copyNote(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;
            const textToCopy = note.title ? `${note.title}\n\n${note.content}` : note.content;
            
            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            textArea.style.position = "fixed"; document.body.appendChild(textArea);
            textArea.focus(); textArea.select();
            
            try { document.execCommand('copy'); showToast("TEKS SUDAH DISALIN"); } 
            catch (err) { showToast("GAGAL MENYALIN"); }
            document.body.removeChild(textArea);
        }

        function downloadNote(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;
            
            const textToDownload = note.title ? `${note.title}\n\n${note.content}` : note.content;
            const blob = new Blob([textToDownload], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            
            // Generate nama file otomatis dari judul atau ID jika tidak ada judul
            let filename = 'terminal_note.txt';
            if (note.title) {
                filename = note.title.replace(/[^a-z0-9]/gi, '_').toLowerCase() + '.txt';
            } else {
                filename = `note_${note.id}.txt`;
            }
            
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            
            // Clean up
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast("FILE BERHASIL DIUNDUH");
        }

        function visitSite(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;
            
            const urlMatch = note.content.match(/(https?:\/\/[^\s]+)/);
            if (urlMatch) {
                window.open(urlMatch[0], '_blank');
                showToast("MEMBUKA TAUTAN...");
            } else {
                showToast("TIDAK ADA TAUTAN");
            }
        }

        // --- MANAJEMEN MODAL ---
        function openModal(id = null) {
            const overlay = document.getElementById('modal-overlay');
            const modal = document.getElementById('modal');
            const titleInput = document.getElementById('note-title');
            const contentInput = document.getElementById('note-content');
            const idInput = document.getElementById('note-id');
            const modalTitle = document.getElementById('modal-title');

            if (id) {
                const note = notes.find(n => n.id === id);
                if(note) {
                    idInput.value = note.id;
                    titleInput.value = note.title;
                    contentInput.value = note.content;
                    modalTitle.innerText = "EDIT_MODE";
                }
            } else {
                idInput.value = ""; titleInput.value = ""; contentInput.value = "";
                modalTitle.innerText = "NEW_ENTRY";
            }

            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                modal.classList.remove('translate-y-full');
            }, 10);
            setTimeout(() => contentInput.focus(), 300);
        }

        function closeModal() {
            const overlay = document.getElementById('modal-overlay');
            const modal = document.getElementById('modal');
            overlay.classList.add('opacity-0');
            modal.classList.add('translate-y-full');
            setTimeout(() => overlay.classList.add('hidden'), 300);
        }

        function saveNote() {
            const idInput = document.getElementById('note-id').value;
            const title = document.getElementById('note-title').value.trim();
            const content = document.getElementById('note-content').value.trim();

            if (!title && !content) return showToast("DATA KOSONG DITOLAK");

            if (idInput) {
                const index = notes.findIndex(n => n.id === parseInt(idInput));
                if (index !== -1) {
                    notes[index].title = title; notes[index].content = content; notes[index].timestamp = Date.now();
                }
                showToast("CATATAN DIPERBARUI");
            } else {
                notes.push({ id: Date.now(), title, content, timestamp: Date.now() });
                showToast("CATATAN SUDAH DISIMPAN");
            }
            saveToLocal();
            closeModal();
        }

        // --- MANAJEMEN ALERT HAPUS ---
        function openDeleteAlert(id) {
            noteToDelete = id;
            const overlay = document.getElementById('alert-overlay');
            const box = document.getElementById('alert-box');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            setTimeout(() => { overlay.classList.remove('opacity-0'); box.classList.remove('scale-95'); }, 10);
        }

        function closeDeleteAlert() {
            noteToDelete = null;
            const overlay = document.getElementById('alert-overlay');
            const box = document.getElementById('alert-box');
            overlay.classList.add('opacity-0'); box.classList.add('scale-95');
            setTimeout(() => { overlay.classList.add('hidden'); overlay.classList.remove('flex'); }, 300);
        }

        function confirmDelete() {
            if (noteToDelete) {
                notes = notes.filter(n => n.id !== noteToDelete);
                saveToLocal(); showToast("CATATAN DIHAPUS"); closeDeleteAlert();
            }
        }

        // --- MANAJEMEN TRANSFER / PINDAH JENDELA ---
        function openTransferModal(id) {
            noteToTransfer = id;
            const optionsContainer = document.getElementById('transfer-options');
            optionsContainer.innerHTML = ''; 

            // Melakukan looping ke semua 6 App dan hanya menampilkan yang bukan sedang aktif
            Object.values(appsConfig).forEach(app => {
                if (app.id !== currentApp) {
                    const btn = document.createElement('button');
                    btn.className = 'brutal-btn p-3 w-full text-left font-bold text-[14px] flex items-center bg-white hover:bg-black hover:text-white transition-colors';
                    btn.innerHTML = `<i class="fa-solid fa-folder-open mr-3"></i> <span>MOVE TO ${app.title}</span>`;
                    btn.onclick = () => executeTransfer(app.id);
                    optionsContainer.appendChild(btn);
                }
            });

            const overlay = document.getElementById('transfer-overlay');
            const box = document.getElementById('transfer-box');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            setTimeout(() => { overlay.classList.remove('opacity-0'); box.classList.remove('scale-95'); }, 10);
        }

        function closeTransferModal() {
            noteToTransfer = null;
            const overlay = document.getElementById('transfer-overlay');
            const box = document.getElementById('transfer-box');
            overlay.classList.add('opacity-0'); box.classList.add('scale-95');
            setTimeout(() => { overlay.classList.add('hidden'); overlay.classList.remove('flex'); }, 300);
        }

        function executeTransfer(targetAppId) {
            if (!noteToTransfer) return;

            const noteIndex = notes.findIndex(n => n.id === noteToTransfer);
            if (noteIndex === -1) return;
            const note = notes[noteIndex]; // Mengambil catatan yang akan dipindah

            // 1. Ambil data catatan pada jendela tujuan dari penyimpanan lokal
            const targetConfig = appsConfig[targetAppId];
            let targetNotes = [];
            const savedTargetNotes = localStorage.getItem(targetConfig.storageKey);
            if (savedTargetNotes) {
                try { targetNotes = JSON.parse(savedTargetNotes); } catch (e) { targetNotes = []; }
            }

            // 2. Tambahkan catatan ke jendela tujuan, lalu simpan
            targetNotes.push(note);
            localStorage.setItem(targetConfig.storageKey, JSON.stringify(targetNotes));

            // 3. Hapus catatan dari jendela yang sedang aktif saat ini
            notes.splice(noteIndex, 1);
            saveToLocal(); // Otomatis refresh UI
            
            closeTransferModal();
            showToast("CATATAN DIPINDAH");
        }

        // EKSEKUSI AWAL
        window.onload = () => switchApp('copasional');
    </script>
</body>
</html>
