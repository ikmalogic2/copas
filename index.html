<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MULTI TERMINAL APP</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            /* iOS Colors */
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-text-main: #000000;
            --ios-text-secondary: #8E8E93;
            --ios-divider: #C6C6C8;
            
            /* Dynamic App Tint (Default Blue) */
            --app-tint: #007AFF;
            --app-tint-bg: rgba(0, 122, 255, 0.1);
        }

        body {
            background-color: var(--ios-bg);
            color: var(--ios-text-main);
            /* Font sistem iOS */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        /* Styling Scrollbar Transparan */
        ::-webkit-scrollbar { width: 0px; height: 0px; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animasi Transisi Halus iOS */
        .ios-transition { transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        
        /* Akordion */
        .accordion-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .accordion-content.open { grid-template-rows: 1fr; }
        .accordion-inner { overflow: hidden; }

        .chevron-icon { transition: transform 0.3s ease; }
        .chevron-icon.open { transform: rotate(180deg); }

        /* Custom Checkbox (Lingkaran ala iOS) */
        input[type="checkbox"].theme-checkbox {
            appearance: none;
            background-color: transparent;
            margin: 0;
            width: 22px;
            height: 22px;
            border: 1.5px solid var(--ios-text-secondary);
            border-radius: 50%;
            display: grid;
            place-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        input[type="checkbox"].theme-checkbox:checked {
            background-color: var(--app-tint);
            border-color: var(--app-tint);
        }

        input[type="checkbox"].theme-checkbox:checked::before {
            content: "";
            width: 6px;
            height: 11px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg) translate(-1px, -1px);
        }

        /* Komponen iOS */
        .ios-btn-text {
            color: var(--app-tint);
            font-weight: 500;
        }
        .ios-btn-text:active { opacity: 0.5; }
        
        .ios-btn-icon:active { opacity: 0.5; }

        /* Glassmorphism Header */
        .ios-header {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 0.5px solid rgba(0,0,0,0.15);
        }
        
        /* Alert Dialog Styling */
        .ios-alert-border-b { border-bottom: 0.5px solid rgba(60,60,67,0.29); }
        .ios-alert-border-r { border-right: 0.5px solid rgba(60,60,67,0.29); }
    </style>
</head>

<body class="flex flex-col h-screen w-full overflow-hidden" id="app-body">

    <!-- Header Navigation Bar -->
    <header class="ios-header fixed top-0 w-full z-20 h-12 pt-safe flex items-center justify-between px-4">
        <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-start ios-btn-text text-[24px]">
            <i class="fa-solid fa-bars"></i>
        </button>
        
        <h1 id="app-title" class="text-[17px] font-semibold tracking-tight absolute left-1/2 transform -translate-x-1/2 pointer-events-none">
            App Title
        </h1>

        <button onclick="openModal()" class="w-10 h-10 flex items-center justify-end ios-btn-text text-[24px]">
            <i class="fa-solid fa-plus"></i>
        </button>
    </header>

    <!-- Overlay Sidebar -->
    <div id="sidebar-backdrop" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 z-30 hidden transition-opacity duration-300 opacity-0"></div>

    <!-- Sidebar Layout (Slide dari kiri) -->
    <aside id="sidebar" class="fixed top-0 left-0 h-full w-[280px] bg-[#F2F2F7] transition-transform duration-300 z-40 -translate-x-full shadow-2xl flex flex-col">
        <div class="h-12 ios-header flex items-center px-4 pt-safe shrink-0">
            <h2 class="font-semibold text-[17px]">Modules</h2>
        </div>
        
        <nav class="flex-1 overflow-y-auto hide-scrollbar p-4 space-y-6">
            <!-- App Navigation Group -->
            <div>
                <div class="bg-white rounded-xl overflow-hidden shadow-sm">
                    <button id="nav-copasional" onclick="switchApp('copasional')" class="nav-btn w-full flex items-center p-3 border-b-[0.5px] border-gray-200 active:bg-gray-100">
                        <div class="w-7 h-7 rounded-md bg-[#34C759] text-white flex items-center justify-center mr-3"><i class="fa-solid fa-clipboard text-sm"></i></div>
                        <span class="flex-1 text-left text-[16px]">Copasional</span>
                    </button>
                    <button id="nav-kinerja" onclick="switchApp('kinerja')" class="nav-btn w-full flex items-center p-3 border-b-[0.5px] border-gray-200 active:bg-gray-100">
                        <div class="w-7 h-7 rounded-md bg-[#007AFF] text-white flex items-center justify-center mr-3"><i class="fa-solid fa-chart-line text-sm"></i></div>
                        <span class="flex-1 text-left text-[16px]">Kinerja Harian</span>
                    </button>
                    <button id="nav-error" onclick="switchApp('error')" class="nav-btn w-full flex items-center p-3 border-b-[0.5px] border-gray-200 active:bg-gray-100">
                        <div class="w-7 h-7 rounded-md bg-[#FF3B30] text-white flex items-center justify-center mr-3"><i class="fa-solid fa-bug text-sm"></i></div>
                        <span class="flex-1 text-left text-[16px]">Error Book</span>
                    </button>
                    <button id="nav-myprompt" onclick="switchApp('myprompt')" class="nav-btn w-full flex items-center p-3 border-b-[0.5px] border-gray-200 active:bg-gray-100">
                        <div class="w-7 h-7 rounded-md bg-[#FF9500] text-white flex items-center justify-center mr-3"><i class="fa-solid fa-keyboard text-sm"></i></div>
                        <span class="flex-1 text-left text-[16px]">My Prompt</span>
                    </button>
                    <button id="nav-myinstruction" onclick="switchApp('myinstruction')" class="nav-btn w-full flex items-center p-3 border-b-[0.5px] border-gray-200 active:bg-gray-100">
                        <div class="w-7 h-7 rounded-md bg-[#5856D6] text-white flex items-center justify-center mr-3"><i class="fa-solid fa-code text-sm"></i></div>
                        <span class="flex-1 text-left text-[16px]">Instruction</span>
                    </button>
                    <button id="nav-mylink" onclick="switchApp('mylink')" class="nav-btn w-full flex items-center p-3 border-b-[0.5px] border-gray-200 active:bg-gray-100">
                        <div class="w-7 h-7 rounded-md bg-[#AF52DE] text-white flex items-center justify-center mr-3"><i class="fa-solid fa-link text-sm"></i></div>
                        <span class="flex-1 text-left text-[16px]">My Link</span>
                    </button>
                    <button id="nav-memo" onclick="switchApp('memo')" class="nav-btn w-full flex items-center p-3 border-b-[0.5px] border-gray-200 active:bg-gray-100">
                        <div class="w-7 h-7 rounded-md bg-[#FFCC00] text-white flex items-center justify-center mr-3"><i class="fa-solid fa-list-check text-sm"></i></div>
                        <span class="flex-1 text-left text-[16px]">Memo Tasks</span>
                    </button>
                    <!-- MODUL BARU: CAROUSEL -->
                    <button id="nav-carousel" onclick="switchApp('carousel')" class="nav-btn w-full flex items-center p-3 active:bg-gray-100">
                        <div class="w-7 h-7 rounded-md bg-[#FF2D55] text-white flex items-center justify-center mr-3"><i class="fa-solid fa-layer-group text-sm"></i></div>
                        <span class="flex-1 text-left text-[16px]">Carousel Note</span>
                    </button>
                </div>
            </div>

            <!-- Settings Group -->
            <div>
                <h3 class="text-[13px] uppercase text-gray-500 font-medium ml-4 mb-1">Backup & Restore</h3>
                <div class="bg-white rounded-xl overflow-hidden shadow-sm">
                    <button onclick="exportData()" class="w-full flex items-center p-3 border-b-[0.5px] border-gray-200 active:bg-gray-100">
                        <i class="fa-solid fa-cloud-arrow-down text-[20px] text-[#007AFF] w-7 text-center mr-2"></i>
                        <span class="text-left text-[16px] text-[#007AFF]">Export Data</span>
                    </button>
                    <button onclick="document.getElementById('import-file').click()" class="w-full flex items-center p-3 active:bg-gray-100">
                        <i class="fa-solid fa-cloud-arrow-up text-[20px] text-[#007AFF] w-7 text-center mr-2"></i>
                        <span class="text-left text-[16px] text-[#007AFF]">Import & Sync Data</span>
                    </button>
                    <input type="file" id="import-file" accept=".json" class="hidden" onchange="importData(event)">
                </div>
            </div>
        </nav>
    </aside>

    <!-- Area Utama / List Konten -->
    <main class="flex-1 overflow-y-auto hide-scrollbar pt-[60px] pb-10 px-4" id="main-scroll-area">
        <div id="notes-container" class="w-full max-w-5xl mx-auto space-y-4">
            <!-- Kartu catatan via JS -->
        </div>
    </main>

    <!-- Modal Form (Bottom Sheet ala iOS) -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/40 z-30 hidden opacity-0 transition-opacity duration-300" onclick="closeModal()"></div>
    
    <div id="modal" class="fixed inset-x-0 bottom-0 z-40 bg-white rounded-t-2xl transform translate-y-full transition-transform duration-300 h-[85vh] md:h-[70vh] flex flex-col w-full md:max-w-2xl md:mx-auto shadow-2xl">
        
        <!-- Handle & Header Modal -->
        <div class="flex flex-col items-center justify-center pt-2 pb-2 ios-alert-border-b bg-gray-50 rounded-t-2xl shrink-0">
            <div class="w-10 h-1.5 bg-gray-300 rounded-full mb-2 mt-1"></div>
            <div class="flex justify-between items-center w-full px-4">
                <button onclick="closeModal()" class="ios-btn-text text-[16px]">Cancel</button>
                <h2 class="font-semibold text-[17px]" id="modal-title">New Note</h2>
                <button onclick="saveNote()" class="ios-btn-text text-[16px] font-semibold">Save</button>
            </div>
        </div>
        
        <!-- Area Input -->
        <div class="p-4 flex-1 flex flex-col overflow-y-auto hide-scrollbar bg-white relative">
            <button id="btn-insert-checkbox" onclick="insertCheckbox()" class="hidden absolute right-4 top-4 bg-gray-100 text-gray-700 px-3 py-1.5 rounded-full text-[13px] font-medium active:bg-gray-200">
                <i class="fa-solid fa-check-square mr-1"></i> Add Task
            </button>
            
            <input type="hidden" id="note-id">
            <input type="text" id="note-title" placeholder="Title" class="w-full text-[22px] font-semibold focus:outline-none text-black placeholder-gray-400 py-2 border-b-[0.5px] border-gray-200 mb-2 shrink-0">
            
            <!-- Kontainer Input Catatan Normal -->
            <textarea id="note-content" placeholder="Content..." class="w-full flex-1 text-[16px] focus:outline-none text-black placeholder-gray-400 resize-none leading-relaxed mt-2 font-normal"></textarea>
            
            <!-- Kontainer Input 8 Kartu Carousel (Hanya tampil saat modul Carousel aktif) -->
            <div id="carousel-inputs" class="hidden flex-col w-full pb-10 space-y-4 mt-4">
                <!-- 8 Kartu di-inject melalui JavaScript -->
            </div>
        </div>
    </div>

    <!-- Alert Konfirmasi Hapus (iOS Style) -->
    <div id="alert-overlay" class="fixed inset-0 bg-black/40 z-50 hidden items-center justify-center opacity-0 transition-opacity duration-300 backdrop-blur-[2px]">
        <div id="alert-box" class="bg-white/90 backdrop-blur-xl w-[270px] rounded-2xl overflow-hidden transform scale-100 transition-transform duration-300 text-center">
            <div class="pt-5 pb-4 px-4 ios-alert-border-b">
                <h3 class="font-semibold text-[17px] text-black">Delete Note?</h3>
                <p class="text-[13px] text-black mt-1">This action cannot be undone.</p>
            </div>
            <div class="flex h-11">
                <button onclick="closeDeleteAlert()" class="flex-1 text-[#007AFF] text-[17px] ios-alert-border-r active:bg-gray-200/50">Cancel</button>
                <button onclick="confirmDelete()" class="flex-1 text-[#FF3B30] font-semibold text-[17px] active:bg-gray-200/50">Delete</button>
            </div>
        </div>
    </div>

    <!-- Modal Transfer (iOS Action Sheet) -->
    <div id="transfer-overlay" class="fixed inset-0 bg-black/40 z-50 hidden flex-col justify-end p-2 opacity-0 transition-opacity duration-300 backdrop-blur-[2px]">
        <div id="transfer-box" class="w-full max-w-sm mx-auto transform translate-y-full transition-transform duration-300 mb-safe">
            <div class="bg-white/90 backdrop-blur-xl rounded-xl overflow-hidden mb-2">
                <div class="py-3 px-4 text-center ios-alert-border-b">
                    <span class="text-[13px] text-gray-500 font-semibold">Move Note To...</span>
                </div>
                <div id="transfer-options" class="flex flex-col max-h-[50vh] overflow-y-auto hide-scrollbar">
                    <!-- Opsi Jendela Sidebar diinject via JS -->
                </div>
            </div>
            <button onclick="closeTransferModal()" class="w-full bg-white rounded-xl py-3.5 text-[#007AFF] font-semibold text-[20px] active:bg-gray-100">
                Cancel
            </button>
        </div>
    </div>

    <!-- Modal Note Actions (iOS Action Sheet) -->
    <div id="actions-overlay" class="fixed inset-0 bg-black/40 z-50 hidden flex-col justify-end p-2 opacity-0 transition-opacity duration-300 backdrop-blur-[2px]">
        <div id="actions-box" class="w-full max-w-sm mx-auto transform translate-y-full transition-transform duration-300 mb-safe">
            <div class="bg-white/90 backdrop-blur-xl rounded-xl overflow-hidden mb-2">
                <div class="py-3 px-4 text-center ios-alert-border-b">
                    <span class="text-[13px] text-gray-500 font-semibold" id="actions-title">Note Actions</span>
                </div>
                <div id="actions-options" class="flex flex-col">
                    <!-- Opsi tombol fungsi diinject via JS -->
                </div>
            </div>
            <button onclick="closeActionsModal()" class="w-full bg-white rounded-xl py-3.5 text-[#007AFF] font-semibold text-[20px] active:bg-gray-100">
                Cancel
            </button>
        </div>
    </div>

    <!-- Custom Notification/HUD -->
    <div id="toast" class="fixed top-20 left-1/2 transform -translate-x-1/2 bg-gray-800/90 backdrop-blur-md text-white px-5 py-2.5 rounded-full z-[70] transition-all duration-300 -translate-y-4 opacity-0 pointer-events-none shadow-lg flex items-center shadow-[0_4px_12px_rgba(0,0,0,0.15)]">
        <i class="fa-solid fa-check-circle mr-2 text-[18px]"></i>
        <span id="toast-msg" class="font-medium text-[15px]">Message</span>
    </div>

    <script>
        // --- KONFIGURASI MULTI-APP DENGAN TEMA iOS ---
        const appsConfig = {
            copasional: {
                id: 'copasional', title: "Copasional", tintColor: "#34C759", // Green
                storageKey: "terminal_notes_copasional",
                inputPlaceholder: "Paste text to copy...", titlePlaceholder: "Title"
            },
            kinerja: {
                id: 'kinerja', title: "Kinerja Harian", tintColor: "#007AFF", // Blue
                storageKey: "copasional_notes_html", 
                inputPlaceholder: "Daily performance details...", titlePlaceholder: "Report Title"
            },
            error: {
                id: 'error', title: "Error Book", tintColor: "#FF3B30", // Red
                storageKey: "terminal_notes_error",
                inputPlaceholder: "System error logs...", titlePlaceholder: "Error Title"
            },
            myprompt: {
                id: 'myprompt', title: "My Prompt", tintColor: "#FF9500", // Orange
                storageKey: "terminal_notes_myprompt",
                inputPlaceholder: "AI instructions or prompts...", titlePlaceholder: "Prompt Title"
            },
            myinstruction: {
                id: 'myinstruction', title: "Instruction", tintColor: "#5856D6", // Indigo
                storageKey: "terminal_notes_myinstruction",
                inputPlaceholder: "System instructions...", titlePlaceholder: "Instruction Title"
            },
            mylink: {
                id: 'mylink', title: "My Link", tintColor: "#AF52DE", // Purple
                storageKey: "terminal_notes_mylink",
                inputPlaceholder: "URL links...", titlePlaceholder: "Link Title"
            },
            memo: {
                id: 'memo', title: "Memo Tasks", tintColor: "#FFCC00", // Yellow
                storageKey: "terminal_notes_memo",
                inputPlaceholder: "Notes or tasks...", titlePlaceholder: "Memo Title"
            },
            carousel: {
                id: 'carousel', title: "Carousel Note", tintColor: "#FF2D55", // Pink/Red
                storageKey: "terminal_notes_carousel",
                inputPlaceholder: "Content for items...", titlePlaceholder: "Carousel Group Title"
            }
        };

        let currentApp = 'copasional';
        let notes = [];
        let noteToDelete = null;
        let noteToTransfer = null;
        let activeNoteId = null; 
        let openAccordions = new Set();

        // Meng-inject 8 form ke dalam kontainer modal Carousel
        function initCarouselInputs() {
            const container = document.getElementById('carousel-inputs');
            let html = '';
            for(let i=1; i<=8; i++) {
                html += `
                    <div class="bg-gray-50/80 border border-gray-200 rounded-xl p-3 shadow-sm relative mt-2">
                        <div class="absolute -top-2.5 -left-2.5 bg-[#FF2D55] text-white w-6 h-6 flex items-center justify-center rounded-full text-[11px] font-bold shadow-sm">${i}</div>
                        <textarea id="car-content-${i}" placeholder="Card ${i} content..." class="w-full bg-transparent text-[15px] focus:outline-none text-black placeholder-gray-400 resize-none leading-relaxed mt-1 h-20"></textarea>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        // --- SISTEM SIDEBAR ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');
            
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                backdrop.classList.remove('hidden');
                setTimeout(() => backdrop.classList.remove('opacity-0'), 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                backdrop.classList.add('opacity-0');
                setTimeout(() => backdrop.classList.add('hidden'), 300);
            }
        }

        // --- SISTEM INISIALISASI & TEMA ---
        function switchApp(appId) {
            currentApp = appId;
            const config = appsConfig[appId];

            document.documentElement.style.setProperty('--app-tint', config.tintColor);
            
            document.getElementById('app-title').innerText = config.title;
            document.title = config.title;

            document.getElementById('note-title').placeholder = config.titlePlaceholder;
            document.getElementById('note-content').placeholder = config.inputPlaceholder;

            const btnInsert = document.getElementById('btn-insert-checkbox');
            if (currentApp === 'memo') {
                btnInsert.classList.remove('hidden');
                btnInsert.classList.add('block');
            } else {
                btnInsert.classList.add('hidden');
                btnInsert.classList.remove('block');
            }

            updateSidebarUI();
            openAccordions.clear();
            loadNotes();
            
            const sidebar = document.getElementById('sidebar');
            if (!sidebar.classList.contains('-translate-x-full')) toggleSidebar();
        }

        function updateSidebarUI() {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-gray-100');
            });
            const activeBtn = document.getElementById(`nav-${currentApp}`);
            if (activeBtn) {
                activeBtn.classList.add('bg-gray-100');
            }
        }

        // --- MANAJEMEN DATA STORAGE ---
        function loadNotes() {
            const config = appsConfig[currentApp];
            const savedNotes = localStorage.getItem(config.storageKey);
            if (savedNotes) {
                try { notes = JSON.parse(savedNotes); } catch (e) { notes = []; }
            } else { notes = []; }
            renderNotes();
        }

        function saveToLocal() {
            const config = appsConfig[currentApp];
            localStorage.setItem(config.storageKey, JSON.stringify(notes));
            renderNotes();
        }

        // --- HELPERS ---
        function formatDateTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleDateString('en-US', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }

        function insertCheckbox() {
            const textarea = document.getElementById('note-content');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            const before = text.substring(0, start);
            const after  = text.substring(end, text.length);
            
            const newline = (before.length === 0 || before.endsWith('\n')) ? '' : '\n';
            textarea.value = before + newline + '- [ ] ' + after;
            textarea.focus();
            textarea.selectionStart = textarea.selectionEnd = start + newline.length + 6;
        }

        window.toggleTask = function(noteId, taskIndex, isCurrentlyChecked) {
            const note = notes.find(n => n.id === noteId);
            if (!note) return;

            let currentIdx = 0;
            const lines = note.content.split('\n');
            
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].trim().match(/^- \[[ xX]\]/)) {
                    if (currentIdx === taskIndex) {
                        if (isCurrentlyChecked) {
                            lines[i] = lines[i].replace(/^- \[[xX]\]/i, '- [ ]');
                        } else {
                            lines[i] = lines[i].replace(/^- \[ \]/, '- [x]');
                        }
                        break;
                    }
                    currentIdx++;
                }
            }
            note.content = lines.join('\n');
            note.updatedAt = Date.now();
            saveToLocal();
        };

        // --- RENDER LOGIC ---
        function renderNotes() {
            const container = document.getElementById('notes-container');
            container.innerHTML = '';

            const activeNotes = notes.filter(n => !n.deleted);

            if (activeNotes.length === 0) {
                container.className = 'w-full h-full flex flex-col items-center justify-center pt-32 pb-10';
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center text-gray-400">
                        <i class="fa-regular fa-folder-open text-6xl mb-4 text-gray-300"></i>
                        <p class="text-[17px] font-medium text-gray-500">No Notes</p>
                        <p class="text-[14px] mt-1">Tap the + button to add one.</p>
                    </div>
                `;
                return;
            }

            container.className = 'columns-1 md:columns-2 xl:columns-3 gap-4 w-full max-w-7xl mx-auto';

            activeNotes.sort((a, b) => b.timestamp - a.timestamp).forEach(note => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl shadow-sm overflow-hidden mb-4 inline-block w-full border border-gray-100';
                
                let displayTitle = 'New Note';
                if (note.title) {
                    displayTitle = escapeHTML(note.title);
                } else if (note.content && currentApp !== 'carousel') {
                    const words = note.content.trim().split(/\s+/);
                    displayTitle = escapeHTML(words.slice(0, 3).join(' '));
                    if (words.length > 3) displayTitle += '...';
                }

                let timeDisplay = formatDateTime(note.timestamp);
                if (note.updatedAt && note.updatedAt !== note.timestamp) {
                    timeDisplay = `Edited ${formatDateTime(note.updatedAt)}`;
                }

                let renderedContentHTML = '';
                
                if (currentApp === 'carousel') {
                    // Logic Rendering Khusus Carousel
                    let items = [];
                    try { items = JSON.parse(note.content); } catch(e) { items = []; }
                    if (!Array.isArray(items)) items = [];
                    
                    let cardsHtml = '';
                    items.forEach((item, idx) => {
                        let cContent = escapeHTML(item.content);
                        let linkedContent = cContent.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" onclick="event.stopPropagation()" class="text-[#007AFF] underline underline-offset-2">$1</a>');
                        
                        let safeContent = cContent.replace(/'/g, "\\'").replace(/"/g, "&quot;");

                        cardsHtml += `
                            <div class="snap-center shrink-0 w-[230px] bg-white border border-gray-200 rounded-xl p-3 flex flex-col shadow-sm max-h-[220px]">
                                <div class="flex justify-between items-center mb-2 border-b-[0.5px] border-gray-100 pb-2">
                                    <span class="text-[13px] text-gray-400 font-medium">Card ${idx+1}</span>
                                    <button onclick="copyDirectText('${safeContent}'); event.stopPropagation();" class="text-gray-400 active:text-[var(--app-tint)] transition-colors">
                                        <i class="fa-regular fa-copy text-[14px]"></i>
                                    </button>
                                </div>
                                <div class="text-[14px] text-gray-700 whitespace-pre-wrap overflow-y-auto hide-scrollbar flex-1 leading-relaxed">${linkedContent}</div>
                            </div>
                        `;
                    });

                    // Bungkus dalam kontainer Horizontal Scroll
                    renderedContentHTML = `
                        <div class="bg-gray-100/50 -mx-4 -mt-4 p-4 pb-5 mb-[-1rem]">
                            <div class="flex overflow-x-auto gap-3 snap-x hide-scrollbar">
                                ${cardsHtml}
                            </div>
                        </div>
                    `;

                } else if (currentApp === 'memo') {
                    const lines = note.content.split('\n');
                    let taskIdx = 0;
                    renderedContentHTML = lines.map(line => {
                        if (line.trim().match(/^- \[[ xX]\]/)) {
                            const isChecked = !!line.trim().match(/^- \[[xX]\]/i);
                            const text = escapeHTML(line.replace(/^- \[[ xX]\]\s*/i, ''));
                            const checkState = isChecked ? 'checked' : '';
                            const textClass = isChecked ? 'line-through text-gray-400' : 'text-black';
                            return `
                                <div class="flex items-start my-2.5" onclick="event.stopPropagation()">
                                    <input type="checkbox" ${checkState} class="theme-checkbox mt-[2px] mr-3 shrink-0" onchange="toggleTask(${note.id}, ${taskIdx++}, ${isChecked})">
                                    <span class="${textClass} text-[15px] transition-colors leading-snug">${text || '&nbsp;'}</span>
                                </div>`;
                        } else {
                            return `<div class="min-h-[1.5em] text-[15px] text-gray-800 whitespace-pre-wrap leading-relaxed">${escapeHTML(line)}</div>`;
                        }
                    }).join('');
                } else if (currentApp === 'mylink') {
                    const escapedContent = escapeHTML(note.content);
                    const linkedContent = escapedContent.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" onclick="event.stopPropagation()" class="text-[#007AFF] underline underline-offset-2">$1</a>');
                    renderedContentHTML = `<div class="whitespace-pre-wrap text-[15px] text-gray-800 leading-relaxed">${linkedContent}</div>`;
                } else {
                    renderedContentHTML = `<div class="whitespace-pre-wrap text-[15px] text-gray-800 leading-relaxed">${escapeHTML(note.content)}</div>`;
                }

                card.innerHTML = `
                    <div class="px-4 py-3.5 flex justify-between items-center cursor-pointer active:bg-gray-50 transition-colors" onclick="toggleAccordion(${note.id})">
                        <div class="flex-1 pr-3 overflow-hidden">
                            <h3 class="font-semibold text-[17px] text-black truncate">${displayTitle}</h3>
                            <p class="text-[13px] text-gray-500 mt-0.5">${timeDisplay}</p>
                        </div>
                        <div class="flex items-center space-x-2">
                            <button onclick="openActionsModal(${note.id}); event.stopPropagation();" class="w-8 h-8 flex items-center justify-center text-gray-400 active:text-[var(--app-tint)] transition-colors">
                                <i class="fa-solid fa-ellipsis-vertical text-xl"></i>
                            </button>
                            <i class="fa-solid fa-chevron-down text-gray-400 text-sm chevron-icon ml-1" id="icon-${note.id}"></i>
                        </div>
                    </div>
                    
                    <div class="accordion-content border-t-[0.5px] border-gray-100" id="content-${note.id}">
                        <div class="accordion-inner bg-white">
                            <div class="p-4">
                                ${renderedContentHTML}
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);

                if (openAccordions.has(note.id)) {
                    document.getElementById(`content-${note.id}`).classList.add('open');
                    document.getElementById(`icon-${note.id}`).classList.add('open');
                }
            });
        }

        // --- INTERAKSI UI & COPY PASTE ---
        function toggleAccordion(id) {
            const content = document.getElementById(`content-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            
            const isOpen = content.classList.toggle('open');
            icon.classList.toggle('open');

            if (isOpen) openAccordions.add(id);
            else openAccordions.delete(id);
        }

        let toastTimeout;
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            
            toast.classList.remove('-translate-y-4', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('-translate-y-4', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 2000);
        }

        // Fungsi khusus menyalin catatan individu dalam Carousel
        window.copyDirectText = function(content) {
            if(!content) {
                showToast("Card is empty");
                return;
            }
            const textToCopy = content;
            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            textArea.style.position = "fixed"; document.body.appendChild(textArea);
            textArea.focus(); textArea.select();
            try { document.execCommand('copy'); showToast("Card Copied"); } 
            catch (err) { showToast("Failed to copy"); }
            document.body.removeChild(textArea);
        };

        function copyNote(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;
            let textToCopy = '';

            if (currentApp === 'carousel') {
                // Saat menyalin induk Carousel, satukan 8 catatan
                let items = [];
                try { items = JSON.parse(note.content); } catch(e) {}
                let formatted = [];
                if(note.title) formatted.push(`== ${note.title} ==\n`);
                items.forEach((it, idx) => {
                    if(it.content) {
                        formatted.push(`[Card ${idx+1}]\n${it.content}\n`);
                    }
                });
                textToCopy = formatted.join('\n');
            } else {
                textToCopy = note.title ? `${note.title}\n\n${note.content}` : note.content;
            }
            
            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            textArea.style.position = "fixed"; document.body.appendChild(textArea);
            textArea.focus(); textArea.select();
            
            try { document.execCommand('copy'); showToast("Copied to clipboard"); } 
            catch (err) { showToast("Failed to copy"); }
            document.body.removeChild(textArea);
        }

        function downloadNote(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;
            
            let textToDownload = '';
            if (currentApp === 'carousel') {
                let items = [];
                try { items = JSON.parse(note.content); } catch(e) {}
                let formatted = [];
                if(note.title) formatted.push(`== ${note.title} ==\n`);
                items.forEach((it, idx) => {
                    if(it.content) {
                        formatted.push(`[Card ${idx+1}]\n${it.content}\n`);
                    }
                });
                textToDownload = formatted.join('\n');
            } else {
                textToDownload = note.title ? `${note.title}\n\n${note.content}` : note.content;
            }

            const blob = new Blob([textToDownload], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            let filename = note.title ? note.title.replace(/[^a-z0-9]/gi, '_').toLowerCase() + '.txt' : `note_${note.id}.txt`;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast("Saved to device");
        }

        function visitSite(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;
            const urlMatch = note.content.match(/(https?:\/\/[^\s]+)/);
            if (urlMatch) {
                window.open(urlMatch[0], '_blank');
            } else {
                showToast("No valid URL found");
            }
        }

        // --- MANAJEMEN MODAL ---
        function openModal(id = null) {
            const overlay = document.getElementById('modal-overlay');
            const modal = document.getElementById('modal');
            const titleInput = document.getElementById('note-title');
            const normalContent = document.getElementById('note-content');
            const carouselContent = document.getElementById('carousel-inputs');
            const idInput = document.getElementById('note-id');
            const modalTitle = document.getElementById('modal-title');

            // Setelan Tampilan Tipe Note
            if (currentApp === 'carousel') {
                normalContent.classList.add('hidden');
                carouselContent.classList.remove('hidden');
                carouselContent.classList.add('flex');
            } else {
                normalContent.classList.remove('hidden');
                carouselContent.classList.add('hidden');
                carouselContent.classList.remove('flex');
            }

            if (id) {
                const note = notes.find(n => n.id === id);
                if(note) {
                    idInput.value = note.id;
                    titleInput.value = note.title || '';
                    modalTitle.innerText = "Edit Note";
                    
                    if (currentApp === 'carousel') {
                        let parsed = [];
                        try { parsed = JSON.parse(note.content); } catch(e) {}
                        for(let i=1; i<=8; i++) {
                            const item = parsed[i-1] || {content: ''};
                            document.getElementById(`car-content-${i}`).value = item.content || '';
                        }
                    } else {
                        normalContent.value = note.content || '';
                    }
                }
            } else {
                idInput.value = ""; titleInput.value = ""; 
                modalTitle.innerText = "New Note";
                if (currentApp === 'carousel') {
                    for(let i=1; i<=8; i++) {
                        document.getElementById(`car-content-${i}`).value = '';
                    }
                } else {
                    normalContent.value = "";
                }
            }

            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                modal.classList.remove('translate-y-full');
            }, 10);
            
            // Auto focus
            setTimeout(() => {
                if(currentApp === 'carousel') document.getElementById('car-content-1').focus();
                else normalContent.focus();
            }, 300);
        }

        function closeModal() {
            const overlay = document.getElementById('modal-overlay');
            const modal = document.getElementById('modal');
            overlay.classList.add('opacity-0');
            modal.classList.add('translate-y-full');
            setTimeout(() => overlay.classList.add('hidden'), 300);
        }

        function saveNote() {
            const idInput = document.getElementById('note-id').value;
            const title = document.getElementById('note-title').value.trim();
            let contentStr = '';

            if (currentApp === 'carousel') {
                const carouselData = [];
                let hasData = false;
                for(let i=1; i<=8; i++) {
                    const cContent = document.getElementById(`car-content-${i}`).value.trim();
                    if(cContent) hasData = true;
                    carouselData.push({ content: cContent });
                }
                if (!title && !hasData) return; // Kosong
                contentStr = JSON.stringify(carouselData);
            } else {
                contentStr = document.getElementById('note-content').value.trim();
                if (!title && !contentStr) return; 
            }

            if (idInput) {
                const index = notes.findIndex(n => n.id === parseInt(idInput));
                if (index !== -1) {
                    notes[index].title = title; 
                    notes[index].content = contentStr; 
                    notes[index].updatedAt = Date.now();
                }
            } else {
                notes.push({ id: Date.now(), title, content: contentStr, timestamp: Date.now(), updatedAt: Date.now(), deleted: false });
            }
            saveToLocal();
            closeModal();
        }

        // --- MANAJEMEN ALERT HAPUS (SOFT DELETE) ---
        function openDeleteAlert(id) {
            noteToDelete = id;
            const overlay = document.getElementById('alert-overlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            setTimeout(() => overlay.classList.remove('opacity-0'), 10);
        }

        function closeDeleteAlert() {
            noteToDelete = null;
            const overlay = document.getElementById('alert-overlay');
            overlay.classList.add('opacity-0');
            setTimeout(() => { overlay.classList.add('hidden'); overlay.classList.remove('flex'); }, 300);
        }

        function confirmDelete() {
            if (noteToDelete) {
                const index = notes.findIndex(n => n.id === noteToDelete);
                if (index !== -1) {
                    notes[index].deleted = true;
                    notes[index].updatedAt = Date.now();
                }
                saveToLocal(); 
                closeDeleteAlert();
            }
        }

        // --- MANAJEMEN TRANSFER / PINDAH JENDELA ---
        function openTransferModal(id) {
            noteToTransfer = id;
            const optionsContainer = document.getElementById('transfer-options');
            optionsContainer.innerHTML = ''; 

            Object.values(appsConfig).forEach(app => {
                if (app.id !== currentApp) {
                    const btn = document.createElement('button');
                    btn.className = 'w-full text-center py-4 text-[17px] text-[#007AFF] ios-alert-border-b active:bg-gray-100 bg-white last:border-b-0';
                    btn.innerText = `Move to ${app.title}`;
                    btn.onclick = () => executeTransfer(app.id);
                    optionsContainer.appendChild(btn);
                }
            });

            const overlay = document.getElementById('transfer-overlay');
            const box = document.getElementById('transfer-box');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            setTimeout(() => { 
                overlay.classList.remove('opacity-0'); 
                box.classList.remove('translate-y-full'); 
            }, 10);
        }

        function closeTransferModal() {
            noteToTransfer = null;
            const overlay = document.getElementById('transfer-overlay');
            const box = document.getElementById('transfer-box');
            box.classList.add('translate-y-full');
            overlay.classList.add('opacity-0');
            setTimeout(() => { overlay.classList.add('hidden'); overlay.classList.remove('flex'); }, 300);
        }

        function executeTransfer(targetAppId) {
            if (!noteToTransfer) return;

            const noteIndex = notes.findIndex(n => n.id === noteToTransfer);
            if (noteIndex === -1) return;
            const note = notes[noteIndex]; 

            const targetConfig = appsConfig[targetAppId];
            let targetNotes = [];
            const savedTargetNotes = localStorage.getItem(targetConfig.storageKey);
            if (savedTargetNotes) {
                try { targetNotes = JSON.parse(savedTargetNotes); } catch (e) { targetNotes = []; }
            }

            const noteCopy = { ...note, updatedAt: Date.now(), deleted: false };
            const existingIdx = targetNotes.findIndex(n => n.id === noteCopy.id);
            if (existingIdx !== -1) targetNotes[existingIdx] = noteCopy;
            else targetNotes.push(noteCopy);
            
            localStorage.setItem(targetConfig.storageKey, JSON.stringify(targetNotes));

            notes[noteIndex].deleted = true;
            notes[noteIndex].updatedAt = Date.now();
            saveToLocal(); 
            
            closeTransferModal();
            showToast("Note moved successfully");
        }

        // --- MANAJEMEN ACTIONS MODAL (TITIK TIGA) ---
        function openActionsModal(id) {
            activeNoteId = id;
            const note = notes.find(n => n.id === id);
            if(!note) return;

            const optionsContainer = document.getElementById('actions-options');
            optionsContainer.innerHTML = '';

            const createBtn = (icon, text, onClickFn, isDestructive = false) => {
                const btn = document.createElement('button');
                btn.className = `w-full flex items-center py-3.5 px-5 text-[17px] active:bg-gray-100 bg-white ios-alert-border-b last:border-b-0 ${isDestructive ? 'text-[#FF3B30]' : 'text-[#007AFF]'}`;
                btn.innerHTML = `<i class="${icon} w-6 text-center mr-3 text-[18px]"></i> <span class="font-medium">${text}</span>`;
                btn.onclick = () => {
                    closeActionsModal();
                    setTimeout(() => onClickFn(id), 300);
                };
                return btn;
            };

            optionsContainer.appendChild(createBtn('fa-regular fa-copy', 'Copy Text', copyNote));
            optionsContainer.appendChild(createBtn('fa-solid fa-download', 'Download File', downloadNote));
            
            if (currentApp === 'mylink') {
                optionsContainer.appendChild(createBtn('fa-solid fa-arrow-up-right-from-square', 'Visit Link', visitSite));
            }

            optionsContainer.appendChild(createBtn('fa-regular fa-pen-to-square', 'Edit Note', openModal));
            optionsContainer.appendChild(createBtn('fa-regular fa-folder-open', 'Move to...', openTransferModal));
            optionsContainer.appendChild(createBtn('fa-regular fa-trash-can', 'Delete', openDeleteAlert, true));

            let displayTitle = note.title;
            if (!displayTitle && note.content && currentApp !== 'carousel') {
                const words = note.content.trim().split(/\s+/);
                displayTitle = words.slice(0, 3).join(' ') + (words.length > 3 ? '...' : '');
            }
            document.getElementById('actions-title').innerText = displayTitle || 'Note Actions';

            const overlay = document.getElementById('actions-overlay');
            const box = document.getElementById('actions-box');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            setTimeout(() => { 
                overlay.classList.remove('opacity-0'); 
                box.classList.remove('translate-y-full'); 
            }, 10);
        }

        function closeActionsModal() {
            const overlay = document.getElementById('actions-overlay');
            const box = document.getElementById('actions-box');
            box.classList.add('translate-y-full');
            overlay.classList.add('opacity-0');
            setTimeout(() => { overlay.classList.add('hidden'); overlay.classList.remove('flex'); }, 300);
        }

        // --- MANAJEMEN EXPORT & IMPORT DATA (SYNC / MERGE) ---
        function exportData() {
            const backupData = {};
            for (const key in appsConfig) {
                const storageKey = appsConfig[key].storageKey;
                const data = localStorage.getItem(storageKey);
                if (data) {
                    try { backupData[storageKey] = JSON.parse(data); }
                    catch(e) { backupData[storageKey] = []; }
                } else {
                    backupData[storageKey] = [];
                }
            }
            
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupData));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            
            const dateStr = new Date().toISOString().slice(0,10).replace(/-/g, "");
            downloadAnchorNode.setAttribute("download", `Backup_Sync_${dateStr}.json`);
            
            document.body.appendChild(downloadAnchorNode); 
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            
            showToast("Backup exported");
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const backupData = JSON.parse(e.target.result);
                    let importedCount = 0;
                    
                    for (const key in appsConfig) {
                        const storageKey = appsConfig[key].storageKey;
                        
                        if (backupData[storageKey]) {
                            const incomingNotes = backupData[storageKey];
                            if (!Array.isArray(incomingNotes)) continue;

                            let existingNotes = [];
                            const existingDataStr = localStorage.getItem(storageKey);
                            if (existingDataStr) {
                                try { existingNotes = JSON.parse(existingDataStr); } catch(err) {}
                            }

                            const notesMap = new Map();
                            existingNotes.forEach(note => notesMap.set(note.id, note));

                            incomingNotes.forEach(incomingNote => {
                                const existingNote = notesMap.get(incomingNote.id);
                                if (existingNote) {
                                    const incomingTime = incomingNote.updatedAt || incomingNote.timestamp || 0;
                                    const existingTime = existingNote.updatedAt || existingNote.timestamp || 0;

                                    if (incomingTime > existingTime) {
                                        notesMap.set(incomingNote.id, incomingNote);
                                    }
                                } else {
                                    notesMap.set(incomingNote.id, incomingNote);
                                }
                            });

                            const mergedNotes = Array.from(notesMap.values());
                            localStorage.setItem(storageKey, JSON.stringify(mergedNotes));
                            importedCount++;
                        }
                    }
                    
                    if (importedCount > 0) {
                        loadNotes(); 
                        showToast("Data synced successfully!");
                    } else {
                        showToast("No valid data to sync");
                    }
                } catch (err) {
                    showToast("Failed to read sync file");
                }
                event.target.value = ''; 
            };
            reader.readAsText(file);
            
            const sidebar = document.getElementById('sidebar');
            if (!sidebar.classList.contains('-translate-x-full')) toggleSidebar();
        }

        // EKSEKUSI AWAL
        window.onload = () => {
            initCarouselInputs();
            switchApp('copasional');
        };
    </script>
</body>
</html>
