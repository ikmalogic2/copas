<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MULTI TERMINAL APP</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts: Space Grotesk -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Definisi 6 Tema Warna Dinamis */
        :root {
            /* Default: Copasional */
            --neon-color-rgb: 57, 255, 20;
            --dim-color-rgb: 26, 74, 26;
            --text-color-rgb: 255, 255, 255;
        }

        .theme-copasional {
            --neon-color-rgb: 57, 255, 20; /* Hijau Neon */
            --dim-color-rgb: 26, 74, 26;
            --text-color-rgb: 255, 255, 255; 
        }

        .theme-kinerja {
            --neon-color-rgb: 0, 255, 255; /* Cyan Neon */
            --dim-color-rgb: 0, 77, 77;
            --text-color-rgb: 255, 255, 255; 
        }

        .theme-error {
            --neon-color-rgb: 255, 50, 50; /* Merah Neon */
            --dim-color-rgb: 77, 0, 0;
            --text-color-rgb: 255, 255, 255; 
        }

        .theme-myprompt {
            --neon-color-rgb: 255, 140, 0; /* Oranye Neon */
            --dim-color-rgb: 77, 42, 0;
            --text-color-rgb: 255, 255, 255; 
        }

        .theme-myinstruction {
            --neon-color-rgb: 0, 150, 255; /* Biru Neon */
            --dim-color-rgb: 0, 40, 77;
            --text-color-rgb: 255, 255, 255; 
        }

        .theme-mylink {
            --neon-color-rgb: 212, 0, 255; /* Magenta/Ungu Neon */
            --dim-color-rgb: 60, 0, 77;
            --text-color-rgb: 255, 255, 255; 
        }

        .theme-memo {
            --neon-color-rgb: 255, 255, 0; /* Kuning Neon */
            --dim-color-rgb: 77, 77, 0;
            --text-color-rgb: 255, 255, 255; 
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Space Grotesk', monospace, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Efek Glow Terminal */
        .neon-text { text-shadow: 0 0 5px rgba(var(--neon-color-rgb), 0.5); }
        .neon-border { box-shadow: 0 0 8px rgba(var(--neon-color-rgb), 0.2); }
        .neon-border-focus:focus {
            box-shadow: 0 0 12px rgba(var(--neon-color-rgb), 0.6);
            border-color: rgb(var(--neon-color-rgb));
        }
        .neon-bg-glow { box-shadow: inset 5px 0px 15px -5px rgba(var(--neon-color-rgb), 0.4); }

        /* Animasi Cursor Berkedip */
        .blinking-cursor { animation: blink 1s step-end infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Animasi Akordion */
        .accordion-content, .accordion-toolbar {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .accordion-content.open, .accordion-toolbar.open { grid-template-rows: 1fr; }
        .accordion-inner, .toolbar-inner { overflow: hidden; }

        .chevron-icon { transition: transform 0.3s ease; }
        .chevron-icon.open { transform: rotate(180deg); }

        /* Custom Scrollbar & Masonry Helpers */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; border-left: 1px solid rgb(var(--dim-color-rgb)); }
        ::-webkit-scrollbar-thumb { background: rgb(var(--neon-color-rgb)); }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: thin; }
        
        /* Checkbox Khusus Tema */
        input[type="checkbox"].theme-checkbox {
            accent-color: rgb(var(--neon-color-rgb));
            transform: scale(1.1);
        }
    </style>

    <script>
        // Konfigurasi Tailwind untuk membaca CSS Variables
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        terminal: {
                            bg: '#000000',
                            card: '#0a0a0a',
                            neon: 'rgb(var(--neon-color-rgb) / <alpha-value>)',
                            dim: 'rgb(var(--dim-color-rgb) / <alpha-value>)',
                            text: 'rgb(var(--text-color-rgb) / <alpha-value>)',
                            red: '#ff003c'
                        }
                    },
                    fontFamily: { sans: ['"Space Grotesk"', 'monospace', 'sans-serif'] }
                }
            }
        }
    </script>
</head>

<body class="bg-terminal-bg flex h-screen w-full font-sans transition-colors duration-500 selection:bg-terminal-neon selection:text-black theme-copasional overflow-hidden" id="app-body">

    <!-- Overlay Sidebar -->
    <div id="sidebar-backdrop" onclick="toggleSidebar()" class="fixed inset-0 bg-black/70 z-30 hidden backdrop-blur-sm transition-opacity duration-300 opacity-0"></div>

    <!-- Sidebar Layout -->
    <aside id="sidebar" class="fixed top-0 right-0 h-full w-[260px] border-l border-terminal-neon bg-terminal-bg/95 backdrop-blur-md flex flex-col transition-transform duration-300 z-40 translate-x-full flex-shrink-0 shadow-[0_0_20px_rgba(var(--neon-color-rgb),0.2)]">
        <div class="p-4 border-b border-terminal-dim flex items-center justify-between h-[60px] md:h-[70px]">
            <div class="flex items-center cursor-pointer" onclick="toggleSidebar()">
                <i class="fa-solid fa-terminal text-terminal-neon text-2xl mr-3 transition-colors duration-500"></i>
                <span class="font-bold text-[17px] text-white tracking-widest transition-colors duration-500">SYS_MENU</span>
            </div>
            <button onclick="toggleSidebar()" class="text-terminal-neon hover:text-white text-xl w-8 h-8 flex items-center justify-center">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        
        <nav class="flex-1 flex flex-col pt-4 space-y-2 px-2 overflow-y-auto pb-4">
            <button id="nav-copasional" onclick="switchApp('copasional')" class="nav-btn flex items-center py-3.5 px-4 text-terminal-neon/50 hover:bg-terminal-neon/10 hover:text-terminal-neon transition-all border-l-[3px] border-transparent">
                <i class="fa-solid fa-clipboard text-xl w-6 text-center"></i>
                <span class="ml-3 font-bold tracking-wide text-[14px] text-white">COPASIONAL</span>
            </button>
            <button id="nav-kinerja" onclick="switchApp('kinerja')" class="nav-btn flex items-center py-3.5 px-4 text-terminal-neon/50 hover:bg-terminal-neon/10 hover:text-terminal-neon transition-all border-l-[3px] border-transparent">
                <i class="fa-solid fa-chart-line text-xl w-6 text-center"></i>
                <span class="ml-3 font-bold tracking-wide text-[14px] text-white">KINERJA HARIAN</span>
            </button>
            <button id="nav-error" onclick="switchApp('error')" class="nav-btn flex items-center py-3.5 px-4 text-terminal-neon/50 hover:bg-terminal-neon/10 hover:text-terminal-neon transition-all border-l-[3px] border-transparent">
                <i class="fa-solid fa-bug text-xl w-6 text-center"></i>
                <span class="ml-3 font-bold tracking-wide text-[14px] text-white">ERROR BOOK</span>
            </button>
            <button id="nav-myprompt" onclick="switchApp('myprompt')" class="nav-btn flex items-center py-3.5 px-4 text-terminal-neon/50 hover:bg-terminal-neon/10 hover:text-terminal-neon transition-all border-l-[3px] border-transparent">
                <i class="fa-solid fa-keyboard text-xl w-6 text-center"></i>
                <span class="ml-3 font-bold tracking-wide text-[14px] text-white">MY PROMPT</span>
            </button>
            <button id="nav-myinstruction" onclick="switchApp('myinstruction')" class="nav-btn flex items-center py-3.5 px-4 text-terminal-neon/50 hover:bg-terminal-neon/10 hover:text-terminal-neon transition-all border-l-[3px] border-transparent">
                <i class="fa-solid fa-code text-xl w-6 text-center"></i>
                <span class="ml-3 font-bold tracking-wide text-[14px] text-white">MY INSTRUCTION</span>
            </button>
            <button id="nav-mylink" onclick="switchApp('mylink')" class="nav-btn flex items-center py-3.5 px-4 text-terminal-neon/50 hover:bg-terminal-neon/10 hover:text-terminal-neon transition-all border-l-[3px] border-transparent">
                <i class="fa-solid fa-link text-xl w-6 text-center"></i>
                <span class="ml-3 font-bold tracking-wide text-[14px] text-white">MY LINK</span>
            </button>
            <button id="nav-memo" onclick="switchApp('memo')" class="nav-btn flex items-center py-3.5 px-4 text-terminal-neon/50 hover:bg-terminal-neon/10 hover:text-terminal-neon transition-all border-l-[3px] border-transparent">
                <i class="fa-solid fa-list-check text-xl w-6 text-center"></i>
                <span class="ml-3 font-bold tracking-wide text-[14px] text-white">MEMO TASKS</span>
            </button>
        </nav>
        
        <div class="p-4 border-t border-terminal-dim flex items-center justify-start">
            <div class="w-3 h-3 rounded-full bg-terminal-neon animate-pulse mr-2 shadow-[0_0_8px_rgba(var(--neon-color-rgb),0.8)]"></div>
            <span class="text-[11px] text-white font-mono">SYSTEM_ONLINE</span>
        </div>
    </aside>

    <!-- Wrapper Utama -->
    <div class="flex-1 bg-terminal-bg relative flex flex-col min-w-0 transition-colors duration-500 h-full">
        
        <header class="bg-terminal-bg shrink-0 z-10 border-b border-terminal-neon px-4 h-[60px] md:h-[70px] flex items-center justify-between transition-colors duration-500 shadow-[0_4px_20px_-10px_rgba(var(--neon-color-rgb),0.3)]">
            <button onclick="openModal()" class="bg-transparent border border-terminal-neon text-terminal-neon w-9 h-9 md:w-10 md:h-10 shadow-[0_0_5px_rgba(var(--neon-color-rgb),0.3)] flex items-center justify-center text-lg active:scale-95 transition-all hover:bg-terminal-neon hover:text-black z-20">
                <i class="fa-solid fa-plus"></i>
            </button>
            <h1 id="app-title" class="text-[14px] md:text-[18px] font-bold text-white tracking-widest absolute left-1/2 transform -translate-x-1/2 w-max uppercase">
                &gt; INITIALIZING...<span class="blinking-cursor">_</span>
            </h1>
            <button onclick="toggleSidebar()" class="text-terminal-neon hover:text-white transition-colors w-10 h-10 flex items-center justify-end text-2xl z-20 cursor-pointer">
                <i class="fa-solid fa-terminal"></i>
            </button>
        </header>

        <!-- Pop Up / Floating Notification -->
        <div id="toast" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-terminal-bg/95 border-2 border-terminal-neon text-white px-8 py-6 rounded-none z-[70] transition-all duration-300 scale-75 opacity-0 pointer-events-none shadow-[0_0_40px_rgba(var(--neon-color-rgb),0.8)] flex flex-col items-center justify-center text-center backdrop-blur-md">
            <i class="fa-solid fa-circle-check text-terminal-neon text-5xl mb-4 animate-bounce"></i>
            <span id="toast-msg" class="font-bold text-[16px] md:text-[18px] tracking-widest uppercase">PESAN</span>
        </div>

        <!-- Area Utama (Daftar Catatan) - Menggunakan CSS Columns agar tidak overlap -->
        <main class="flex-1 p-4 md:p-6 overflow-y-auto hide-scrollbar pb-24 md:pb-10" id="main-scroll-area">
            <div id="notes-container" class="w-full">
                <!-- Kartu catatan via JS -->
            </div>
        </main>

        <!-- Modal Tambah/Edit -->
        <div id="modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-30 hidden opacity-0 transition-opacity duration-300" onclick="closeModal()"></div>
        
        <div id="modal" class="fixed inset-x-0 bottom-0 z-40 bg-terminal-bg border-t-2 border-terminal-neon transform translate-y-full transition-transform duration-300 h-[85vh] flex flex-col w-full md:max-w-3xl lg:max-w-4xl mx-auto neon-border">
            <div class="bg-terminal-card flex justify-between items-center p-4 border-b border-terminal-neon shrink-0">
                <button onclick="closeModal()" class="text-white text-[14px] md:text-[16px] hover:underline transition-all font-mono">[ ESC ]</button>
                <div class="flex items-center space-x-3">
                    <button id="btn-insert-checkbox" onclick="insertCheckbox()" class="hidden border border-terminal-neon text-white px-3 py-1 text-xs hover:bg-terminal-neon hover:text-black transition-colors font-mono font-bold">
                        [+ Checkbox]
                    </button>
                    <h2 class="font-bold text-[15px] md:text-[17px] text-white tracking-wide" id="modal-title">NEW_ENTRY</h2>
                </div>
                <button onclick="saveNote()" class="text-[#000000] px-4 py-2 font-bold text-[14px] md:text-[15px] hover:bg-white transition-all flex items-center shadow-[0_0_10px_rgba(var(--neon-color-rgb),0.6)]" style="background-color: rgb(var(--neon-color-rgb));">
                    SAVE <i class="fa-solid fa-play ml-2 text-xs"></i>
                </button>
            </div>
            
            <div class="p-4 md:p-6 flex-1 flex flex-col overflow-y-auto hide-scrollbar">
                <input type="hidden" id="note-id">
                <input type="text" id="note-title" placeholder="Judul_File..." class="w-full bg-terminal-card border border-terminal-dim p-3.5 md:p-4 mb-4 text-[16px] md:text-[18px] font-medium focus:outline-none text-white placeholder-terminal-dim neon-border-focus transition-all rounded-none">
                <textarea id="note-content" placeholder="> Masukkan input data di sini..." class="w-full flex-1 min-h-[200px] bg-terminal-card border border-terminal-dim p-3.5 md:p-4 text-[14px] md:text-[16px] focus:outline-none text-white placeholder-terminal-dim resize-none leading-relaxed neon-border-focus transition-all rounded-none font-mono"></textarea>
            </div>
        </div>

        <!-- Alert Konfirmasi Hapus -->
        <div id="alert-overlay" class="fixed inset-0 bg-black/80 z-50 hidden items-center justify-center opacity-0 transition-opacity duration-300">
            <div id="alert-box" class="bg-terminal-bg border border-terminal-red w-[280px] md:w-[320px] text-center overflow-hidden transform scale-95 transition-transform duration-300 shadow-[0_0_20px_rgba(255,50,50,0.4)] rounded-none">
                <div class="p-5 md:p-6 border-b border-terminal-red/30">
                    <i class="fa-solid fa-triangle-exclamation text-terminal-red text-4xl mb-4 animate-pulse"></i>
                    <h3 class="font-bold text-[16px] md:text-[18px] text-white tracking-wider">SYSTEM_WARNING</h3>
                    <p class="text-[12px] md:text-[13px] text-white mt-2 font-mono leading-relaxed">Data akan dihapus permanen. Eksekusi?</p>
                </div>
                <div class="flex">
                    <button onclick="closeDeleteAlert()" class="flex-1 p-3.5 md:p-4 text-white text-[14px] font-bold hover:bg-terminal-card transition-colors border-r border-terminal-red/30">CANCEL</button>
                    <button onclick="confirmDelete()" id="btn-confirm-delete" class="flex-1 p-3.5 md:p-4 bg-terminal-red text-black font-bold text-[14px] hover:bg-red-500 transition-colors">EXECUTE</button>
                </div>
            </div>
        </div>

        <!-- Modal Transfer / Pindah Jendela -->
        <div id="transfer-overlay" class="fixed inset-0 bg-black/80 z-50 hidden items-center justify-center opacity-0 transition-opacity duration-300">
            <div id="transfer-box" class="bg-terminal-bg border border-terminal-neon w-[300px] md:w-[350px] text-center overflow-hidden transform scale-95 transition-transform duration-300 shadow-[0_0_20px_rgba(var(--neon-color-rgb),0.4)] rounded-none">
                <div class="p-4 border-b border-terminal-neon/30 bg-terminal-card flex justify-between items-center">
                    <h3 class="font-bold text-[14px] md:text-[15px] text-white tracking-wider"><i class="fa-solid fa-right-left text-terminal-neon mr-2"></i>TRANSFER_DATA</h3>
                    <button onclick="closeTransferModal()" class="text-white hover:text-terminal-neon transition-colors"><i class="fa-solid fa-xmark text-lg"></i></button>
                </div>
                <div id="transfer-options" class="flex flex-col p-1 max-h-[50vh] overflow-y-auto hide-scrollbar">
                    <!-- Opsi Jendela Sidebar diinject via JS -->
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- KONFIGURASI MULTI-APP ---
        const appsConfig = {
            copasional: {
                id: 'copasional', title: "COPASIONAL", themeClass: "theme-copasional",
                storageKey: "terminal_notes_copasional",
                inputPlaceholder: "> Paste teks untuk disalin di sini...", titlePlaceholder: "Judul_Copas..."
            },
            kinerja: {
                id: 'kinerja', title: "LAPORAN_KINERJA_HARIAN", themeClass: "theme-kinerja",
                storageKey: "copasional_notes_html", 
                inputPlaceholder: "> Masukkan detail laporan kinerja harian di sini...", titlePlaceholder: "Judul_Laporan..."
            },
            error: {
                id: 'error', title: "ERROR_BOOK", themeClass: "theme-error",
                storageKey: "terminal_notes_error",
                inputPlaceholder: "> Masukkan log error sistem di sini...", titlePlaceholder: "Judul_Error..."
            },
            myprompt: {
                id: 'myprompt', title: "MY_PROMPT", themeClass: "theme-myprompt",
                storageKey: "terminal_notes_myprompt",
                inputPlaceholder: "> Masukkan prompt atau instruksi AI di sini...", titlePlaceholder: "Judul_Prompt..."
            },
            myinstruction: {
                id: 'myinstruction', title: "MY_INSTRUCTION", themeClass: "theme-myinstruction",
                storageKey: "terminal_notes_myinstruction",
                inputPlaceholder: "> Masukkan instruksi sistem atau panduan di sini...", titlePlaceholder: "Judul_Instruction..."
            },
            mylink: { // APP BARU
                id: 'mylink', title: "MY_LINK", themeClass: "theme-mylink",
                storageKey: "terminal_notes_mylink",
                inputPlaceholder: "> Masukkan tautan URL dan deskripsinya di sini...", titlePlaceholder: "Judul_Link..."
            },
            memo: { // APP BARU
                id: 'memo', title: "MEMO_TASKS", themeClass: "theme-memo",
                storageKey: "terminal_notes_memo",
                inputPlaceholder: "> Ketik catatan atau tekan tombol [+ Checkbox] untuk To-Do...", titlePlaceholder: "Judul_Memo_Task..."
            }
        };

        // State Global
        let currentApp = 'copasional';
        let notes = [];
        let noteToDelete = null;
        let noteToTransfer = null;
        let openAccordions = new Set(); // Menyimpan state akordion yang terbuka

        // --- SISTEM SIDEBAR ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');
            
            if (sidebar.classList.contains('translate-x-full')) {
                sidebar.classList.remove('translate-x-full');
                backdrop.classList.remove('hidden');
                setTimeout(() => backdrop.classList.remove('opacity-0'), 10);
            } else {
                sidebar.classList.add('translate-x-full');
                backdrop.classList.add('opacity-0');
                setTimeout(() => backdrop.classList.add('hidden'), 300);
            }
        }

        // --- SISTEM INISIALISASI & TEMA ---
        function switchApp(appId) {
            currentApp = appId;
            const config = appsConfig[appId];

            const body = document.getElementById('app-body');
            body.className = `bg-terminal-bg flex h-screen w-full font-sans transition-colors duration-500 selection:bg-terminal-neon selection:text-black overflow-hidden ${config.themeClass}`;

            document.getElementById('app-title').innerHTML = `&gt; ${config.title}<span class="blinking-cursor">_</span>`;
            document.title = config.title;

            document.getElementById('note-title').placeholder = config.titlePlaceholder;
            document.getElementById('note-content').placeholder = config.inputPlaceholder;

            // Tampilkan tombol checkbox khusus di Memo
            const btnInsert = document.getElementById('btn-insert-checkbox');
            if (currentApp === 'memo') {
                btnInsert.classList.remove('hidden');
                btnInsert.classList.add('block');
            } else {
                btnInsert.classList.add('hidden');
                btnInsert.classList.remove('block');
            }

            updateSidebarUI();
            openAccordions.clear(); // Reset state terbuka
            loadNotes();
            
            const sidebar = document.getElementById('sidebar');
            if (!sidebar.classList.contains('translate-x-full')) toggleSidebar();
        }

        function updateSidebarUI() {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-terminal-neon/10', 'text-terminal-neon', 'border-terminal-neon', 'neon-bg-glow');
                btn.classList.add('text-terminal-neon/50', 'border-transparent');
            });
            
            const activeBtn = document.getElementById(`nav-${currentApp}`);
            if (activeBtn) {
                activeBtn.classList.remove('text-terminal-neon/50', 'border-transparent');
                activeBtn.classList.add('bg-terminal-neon/10', 'text-terminal-neon', 'border-terminal-neon', 'neon-bg-glow');
            }
        }

        // --- MANAJEMEN DATA STORAGE ---
        function loadNotes() {
            const config = appsConfig[currentApp];
            const savedNotes = localStorage.getItem(config.storageKey);
            if (savedNotes) {
                try { notes = JSON.parse(savedNotes); } catch (e) { notes = []; }
            } else { notes = []; }
            renderNotes();
        }

        function saveToLocal() {
            const config = appsConfig[currentApp];
            localStorage.setItem(config.storageKey, JSON.stringify(notes));
            renderNotes();
        }

        // --- HELPERS ---
        function formatDateTime(timestamp) {
            const date = new Date(timestamp);
            const options = { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' };
            return date.toLocaleDateString('id-ID', options).replace(/\./g, ':');
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }

        // Fungsi khusus menyisipkan checkbox ke text area (MEMO)
        function insertCheckbox() {
            const textarea = document.getElementById('note-content');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            const before = text.substring(0, start);
            const after  = text.substring(end, text.length);
            
            const newline = (before.length === 0 || before.endsWith('\n')) ? '' : '\n';
            textarea.value = before + newline + '- [ ] ' + after;
            textarea.focus();
            textarea.selectionStart = textarea.selectionEnd = start + newline.length + 6;
        }

        // Fitur interaktif centang checkbox langsung dari kartu (MEMO)
        window.toggleTask = function(noteId, taskIndex, isCurrentlyChecked) {
            const note = notes.find(n => n.id === noteId);
            if (!note) return;

            let currentIdx = 0;
            const lines = note.content.split('\n');
            
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].trim().match(/^- \[[ xX]\]/)) {
                    if (currentIdx === taskIndex) {
                        if (isCurrentlyChecked) {
                            lines[i] = lines[i].replace(/^- \[[xX]\]/i, '- [ ]');
                        } else {
                            lines[i] = lines[i].replace(/^- \[ \]/, '- [x]');
                        }
                        break;
                    }
                    currentIdx++;
                }
            }
            note.content = lines.join('\n');
            saveToLocal(); // Auto render
        };

        // --- RENDER LOGIC UTAMA ---
        function renderNotes() {
            const container = document.getElementById('notes-container');
            container.innerHTML = '';

            if (notes.length === 0) {
                container.className = 'w-full h-full flex flex-col items-center justify-center pt-20';
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center text-terminal-dim transition-colors duration-500">
                        <i class="fa-solid fa-server text-5xl md:text-6xl mb-4 opacity-50 neon-text"></i>
                        <p class="font-bold text-[16px] md:text-[18px] text-white tracking-widest">[ DB_EMPTY ]</p>
                        <p class="text-[13px] md:text-[15px] mt-2 text-center px-4 font-mono text-white">No records found. Click [+] to initialize data.</p>
                    </div>
                `;
                return;
            }

            // Menggunakan Columns (Masonry) untuk mencegah bentrok/overlap antar baris
            container.className = 'columns-1 md:columns-2 xl:columns-3 gap-4 md:gap-5 w-full';

            notes.sort((a, b) => b.timestamp - a.timestamp).forEach(note => {
                const card = document.createElement('div');
                // inline-block dan break-inside-avoid memastikan kartu tidak terpotong antar kolom
                card.className = 'bg-terminal-card border border-terminal-dim overflow-hidden transition-colors duration-300 hover:border-terminal-neon rounded-none group break-inside-avoid mb-4 md:mb-5 inline-block w-full';
                
                let displayTitle = 'UNNAMED_RECORD';
                if (note.title) {
                    displayTitle = escapeHTML(note.title);
                } else if (note.content) {
                    const words = note.content.trim().split(/\s+/);
                    displayTitle = escapeHTML(words.slice(0, 2).join('_'));
                    if (words.length > 2) displayTitle += '...';
                }

                // Parser Konten (Khusus untuk Memo agar bisa parse To-Do)
                let renderedContentHTML = '';
                if (currentApp === 'memo') {
                    const lines = note.content.split('\n');
                    let taskIdx = 0;
                    renderedContentHTML = lines.map(line => {
                        if (line.trim().match(/^- \[[ xX]\]/)) {
                            const isChecked = !!line.trim().match(/^- \[[xX]\]/i);
                            const text = escapeHTML(line.replace(/^- \[[ xX]\]\s*/i, ''));
                            const checkState = isChecked ? 'checked' : '';
                            const textClass = isChecked ? 'opacity-50 line-through text-white/50' : 'text-white';
                            return `
                                <div class="flex items-start my-1.5 group/task" onclick="event.stopPropagation()">
                                    <input type="checkbox" ${checkState} class="theme-checkbox mt-[4px] mr-3 cursor-pointer" onchange="toggleTask(${note.id}, ${taskIdx++}, ${isChecked})">
                                    <span class="${textClass} transition-all leading-snug">${text || '&nbsp;'}</span>
                                </div>`;
                        } else {
                            return `<div class="min-h-[1.5em] text-white whitespace-pre-wrap">${escapeHTML(line)}</div>`;
                        }
                    }).join('');
                } else if (currentApp === 'mylink') {
                    const escapedContent = escapeHTML(note.content);
                    const linkedContent = escapedContent.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" onclick="event.stopPropagation()" class="underline font-bold hover:text-white transition-colors" style="color: #ffffff;">$1</a>');
                    renderedContentHTML = `<div class="whitespace-pre-wrap text-white">${linkedContent}</div>`;
                } else {
                    renderedContentHTML = `<div class="whitespace-pre-wrap text-white">${escapeHTML(note.content)}</div>`;
                }

                const visitButton = currentApp === 'mylink' ? `
                    <button onclick="visitSite(${note.id}); event.stopPropagation();" class="text-white text-[12px] md:text-[13px] flex items-center font-bold hover:text-terminal-neon transition-colors">
                        <i class="fa-solid fa-arrow-up-right-from-square mr-1.5 text-terminal-neon"></i> VISIT
                    </button>
                ` : '';

                card.innerHTML = `
                    <div class="accordion-toolbar" id="toolbar-${note.id}">
                        <div class="toolbar-inner">
                            <div class="bg-black px-4 py-2 border-b border-terminal-dim flex justify-between items-center transition-colors overflow-x-auto hide-scrollbar">
                                <div class="flex space-x-4 pr-4 min-w-max">
                                    <button onclick="copyNote(${note.id})" class="text-white text-[12px] md:text-[13px] flex items-center font-bold hover:text-terminal-neon transition-colors">
                                        <i class="fa-regular fa-copy mr-1.5 text-terminal-neon"></i> COPY
                                    </button>
                                    <button onclick="downloadNote(${note.id})" class="text-white text-[12px] md:text-[13px] flex items-center font-bold hover:text-terminal-neon transition-colors">
                                        <i class="fa-solid fa-download mr-1.5 text-terminal-neon"></i> DOWN
                                    </button>
                                    <button onclick="openTransferModal(${note.id})" class="text-white text-[12px] md:text-[13px] flex items-center font-bold hover:text-terminal-neon transition-colors">
                                        <i class="fa-solid fa-right-left mr-1.5 text-terminal-neon"></i> MOVE
                                    </button>
                                    ${visitButton}
                                </div>
                                <div class="flex space-x-4 min-w-max">
                                    <button onclick="openModal(${note.id})" class="text-white text-[12px] md:text-[13px] flex items-center font-bold hover:text-terminal-neon transition-colors">
                                        <i class="fa-solid fa-pen-nib mr-1.5 text-terminal-neon"></i> EDIT
                                    </button>
                                    <button onclick="openDeleteAlert(${note.id})" class="text-white text-[12px] md:text-[13px] flex items-center font-bold hover:text-terminal-red transition-colors">
                                        <i class="fa-solid fa-xmark mr-1.5 text-terminal-red"></i> DEL
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="px-4 py-3.5 md:px-5 md:py-4 flex justify-between items-center cursor-pointer hover:bg-terminal-neon/10 transition-colors border-l-2 border-transparent group-hover:border-terminal-neon" onclick="toggleAccordion(${note.id})">
                        <div class="flex-1 pr-3 overflow-hidden">
                            <h3 class="font-bold text-[15px] md:text-[16px] text-white truncate">${displayTitle}</h3>
                            <p class="text-[11px] md:text-[12px] text-white mt-1 font-mono">SYS.TIME: ${formatDateTime(note.timestamp)}</p>
                        </div>
                        <i class="fa-solid fa-chevron-down text-terminal-neon/60 text-sm chevron-icon" id="icon-${note.id}"></i>
                    </div>
                    
                    <div class="accordion-content" id="content-${note.id}">
                        <div class="accordion-inner">
                            <div class="px-4 pt-2 pb-4 md:px-5 md:pt-3 md:pb-5 border-t border-terminal-dim border-dashed bg-[#050505]">
                                <div class="text-[13px] md:text-[14px] text-white break-words font-mono leading-relaxed">
                                    ${renderedContentHTML}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);

                // Kembalikan state akordion jika sebelumnya terbuka (agar saat dicentang tidak auto-tutup)
                if (openAccordions.has(note.id)) {
                    document.getElementById(`toolbar-${note.id}`).classList.add('open');
                    document.getElementById(`content-${note.id}`).classList.add('open');
                    document.getElementById(`icon-${note.id}`).classList.add('open');
                }
            });
        }

        // --- INTERAKSI UI ---
        function toggleAccordion(id) {
            const toolbar = document.getElementById(`toolbar-${id}`);
            const content = document.getElementById(`content-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            
            const isOpen = toolbar.classList.toggle('open');
            content.classList.toggle('open');
            icon.classList.toggle('open');

            if (isOpen) openAccordions.add(id);
            else openAccordions.delete(id);
        }

        let toastTimeout;
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            
            toast.classList.remove('scale-75', 'opacity-0');
            toast.classList.add('scale-100', 'opacity-100');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('scale-75', 'opacity-0');
                toast.classList.remove('scale-100', 'opacity-100');
            }, 2000);
        }

        function copyNote(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;
            const textToCopy = note.title ? `${note.title}\n\n${note.content}` : note.content;
            
            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            textArea.style.position = "fixed"; document.body.appendChild(textArea);
            textArea.focus(); textArea.select();
            
            try { document.execCommand('copy'); showToast("TEKS SUDAH DISALIN"); } 
            catch (err) { showToast("GAGAL MENYALIN"); }
            document.body.removeChild(textArea);
        }

        function downloadNote(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;
            
            const textToDownload = note.title ? `${note.title}\n\n${note.content}` : note.content;
            const blob = new Blob([textToDownload], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            
            // Generate nama file otomatis dari judul atau ID jika tidak ada judul
            let filename = 'terminal_note.txt';
            if (note.title) {
                filename = note.title.replace(/[^a-z0-9]/gi, '_').toLowerCase() + '.txt';
            } else {
                filename = `note_${note.id}.txt`;
            }
            
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            
            // Clean up
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast("FILE BERHASIL DIUNDUH");
        }

        function visitSite(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;
            
            const urlMatch = note.content.match(/(https?:\/\/[^\s]+)/);
            if (urlMatch) {
                window.open(urlMatch[0], '_blank');
                showToast("MEMBUKA TAUTAN...");
            } else {
                showToast("TIDAK ADA TAUTAN");
            }
        }

        // --- MANAJEMEN MODAL ---
        function openModal(id = null) {
            const overlay = document.getElementById('modal-overlay');
            const modal = document.getElementById('modal');
            const titleInput = document.getElementById('note-title');
            const contentInput = document.getElementById('note-content');
            const idInput = document.getElementById('note-id');
            const modalTitle = document.getElementById('modal-title');

            if (id) {
                const note = notes.find(n => n.id === id);
                if(note) {
                    idInput.value = note.id;
                    titleInput.value = note.title;
                    contentInput.value = note.content;
                    modalTitle.innerText = "EDIT_MODE";
                }
            } else {
                idInput.value = ""; titleInput.value = ""; contentInput.value = "";
                modalTitle.innerText = "NEW_ENTRY";
            }

            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                modal.classList.remove('translate-y-full');
            }, 10);
            setTimeout(() => contentInput.focus(), 300);
        }

        function closeModal() {
            const overlay = document.getElementById('modal-overlay');
            const modal = document.getElementById('modal');
            overlay.classList.add('opacity-0');
            modal.classList.add('translate-y-full');
            setTimeout(() => overlay.classList.add('hidden'), 300);
        }

        function saveNote() {
            const idInput = document.getElementById('note-id').value;
            const title = document.getElementById('note-title').value.trim();
            const content = document.getElementById('note-content').value.trim();

            if (!title && !content) return showToast("DATA KOSONG DITOLAK");

            if (idInput) {
                const index = notes.findIndex(n => n.id === parseInt(idInput));
                if (index !== -1) {
                    notes[index].title = title; notes[index].content = content; notes[index].timestamp = Date.now();
                }
                showToast("CATATAN DIPERBARUI");
            } else {
                notes.push({ id: Date.now(), title, content, timestamp: Date.now() });
                showToast("CATATAN SUDAH DISIMPAN");
            }
            saveToLocal();
            closeModal();
        }

        // --- MANAJEMEN ALERT HAPUS ---
        function openDeleteAlert(id) {
            noteToDelete = id;
            const overlay = document.getElementById('alert-overlay');
            const box = document.getElementById('alert-box');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            setTimeout(() => { overlay.classList.remove('opacity-0'); box.classList.remove('scale-95'); }, 10);
        }

        function closeDeleteAlert() {
            noteToDelete = null;
            const overlay = document.getElementById('alert-overlay');
            const box = document.getElementById('alert-box');
            overlay.classList.add('opacity-0'); box.classList.add('scale-95');
            setTimeout(() => { overlay.classList.add('hidden'); overlay.classList.remove('flex'); }, 300);
        }

        function confirmDelete() {
            if (noteToDelete) {
                notes = notes.filter(n => n.id !== noteToDelete);
                saveToLocal(); showToast("CATATAN DIHAPUS"); closeDeleteAlert();
            }
        }

        // --- MANAJEMEN TRANSFER / PINDAH JENDELA ---
        function openTransferModal(id) {
            noteToTransfer = id;
            const optionsContainer = document.getElementById('transfer-options');
            optionsContainer.innerHTML = ''; 

            // Melakukan looping ke semua 6 App dan hanya menampilkan yang bukan sedang aktif
            Object.values(appsConfig).forEach(app => {
                if (app.id !== currentApp) {
                    const btn = document.createElement('button');
                    btn.className = 'p-3.5 text-left border-b border-terminal-neon/10 hover:bg-terminal-neon/20 transition-colors font-mono text-[13px] md:text-[14px] flex items-center group';
                    btn.innerHTML = `<i class="fa-solid fa-folder-tree mr-3 text-terminal-neon/50 group-hover:text-terminal-neon transition-colors"></i> <span class="text-white">MOVE TO [ ${app.title} ]</span>`;
                    btn.onclick = () => executeTransfer(app.id);
                    optionsContainer.appendChild(btn);
                }
            });

            const overlay = document.getElementById('transfer-overlay');
            const box = document.getElementById('transfer-box');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            setTimeout(() => { overlay.classList.remove('opacity-0'); box.classList.remove('scale-95'); }, 10);
        }

        function closeTransferModal() {
            noteToTransfer = null;
            const overlay = document.getElementById('transfer-overlay');
            const box = document.getElementById('transfer-box');
            overlay.classList.add('opacity-0'); box.classList.add('scale-95');
            setTimeout(() => { overlay.classList.add('hidden'); overlay.classList.remove('flex'); }, 300);
        }

        function executeTransfer(targetAppId) {
            if (!noteToTransfer) return;

            const noteIndex = notes.findIndex(n => n.id === noteToTransfer);
            if (noteIndex === -1) return;
            const note = notes[noteIndex]; // Mengambil catatan yang akan dipindah

            // 1. Ambil data catatan pada jendela tujuan dari penyimpanan lokal
            const targetConfig = appsConfig[targetAppId];
            let targetNotes = [];
            const savedTargetNotes = localStorage.getItem(targetConfig.storageKey);
            if (savedTargetNotes) {
                try { targetNotes = JSON.parse(savedTargetNotes); } catch (e) { targetNotes = []; }
            }

            // 2. Tambahkan catatan ke jendela tujuan, lalu simpan
            targetNotes.push(note);
            localStorage.setItem(targetConfig.storageKey, JSON.stringify(targetNotes));

            // 3. Hapus catatan dari jendela yang sedang aktif saat ini
            notes.splice(noteIndex, 1);
            saveToLocal(); // Otomatis refresh UI
            
            closeTransferModal();
            showToast("CATATAN DIPINDAH");
        }

        // EKSEKUSI AWAL
        window.onload = () => switchApp('copasional');
    </script>
</body>
</html>
