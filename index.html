<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Simple Categorized Notes</title>
    
    <!-- Google Fonts: Space Grotesk -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar { width: 0px; height: 0px; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animasi Modal */
        .modal-enter { transform: translateY(100%); opacity: 0; transition: all 0.3s ease-out; }
        .modal-active { transform: translateY(0); opacity: 1; }
        
        .glass-header {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .dark .glass-header {
            background-color: rgba(17, 24, 39, 0.85);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* Akordion Setup */
        .accordion-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .accordion-content.open { grid-template-rows: 1fr; }
        .accordion-inner { overflow: hidden; }

        .chevron-icon { transition: transform 0.3s ease; }
        .chevron-icon.open { transform: rotate(180deg); }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden bg-[#F2F2F7] dark:bg-gray-900 transition-colors duration-300">

    <!-- Header dengan Tombol Aksi -->
    <header class="glass-header fixed top-0 w-full z-20 h-14 flex items-center justify-between px-4 md:px-5">
        <h1 class="text-[17px] font-bold text-gray-800 dark:text-white tracking-tight">My Notes</h1>
        
        <div class="flex items-center space-x-3">
            <input type="file" id="import-file" accept=".json" class="hidden" onchange="importData(event)">
            
            <button onclick="document.getElementById('import-file').click()" class="w-8 h-8 flex items-center justify-center text-gray-500 dark:text-gray-400 active:opacity-50 text-[18px]" title="Import Data">
                <i class="fa-solid fa-cloud-arrow-up"></i>
            </button>
            <button onclick="exportData()" class="w-8 h-8 flex items-center justify-center text-gray-500 dark:text-gray-400 active:opacity-50 text-[18px]" title="Export Data">
                <i class="fa-solid fa-cloud-arrow-down"></i>
            </button>
            
            <div class="w-px h-5 bg-gray-300 dark:bg-gray-700 mx-1"></div>
            
            <!-- Tombol Toggle Theme -->
            <button onclick="toggleTheme()" id="btn-theme" class="w-8 h-8 flex items-center justify-center text-yellow-500 active:opacity-50 text-[18px]" title="Ubah Tema">
                <i class="fa-solid fa-sun" id="theme-icon"></i>
            </button>

            <button onclick="toggleGroupView()" id="btn-group" class="w-8 h-8 flex items-center justify-center text-indigo-500 active:opacity-50 text-[18px]" title="Kategorikan">
                <i class="fa-solid fa-layer-group"></i>
            </button>
            <button onclick="openModal()" class="w-8 h-8 flex items-center justify-center text-blue-600 dark:text-blue-400 active:opacity-50 text-[24px]" title="Tambah Catatan">
                <i class="fa-solid fa-circle-plus"></i>
            </button>
        </div>
    </header>

    <!-- Area Utama -->
    <main class="flex-1 overflow-y-auto hide-scrollbar pt-16 pb-10 px-4" id="main-area">
        <div id="notes-container" class="w-full max-w-3xl mx-auto space-y-4">
            <!-- Catatan akan di-render di sini via JavaScript -->
        </div>
    </main>

    <!-- MODAL TAMBAH/EDIT CATATAN -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/50 dark:bg-black/70 z-30 hidden opacity-0 transition-opacity duration-300" onclick="closeModal()"></div>
    
    <div id="modal" class="fixed inset-x-0 bottom-0 z-40 bg-white dark:bg-gray-800 rounded-t-3xl h-[85vh] md:max-w-2xl md:mx-auto shadow-2xl modal-enter flex flex-col transition-colors">
        <div class="flex justify-between items-center px-5 py-4 border-b border-gray-100 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 rounded-t-3xl shrink-0">
            <button onclick="closeModal()" class="text-gray-500 dark:text-gray-400 font-medium">Batal</button>
            <h2 class="font-semibold text-[17px] text-gray-800 dark:text-white" id="modal-title">Buat Catatan</h2>
            <button onclick="saveNote()" class="text-blue-600 dark:text-blue-400 font-bold">Simpan</button>
        </div>
        
        <div class="p-5 flex-1 overflow-y-auto hide-scrollbar bg-white dark:bg-gray-800">
            <input type="hidden" id="note-id">
            
            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-1">Pilih Kategori</label>
                <div class="relative">
                    <select id="note-category" onchange="toggleInputFields()" class="w-full appearance-none bg-gray-100 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-200 py-3 px-4 rounded-xl font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white dark:focus:bg-gray-600 transition-colors">
                        <option value="copasional">📋 Copasional</option>
                        <option value="carousel">🗂️ Carousel Notes</option>
                        <option value="mypassword">🔑 My Password</option>
                        <option value="error">🐛 Error Book</option>
                        <option value="myprompt">⌨️ My Prompt</option>
                        <option value="myinstruction">💻 Instruction</option>
                        <option value="mylink">🔗 My Link</option>
                        <option value="memo">📝 Memo Tasks</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500 dark:text-gray-400">
                        <i class="fa-solid fa-chevron-down text-sm"></i>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <input type="text" id="note-title" placeholder="Judul Catatan..." class="w-full text-[20px] font-bold focus:outline-none text-black dark:text-white bg-transparent placeholder-gray-300 dark:placeholder-gray-500 py-2 border-b border-gray-100 dark:border-gray-700">
            </div>

            <!-- Bagian Lampiran (Upload Gambar / File) -->
            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-2">Lampiran (Maks 2MB/File)</label>
                <div class="flex space-x-2 mb-2">
                    <button onclick="document.getElementById('attach-image').click()" class="bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 px-3 py-2 rounded-lg text-sm font-medium transition"><i class="fa-solid fa-image text-blue-500 dark:text-blue-400 mr-1"></i> Gambar</button>
                    <button onclick="document.getElementById('attach-file').click()" class="bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 px-3 py-2 rounded-lg text-sm font-medium transition"><i class="fa-solid fa-paperclip text-purple-500 dark:text-purple-400 mr-1"></i> File</button>
                    <input type="file" id="attach-image" accept="image/*" class="hidden" onchange="handleFileUpload(event, 'image')" multiple>
                    <input type="file" id="attach-file" accept=".txt,.pdf,.html,.json,.doc,.docx,.xls,.xlsx,.csv" class="hidden" onchange="handleFileUpload(event, 'file')" multiple>
                </div>
                <!-- Tempat Preview File yang Diunggah -->
                <div id="attachment-preview" class="flex flex-wrap gap-2"></div>
            </div>
            
            <!-- Mode Teks Biasa -->
            <div id="normal-input-container" class="w-full flex-col flex h-48">
                <textarea id="note-content" placeholder="Ketik isi catatan di sini..." class="w-full h-full text-[16px] focus:outline-none text-gray-700 dark:text-gray-200 placeholder-gray-300 dark:placeholder-gray-500 resize-none leading-relaxed bg-gray-50 dark:bg-gray-700 p-3 rounded-xl border border-gray-100 dark:border-gray-600"></textarea>
            </div>

            <!-- Mode Carousel -->
            <div id="carousel-input-container" class="w-full flex-col hidden space-y-3 pb-5"></div>
            
            <!-- Mode My Password -->
            <div id="mypassword-input-container" class="w-full flex-col hidden space-y-4 pb-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase mb-1">Username / Email</label>
                    <input type="text" id="pw-username" placeholder="Masukkan Username..." class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-100 dark:border-gray-600 p-3 rounded-xl text-[15px] text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase mb-1">Password</label>
                    <input type="text" id="pw-password" placeholder="Masukkan Password..." class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-100 dark:border-gray-600 p-3 rounded-xl text-[15px] text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase mb-1">Link / URL</label>
                    <input type="url" id="pw-link" placeholder="https://..." class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-100 dark:border-gray-600 p-3 rounded-xl text-[15px] text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
        </div>
    </div>

    <!-- CUSTOM DELETE ALERT OVERLAY -->
    <div id="delete-alert-overlay" class="fixed inset-0 bg-black/50 dark:bg-black/70 z-50 hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <div id="delete-alert-box" class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300">
            <div class="p-6 text-center">
                <div class="w-16 h-16 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center mx-auto mb-4 text-red-500">
                    <i class="fa-solid fa-triangle-exclamation text-3xl"></i>
                </div>
                <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2">Hapus Catatan?</h3>
                <p class="text-sm text-gray-500 dark:text-gray-400">Tindakan ini tidak dapat dibatalkan. Catatan akan dihapus permanen.</p>
            </div>
            <div class="flex border-t border-gray-100 dark:border-gray-700">
                <button onclick="closeDeleteAlert()" class="flex-1 py-3.5 text-gray-600 dark:text-gray-400 font-medium hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors border-r border-gray-100 dark:border-gray-700">Batal</button>
                <button onclick="confirmDelete()" class="flex-1 py-3.5 text-red-600 dark:text-red-500 font-bold hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">Hapus</button>
            </div>
        </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 dark:bg-white text-white dark:text-gray-900 px-5 py-3 rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] transition-all duration-300 translate-y-20 opacity-0 z-50 flex items-center pointer-events-none">
        <i class="fa-solid fa-check-circle text-green-400 dark:text-green-500 text-lg mr-3"></i>
        <span id="toast-message" class="text-[14px] font-medium">Teks berhasil disalin!</span>
    </div>

    <!-- Script JavaScript Utama -->
    <script>
        const categories = {
            copasional: { title: "Copasional", icon: "📋", color: "text-green-500 dark:text-green-400", bg: "bg-green-100 dark:bg-green-900/30" },
            carousel: { title: "Carousel Notes", icon: "🗂️", color: "text-pink-500 dark:text-pink-400", bg: "bg-pink-100 dark:bg-pink-900/30" },
            mypassword: { title: "My Password", icon: "🔑", color: "text-teal-500 dark:text-teal-400", bg: "bg-teal-100 dark:bg-teal-900/30" },
            error: { title: "Error Book", icon: "🐛", color: "text-red-500 dark:text-red-400", bg: "bg-red-100 dark:bg-red-900/30" },
            myprompt: { title: "My Prompt", icon: "⌨️", color: "text-orange-500 dark:text-orange-400", bg: "bg-orange-100 dark:bg-orange-900/30" },
            myinstruction: { title: "Instruction", icon: "💻", color: "text-indigo-500 dark:text-indigo-400", bg: "bg-indigo-100 dark:bg-indigo-900/30" },
            mylink: { title: "My Link", icon: "🔗", color: "text-purple-500 dark:text-purple-400", bg: "bg-purple-100 dark:bg-purple-900/30" },
            memo: { title: "Memo Tasks", icon: "📝", color: "text-yellow-500 dark:text-yellow-400", bg: "bg-yellow-100 dark:bg-yellow-900/30" }
        };

        let notes = [];
        const STORAGE_KEY = "simple_app_notes";
        
        let isGrouped = false; 
        let openNotes = new Set();
        let openCategories = new Set();
        
        let currentAttachments = [];
        let toastTimeout;
        let noteIdToDelete = null;

        window.onload = () => {
            initTheme();
            initCarouselInputs();
            loadNotes();
        };

        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            
            if (savedTheme === 'light') {
                html.classList.remove('dark');
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
                document.getElementById('btn-theme').classList.replace('text-yellow-500', 'text-gray-500');
            } else {
                html.classList.add('dark');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
                document.getElementById('btn-theme').classList.replace('text-gray-500', 'text-yellow-500');
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            const btn = document.getElementById('btn-theme');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
                btn.classList.replace('text-yellow-500', 'text-gray-500');
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
                btn.classList.replace('text-gray-500', 'text-yellow-500');
                localStorage.setItem('theme', 'dark');
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').innerText = message;
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        function initCarouselInputs() {
            const container = document.getElementById('carousel-input-container');
            let html = '<p class="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase">Isi Kartu Carousel (Maks 8)</p>';
            for(let i=1; i<=8; i++) {
                html += `
                    <div class="relative">
                        <div class="absolute -top-2 -left-2 bg-pink-500 text-white w-6 h-6 flex items-center justify-center rounded-full text-[11px] font-bold shadow-md z-10">${i}</div>
                        <textarea id="car-content-${i}" placeholder="Konten kartu ke-${i}..." class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-100 dark:border-gray-600 p-3 rounded-xl text-[15px] text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-200 dark:focus:ring-pink-800 resize-none h-20"></textarea>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function toggleInputFields() {
            const category = document.getElementById('note-category').value;
            const normalContainer = document.getElementById('normal-input-container');
            const carouselContainer = document.getElementById('carousel-input-container');
            const pwContainer = document.getElementById('mypassword-input-container');

            normalContainer.classList.add('hidden');
            normalContainer.classList.remove('flex');
            carouselContainer.classList.add('hidden');
            carouselContainer.classList.remove('flex');
            if (pwContainer) {
                pwContainer.classList.add('hidden');
                pwContainer.classList.remove('flex');
            }

            if (category === 'carousel') {
                carouselContainer.classList.remove('hidden');
                carouselContainer.classList.add('flex');
            } else if (category === 'mypassword') {
                if (pwContainer) {
                    pwContainer.classList.remove('hidden');
                    pwContainer.classList.add('flex');
                }
            } else {
                normalContainer.classList.remove('hidden');
                normalContainer.classList.add('flex');
            }
        }

        function handleFileUpload(event, type) {
            const files = event.target.files;
            if (!files) return;

            Array.from(files).forEach(file => {
                if (file.size > 1024 * 1024 * 2) { 
                    showToast(`File ${file.name} terlalu besar (Maks 2MB).`);
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    currentAttachments.push({
                        id: Date.now() + Math.random(),
                        type: type,
                        name: file.name,
                        data: e.target.result,
                        mimeType: file.type
                    });
                    renderAttachmentPreview();
                };
                reader.readAsDataURL(file);
            });
            event.target.value = ''; 
        }

        function removeAttachment(id) {
            currentAttachments = currentAttachments.filter(a => a.id !== id);
            renderAttachmentPreview();
        }

        function renderAttachmentPreview() {
            const container = document.getElementById('attachment-preview');
            container.innerHTML = '';
            currentAttachments.forEach(att => {
                if (att.type === 'image') {
                    container.innerHTML += `
                        <div class="relative w-16 h-16 rounded-lg border border-gray-200 dark:border-gray-600 overflow-hidden shrink-0 shadow-sm">
                            <img src="${att.data}" class="object-cover w-full h-full" />
                            <button onclick="removeAttachment(${att.id})" class="absolute top-0 right-0 bg-red-500/90 text-white w-5 h-5 flex items-center justify-center text-xs"><i class="fa-solid fa-times"></i></button>
                        </div>
                    `;
                } else {
                    container.innerHTML += `
                        <div class="relative bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 px-3 py-2 rounded-lg text-xs flex items-center max-w-[150px] shadow-sm text-gray-700 dark:text-gray-200">
                            <i class="fa-solid fa-file text-gray-400 mr-2"></i> <span class="truncate pr-4">${att.name}</span>
                            <button onclick="removeAttachment(${att.id})" class="absolute top-1 right-1 bg-red-500/90 text-white w-4 h-4 rounded-full flex items-center justify-center text-[10px]"><i class="fa-solid fa-times"></i></button>
                        </div>
                    `;
                }
            });
        }

        function openModal(editId = null) {
            const overlay = document.getElementById('modal-overlay');
            const modal = document.getElementById('modal');
            
            document.getElementById('note-id').value = "";
            document.getElementById('note-title').value = "";
            document.getElementById('note-content').value = "";
            
            if (document.getElementById('pw-username')) {
                document.getElementById('pw-username').value = "";
                document.getElementById('pw-password').value = "";
                document.getElementById('pw-link').value = "";
            }
            
            currentAttachments = []; 
            
            for(let i=1; i<=8; i++) document.getElementById(`car-content-${i}`).value = "";
            document.getElementById('modal-title').innerText = "Buat Catatan";

            if (editId) {
                const note = notes.find(n => n.id === editId);
                if (note) {
                    document.getElementById('note-id').value = note.id;
                    document.getElementById('note-title').value = note.title;
                    document.getElementById('note-category').value = note.category;
                    document.getElementById('modal-title').innerText = "Edit Catatan";
                    
                    if (note.attachments) {
                        currentAttachments = [...note.attachments];
                    }

                    if (note.category === 'carousel') {
                        let parsed = [];
                        try { parsed = JSON.parse(note.content); } catch(e) {}
                        for(let i=1; i<=8; i++) {
                            document.getElementById(`car-content-${i}`).value = parsed[i-1]?.content || '';
                        }
                    } else if (note.category === 'mypassword') {
                        let pwData = { username: '', password: '', link: '' };
                        try { pwData = JSON.parse(note.content); } catch(e) {}
                        if (document.getElementById('pw-username')) {
                            document.getElementById('pw-username').value = pwData.username || '';
                            document.getElementById('pw-password').value = pwData.password || '';
                            document.getElementById('pw-link').value = pwData.link || '';
                        }
                    } else {
                        document.getElementById('note-content').value = note.content;
                    }
                }
            }

            renderAttachmentPreview();
            toggleInputFields();

            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                modal.classList.add('modal-active');
            }, 10);
        }

        function closeModal() {
            const overlay = document.getElementById('modal-overlay');
            const modal = document.getElementById('modal');
            
            overlay.classList.add('opacity-0');
            modal.classList.remove('modal-active');
            setTimeout(() => overlay.classList.add('hidden'), 300);
        }

        function loadNotes() {
            const saved = localStorage.getItem(STORAGE_KEY);
            notes = saved ? JSON.parse(saved) : [];
            renderNotes();
        }

        function saveNote() {
            const id = document.getElementById('note-id').value;
            const category = document.getElementById('note-category').value;
            const titleInput = document.getElementById('note-title').value.trim();
            
            let content = "";
            let rawTextForTitle = "";

            if (category === 'carousel') {
                const carouselData = [];
                for(let i=1; i<=8; i++) {
                    const txt = document.getElementById(`car-content-${i}`).value.trim();
                    if(txt) {
                        carouselData.push({ content: txt });
                        if (!rawTextForTitle) rawTextForTitle = txt; 
                    }
                }
                content = JSON.stringify(carouselData);
            } else if (category === 'mypassword') {
                const pwData = {
                    username: document.getElementById('pw-username').value.trim(),
                    password: document.getElementById('pw-password').value.trim(),
                    link: document.getElementById('pw-link').value.trim()
                };
                content = JSON.stringify(pwData);
                rawTextForTitle = pwData.username || pwData.link || "My Password";
            } else {
                content = document.getElementById('note-content').value.trim();
                rawTextForTitle = content;
            }

            // AUTO-TITLE LOGIC
            let title = titleInput;
            if (!title) {
                if (rawTextForTitle) {
                    let cleanText = rawTextForTitle.replace(/^- \[[xX ]\]\s*/i, '');
                    const words = cleanText.trim().split(/\s+/);
                    title = words.slice(0, 4).join(' '); 
                    if (words.length > 4) title += '...';
                } else {
                    title = "Tanpa Judul";
                }
            }

            const attachmentsToSave = [...currentAttachments];

            if (id) {
                const index = notes.findIndex(n => n.id == id);
                if(index > -1) {
                    notes[index] = { ...notes[index], category, title, content, attachments: attachmentsToSave, updatedAt: Date.now() };
                }
            } else {
                notes.push({ id: Date.now(), category, title, content, attachments: attachmentsToSave, timestamp: Date.now() });
            }

            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
                showToast("Catatan berhasil disimpan!");
                closeModal();
                renderNotes();
            } catch (error) {
                if (error.name === 'QuotaExceededError' || error.name === 'DOMException') {
                    showToast("Gagal! Penyimpanan penuh, hapus lampiran lama.");
                } else {
                    showToast("Terjadi kesalahan saat menyimpan.");
                }
            }
        }

        function openDeleteAlert(id) {
            noteIdToDelete = id;
            const overlay = document.getElementById('delete-alert-overlay');
            const box = document.getElementById('delete-alert-box');
            
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                box.classList.remove('scale-95');
                box.classList.add('scale-100');
            }, 10);
        }

        function closeDeleteAlert() {
            const overlay = document.getElementById('delete-alert-overlay');
            const box = document.getElementById('delete-alert-box');
            
            overlay.classList.add('opacity-0');
            box.classList.remove('scale-100');
            box.classList.add('scale-95');
            
            setTimeout(() => {
                overlay.classList.add('hidden');
                overlay.classList.remove('flex');
                noteIdToDelete = null;
            }, 300);
        }

        function confirmDelete() {
            if (noteIdToDelete !== null) {
                notes = notes.filter(n => n.id !== noteIdToDelete);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
                renderNotes();
                showToast("Catatan dihapus.");
                closeDeleteAlert();
            }
        }

        function copyNoteText(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;
            
            let textToCopy = `${note.title}\n\n`;
            
            if (note.category === 'carousel') {
                try {
                    let items = JSON.parse(note.content);
                    textToCopy += items.map((it, idx) => `[Kartu ${idx + 1}]\n${it.content}`).join('\n\n---\n\n');
                } catch(e) {}
            } else if (note.category === 'mypassword') {
                try {
                    let pw = JSON.parse(note.content);
                    textToCopy += `Username: ${pw.username}\nPassword: ${pw.password}\nLink: ${pw.link}`;
                } catch(e) {}
            } else {
                textToCopy += note.content;
            }
            
            const textarea = document.createElement('textarea');
            textarea.value = textToCopy;
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                showToast("Teks berhasil disalin!");
            } catch (err) {
                showToast("Gagal menyalin teks.");
            }
            
            document.body.removeChild(textarea);
        }

        function visitLink(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;
            
            if (note.category === 'mypassword') {
                try {
                    const pw = JSON.parse(note.content);
                    if (pw.link) {
                        let url = pw.link;
                        if (!url.match(/^https?:\/\//i)) {
                            url = 'https://' + url;
                        }
                        window.open(url, '_blank');
                        showToast("Membuka tautan...");
                        return;
                    }
                } catch(e) {}
                showToast("Tidak ditemukan link pada password ini.");
                return;
            }

            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const matches = note.content.match(urlRegex);
            
            if (matches && matches.length > 0) {
                window.open(matches[0], '_blank');
                showToast("Membuka tautan...");
            } else {
                showToast("Tidak ditemukan link (http/https) pada catatan ini.");
            }
        }

        function toggleCategory(catKey) {
            const content = document.getElementById(`cat-body-${catKey}`);
            const icon = document.getElementById(`cat-icon-${catKey}`);
            const isOpen = content.classList.toggle('open');
            icon.classList.toggle('open');
            if (isOpen) openCategories.add(catKey);
            else openCategories.delete(catKey);
        }

        function toggleNote(noteId) {
            const content = document.getElementById(`note-body-${noteId}`);
            const icon = document.getElementById(`note-icon-${noteId}`);
            const isOpen = content.classList.toggle('open');
            icon.classList.toggle('open');
            if (isOpen) openNotes.add(noteId);
            else openNotes.delete(noteId);
        }

        function toggleGroupView() {
            isGrouped = !isGrouped;
            const btn = document.getElementById('btn-group');
            if (isGrouped) {
                btn.innerHTML = '<i class="fa-solid fa-list"></i>'; 
                btn.classList.add('bg-indigo-100', 'dark:bg-indigo-900/40', 'rounded-lg');
            } else {
                btn.innerHTML = '<i class="fa-solid fa-layer-group"></i>';
                btn.classList.remove('bg-indigo-100', 'dark:bg-indigo-900/40', 'rounded-lg');
            }
            renderNotes();
        }

        function exportData() {
            if (notes.length === 0) return showToast("Tidak ada data untuk diekspor!");
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(notes));
            const downloadNode = document.createElement('a');
            downloadNode.setAttribute("href", dataStr);
            downloadNode.setAttribute("download", `MyNotes_Backup_${new Date().toISOString().slice(0,10)}.json`);
            document.body.appendChild(downloadNode);
            downloadNode.click();
            downloadNode.remove();
            showToast("Berhasil diekspor!");
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedNotes = JSON.parse(e.target.result);
                    if (Array.isArray(importedNotes)) {
                        const notesMap = new Map();
                        notes.forEach(n => notesMap.set(n.id, n));
                        importedNotes.forEach(n => notesMap.set(n.id, n));
                        notes = Array.from(notesMap.values());
                        
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
                        renderNotes();
                        showToast("Data berhasil diimpor!");
                    } else { showToast("Format file tidak valid."); }
                } catch (err) { 
                    if (err.name === 'QuotaExceededError') {
                         showToast("Gagal! Penyimpanan browser penuh.");
                    } else {
                         showToast("Gagal membaca file JSON."); 
                    }
                }
                event.target.value = ''; 
            };
            reader.readAsText(file);
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag] || tag));
        }

        function buildNoteCard(note, showBadge = false) {
            const catConfig = categories[note.category] || categories['memo'];
            const isNoteOpen = openNotes.has(note.id);
            const openClass = isNoteOpen ? "open" : "";
            
            let previewContent = '';
            
            if (note.category === 'carousel') {
                let items = [];
                try { items = JSON.parse(note.content); } catch(e){}
                previewContent = `<div class="flex gap-2 overflow-x-auto hide-scrollbar py-2">`;
                items.forEach((it) => {
                    previewContent += `<div class="shrink-0 w-40 bg-gray-50 dark:bg-gray-700 p-2 rounded-lg border border-gray-100 dark:border-gray-600 text-[13px] text-gray-800 dark:text-gray-200 whitespace-pre-wrap">${escapeHTML(it.content)}</div>`;
                });
                previewContent += `</div>`;
                if(items.length === 0) previewContent = '<p class="text-[13px] text-gray-400 dark:text-gray-500 italic">Carousel kosong</p>';
                
            } else if (note.category === 'mypassword') {
                let pw = {username: '', password: '', link: ''};
                try { pw = JSON.parse(note.content); } catch(e){}
                
                let safeLink = escapeHTML(pw.link);
                let linkUrl = safeLink.match(/^https?:\/\//i) ? safeLink : 'https://' + safeLink;
                let linkHtml = safeLink ? `<a href="${linkUrl}" target="_blank" onclick="event.stopPropagation()" class="text-blue-500 dark:text-blue-400 hover:underline break-all">${safeLink}</a>` : '-';
                
                previewContent = `
                    <div class="space-y-3 text-[14px] text-gray-700 dark:text-gray-300">
                        <div class="flex flex-col"><span class="text-[11px] text-gray-400 dark:text-gray-500 uppercase font-bold tracking-wider mb-0.5">Username / Email</span><span class="font-medium select-all">${escapeHTML(pw.username) || '-'}</span></div>
                        <div class="flex flex-col"><span class="text-[11px] text-gray-400 dark:text-gray-500 uppercase font-bold tracking-wider mb-0.5">Password</span><span class="font-mono bg-gray-100 dark:bg-gray-700/50 px-2 py-1 rounded inline-block w-fit select-all">${escapeHTML(pw.password) || '-'}</span></div>
                        <div class="flex flex-col"><span class="text-[11px] text-gray-400 dark:text-gray-500 uppercase font-bold tracking-wider mb-0.5">Link / URL</span><span class="">${linkHtml}</span></div>
                    </div>
                `;
                
            } else if (note.category === 'mylink') {
                const safeContent = escapeHTML(note.content);
                const urlRegex = /(https?:\/\/[^\s]+)/g;
                const linkedContent = safeContent.replace(urlRegex, function(url) {
                    return `<a href="${url}" target="_blank" onclick="event.stopPropagation()" class="text-blue-500 dark:text-blue-400 hover:underline break-all">${url}</a>`;
                });
                previewContent = `<div class="text-[14px] text-gray-700 dark:text-gray-300 whitespace-pre-wrap leading-relaxed">${linkedContent}</div>`;
                
            } else {
                previewContent = `<div class="text-[14px] text-gray-700 dark:text-gray-300 whitespace-pre-wrap leading-relaxed">${escapeHTML(note.content)}</div>`;
            }

            let attachmentsHtml = '';
            if (note.attachments && note.attachments.length > 0) {
                attachmentsHtml = `<div class="mt-4 pt-3 border-t border-gray-100 dark:border-gray-700 flex flex-wrap gap-2">`;
                note.attachments.forEach(att => {
                    if (att.type === 'image') {
                        attachmentsHtml += `<a href="${att.data}" target="_blank" title="Klik untuk lihat penuh" onclick="event.stopPropagation()" class="block w-20 h-20 rounded-lg overflow-hidden border border-gray-200 dark:border-gray-600 shrink-0 shadow-sm"><img src="${att.data}" class="object-cover w-full h-full hover:scale-110 transition"></a>`;
                    } else {
                        attachmentsHtml += `<a href="${att.data}" download="${att.name}" title="Klik untuk unduh" onclick="event.stopPropagation()" class="bg-gray-50 dark:bg-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 px-3 py-2 rounded-lg text-[13px] text-blue-600 dark:text-blue-400 font-medium flex items-center transition border border-gray-200 dark:border-gray-600 shadow-sm"><i class="fa-solid fa-file-arrow-down mr-2 text-gray-400 dark:text-gray-500"></i> <span class="truncate max-w-[140px]">${att.name}</span></a>`;
                    }
                });
                attachmentsHtml += `</div>`;
            }

            const badgeHtml = showBadge ? `<span class="px-2 py-0.5 rounded-md ${catConfig.bg} ${catConfig.color} text-[11px] font-bold ml-2 shrink-0">${catConfig.icon} ${catConfig.title}</span>` : '';

            return `
                <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden mb-3 transition-colors">
                    <div class="px-4 py-3.5 flex justify-between items-center cursor-pointer active:bg-gray-50 dark:active:bg-gray-700 transition" onclick="toggleNote(${note.id})">
                        <div class="flex-1 pr-2 flex items-center overflow-hidden">
                            <h3 class="font-bold text-gray-900 dark:text-white text-[15px] truncate">${escapeHTML(note.title)}</h3>
                            ${badgeHtml}
                            ${note.attachments && note.attachments.length > 0 ? '<i class="fa-solid fa-paperclip text-gray-400 dark:text-gray-500 text-[11px] ml-2"></i>' : ''}
                        </div>
                        
                        <div class="flex items-center space-x-0.5 shrink-0">
                            ${['mylink', 'mypassword'].includes(note.category) ? `
                            <button onclick="visitLink(${note.id}); event.stopPropagation();" class="w-8 h-8 flex items-center justify-center text-indigo-600 dark:text-indigo-400 active:bg-indigo-50 dark:active:bg-indigo-900/30 rounded-full transition" title="Kunjungi Link">
                                <i class="fa-solid fa-arrow-up-right-from-square text-[13px]"></i>
                            </button>
                            ` : ''}
                            <button onclick="copyNoteText(${note.id}); event.stopPropagation();" class="w-8 h-8 flex items-center justify-center text-green-600 dark:text-green-400 active:bg-green-50 dark:active:bg-green-900/30 rounded-full transition" title="Salin Teks">
                                <i class="fa-regular fa-copy text-[13px]"></i>
                            </button>
                            <button onclick="openModal(${note.id}); event.stopPropagation();" class="w-8 h-8 flex items-center justify-center text-blue-500 dark:text-blue-400 active:bg-blue-50 dark:active:bg-blue-900/30 rounded-full transition" title="Edit Catatan">
                                <i class="fa-solid fa-pen text-[13px]"></i>
                            </button>
                            <button onclick="openDeleteAlert(${note.id}); event.stopPropagation();" class="w-8 h-8 flex items-center justify-center text-red-500 dark:text-red-400 active:bg-red-50 dark:active:bg-red-900/30 rounded-full transition" title="Hapus Catatan">
                                <i class="fa-solid fa-trash text-[13px]"></i>
                            </button>
                            <div class="w-px h-4 bg-gray-200 dark:bg-gray-600 mx-1"></div>
                            <i class="fa-solid fa-chevron-down text-gray-400 dark:text-gray-500 text-sm chevron-icon pl-1 ${openClass}" id="note-icon-${note.id}"></i>
                        </div>
                    </div>
                    
                    <div class="accordion-content border-t border-gray-100 dark:border-gray-700 ${openClass}" id="note-body-${note.id}">
                        <div class="accordion-inner bg-gray-50/50 dark:bg-gray-800/50">
                            <div class="p-4">
                                ${previewContent}
                                ${attachmentsHtml}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderNotes() {
            const container = document.getElementById('notes-container');
            container.innerHTML = '';

            if (notes.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 pt-20">
                        <i class="fa-regular fa-folder-open text-6xl mb-4 text-gray-300 dark:text-gray-600"></i>
                        <p class="font-medium">Belum ada catatan.</p>
                        <p class="text-sm">Klik tombol + untuk menambah.</p>
                    </div>`;
                return;
            }

            let html = '';

            if (isGrouped) {
                Object.keys(categories).forEach(catKey => {
                    const catNotes = notes.filter(n => n.category === catKey).sort((a,b) => b.timestamp - a.timestamp);
                    if (catNotes.length > 0) {
                        const config = categories[catKey];
                        const isCatOpen = openCategories.has(catKey);
                        const openClass = isCatOpen ? "open" : "";
                        
                        html += `
                            <div class="mb-4">
                                <div class="flex justify-between items-center bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 cursor-pointer active:bg-gray-50 dark:active:bg-gray-700 shadow-sm transition-colors" onclick="toggleCategory('${catKey}')">
                                    <div class="flex items-center">
                                        <div class="w-8 h-8 rounded-lg ${config.bg} ${config.color} flex items-center justify-center mr-3">
                                            ${config.icon}
                                        </div>
                                        <h2 class="text-[16px] font-bold text-gray-800 dark:text-white">${config.title}</h2>
                                        <span class="ml-2 bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400 px-2 py-0.5 rounded-full text-xs font-bold">${catNotes.length}</span>
                                    </div>
                                    <i class="fa-solid fa-chevron-down text-gray-400 dark:text-gray-500 text-sm chevron-icon ${openClass}" id="cat-icon-${catKey}"></i>
                                </div>
                                
                                <div class="accordion-content ${openClass}" id="cat-body-${catKey}">
                                    <div class="accordion-inner">
                                        <div class="pt-3 pl-2 pr-2">
                        `;

                        catNotes.forEach(note => { html += buildNoteCard(note, false); });

                        html += `       </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                });
            } else {
                const allNotes = [...notes].sort((a,b) => b.timestamp - a.timestamp);
                html += `<div class="pt-2">`;
                allNotes.forEach(note => { html += buildNoteCard(note, true); });
                html += `</div>`;
            }

            container.innerHTML = html;
        }
    </script>
</body>
</html>
